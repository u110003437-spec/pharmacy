var EXAM_EXP = {"110-1#7":"<b>nivolumab</b> 是 anti-PD-1 免疫檢查點抑制劑，作用在 <b>T 細胞</b>上：阻斷腫瘤 PD-L1 與 T 細胞 PD-1 結合，解除 T 細胞被抑制的「煞車」，重新活化 T 細胞去毒殺腫瘤——這就是「調控 T 細胞活性抗癌」。bevacizumab 抗 VEGF（抗血管新生）、trastuzumab 抗 HER2、rituximab 抗 CD20（B 細胞），都不是調控 T 細胞。記憶：-nivol/-pembro/-ipi（檢查點）＝ T 細胞免疫療法。","110-1#8":"棘白黴素類（echinocandins，字尾 <b>-fungin</b>，如 caspofungin）的機轉是抑制 <b>β-(1,3)-glucan synthase</b>，使黴菌細胞壁的 β-glucan 合成受阻 → 細胞壁缺損而殺菌。對比：amphotericin B 結合 ergosterol 打洞在細胞膜；azole（fluconazole）抑制 14α-demethylase 阻 ergosterol 合成；terbinafine 抑制 squalene epoxidase。只有 caspofungin 作用在「細胞壁」。","110-1#12":"warfarin 過量出血要「補回凝血能力」：vitamin K1 補回維生素 K 依賴因子、FFP 直接補凝血因子、recombinant factor VIIa 直接補活化因子。<b>heparin</b> 本身是抗凝血劑，會讓出血更嚴重，當然不可用於 warfarin 造成的出血。本題選不適合者＝heparin。","110-1#14":"thioamides（PTU、methimazole）抑制 thyroid peroxidase 而阻斷甲狀腺素合成。差別在：<b>PTU 額外能抑制周邊 T4→T3 的去碘化（deiodination）</b>，methimazole 不能，所以甲狀腺風暴（需快速降 T3）首選 PTU。(C) 正確描述 methimazole 無法抑制去碘化故不適合甲狀腺風暴。另：孕婦第一孕期反而選 PTU（methimazole 致畸），故 D 描述相反為錯。","110-1#17":"acetazolamide 抑制碳酸酐酶 → HCO₃⁻ 大量隨尿流失 → <b>代謝性酸中毒</b>（A 對）；近端排 Na 後遠端 K 分泌增加 → 易低血鉀，並非高血鉀。故「高血鉀症」是錯誤敘述（D）。其餘 paresthesia、腎結石（鹼性尿使鈣鹽沉澱）皆為其副作用。","110-1#18":"spironolactone 是<b>醛固酮（aldosterone）受體拮抗劑</b>，作用在集尿管主細胞，阻斷醛固酮 → 減少 ENaC 與 Na/K-ATPase 表現 → 保鉀排鈉。它同時非選擇性拮抗雄激素受體（→男性女乳症）。答案 aldosterone。","110-1#23":"作用在<b>遠曲小管（DCT）</b>的是 thiazide 類，metolazone 屬 thiazide-like。amiloride 作用在集尿管 ENaC、ethacrynic acid 作用在亨利氏環 NKCC2、acetazolamide 作用在近曲小管碳酸酐酶。故 DCT＝metolazone。","110-1#25":"organophosphates（有機磷）抑制乙醯膽鹼酯酶 → ACh 堆積 → 活化虹膜<b>括約肌的 M 受體</b>產生<b>縮瞳（miosis）</b>，而不是「抑制 alpha 受體」。故 D 機轉描述錯誤。其餘：timolol（β阻斷減房水）、pilocarpine（M促效增外流）、phenylephrine（α促效散瞳）皆正確。","110-1#26":"moxonidine 是中樞性 <b>I₁ imidazoline / α₂ 促效劑</b>，用於<b>降血壓</b>，不是治氣喘。故 B 錯。midodrine（α₁促效升壓治姿態性低血壓）、clonidine（中樞α₂降壓）、oxymetazoline（α促效收鼻黏膜血管治鼻塞）皆正確。","110-1#27":"帕金森氏症是黑質多巴胺不足，治療要「補多巴胺」。<b>levodopa</b> 是多巴胺前驅物可過 BBB 後轉成 dopamine。carbachol、neostigmine 為擬膽鹼（反而加重）、atracurium 為神經肌肉阻斷劑，皆不治帕金森。答案 levodopa。","110-1#30":"aspirin 不可逆乙醯化 COX → 抑制 TXA₂ 生成 → <b>抑制（而非促進）血小板凝集</b>。故「促進血小板凝集」非其作用（A）。其餘抗發炎、止痛、高劑量腎毒性皆為其作用。","110-1#34":"<b>脊髓麻醉（spinal）藥量遠少於硬膜外（epidural）</b>，因藥物直接注入蛛網膜下腔腦脊髓液，作用點近、用量小（C 正確）。A 錯：局麻最嚴重副作用是心血管毒性/全身毒性而非神經毒性；D 錯：應加<b>血管收縮劑</b>（epinephrine）才能延長藥效、減少吸收。","110-1#36":"flumazenil 是 BZD 受體<b>競爭性拮抗劑</b>（非共價、非抗焦慮）。對長期使用 BZD 或合併服用降痙閾藥的病人，快速逆轉可能<b>誘發癲癇發作或戒斷</b>（A 正確）。它只解 BZD，不解 barbiturate（phenobarbital），故 D 錯。","110-1#50":"cabergoline 是<b>麥角類 dopamine D₂ 受體促效劑</b>，不是 MAO 抑制劑（selegiline 才是 MAO-B 抑制劑）。故 D 配對錯誤。其餘 benserazide（DDC 抑制劑）、entacapone（COMT 抑制劑）、apomorphine（DA 促效劑）皆正確。","110-1#53":"alemtuzumab（anti-CD52）用於多發性硬化症，會<b>增加</b>而非降低惡性腫瘤（含黑色素瘤）風險，且有自體免疫副作用。故 C 敘述錯誤。","110-1#71":"omeprazole 等 PPI 主要由<b>CYP2C19</b>（次要 CYP3A4）代謝。CYP2C19 有基因多型性（亞洲人慢代謝者多），影響藥效與交互作用（如與 clopidogrel 競爭）。答案 CYP2C19。","110-1#79":"cyclophosphamide 在肝臟活化後產生毒性代謝物 <b>acrolein</b>，acrolein 刺激膀胱黏膜 → <b>出血性膀胱炎</b>。解毒用 mesna（結合 acrolein）。答案 acrolein。","110-2#2":"chemical antagonism（化學性拮抗）＝兩藥<b>直接化學結合</b>而失效。<b>protamine（鹼性）直接結合 heparin（酸性）</b>形成複合物中和之，屬化學性拮抗。其餘為生理性（不同受體相反作用）或藥理性拮抗。答案 B。","110-2#5":"erythromycin（大環內酯）在<b>酸性環境會被破壞失效</b>，故需腸衣保護，並非「酸性增強藥效」（A 錯）。其餘：結合 50S、抑制黴漿菌、抑制 CYP3A4 增高 warfarin 濃度皆正確。","110-2#6":"vinblastine（vinca）<b>抑制微管聚合</b>，paclitaxel（taxane）<b>穩定微管、抑制解聚</b>——兩者作用<b>方向相反</b>，不能說「皆抑制聚合」（A 錯）。共同點是作用在 M 期、經 P450 代謝、有骨髓抑制。","110-2#7":"trastuzumab（抗 HER2）只對<b>HER-2/neu 過度表達</b>的乳癌有效，而非「HER2 不表達」者（B 描述顛倒，故錯）。ER/PR 與 HER2 為不同標的。","110-2#17":"metformin 活化肝細胞內 <b>AMP-activated protein kinase（AMPK）</b> → 抑制糖質新生、增加胰島素敏感性，不刺激胰島素分泌（故不致低血糖）。答案 AMPK。","110-2#18":"耳毒性最強的利尿劑是<b>loop 利尿劑</b>，其中 <b>ethacrynic acid</b> 非磺胺類、耳毒性尤其明顯，與 aminoglycoside 併用耳毒性疊加致聽損。答案 ethacrynic acid。","110-2#24":"位置1＝近曲小管（PCT），抑制此處 NaHCO₃ 再吸收的是碳酸酐酶抑制劑 <b>acetazolamide</b>。答案 acetazolamide。","110-2#28":"散瞳作用時間最短＝<b>tropicamide</b>（短效，常用於眼底檢查，數小時恢復）。atropine 最長（數天）、scopolamine/homatropine 中長效。答案 tropicamide。","110-2#32":"促進尿酸排除（uricosuric）的是 <b>probenecid</b>（抑制近端腎小管尿酸再吸收）。colchicine 抗發炎（抑微管）、allopurinol 抑制 XO 減少尿酸生成、sulindac 為 NSAID。答案 probenecid。","110-2#37":"BZD 長期使用產生<b>耐受性與依賴</b>，與受體 <b>down-regulation（數量下降）</b>有關（C 正確）。A 錯：BZD 增加氯離子通道<b>開啟頻率</b>（barbiturate 才增開啟時間）；D 錯：flurazepam 是促效劑非拮抗劑（flumazenil 才是拮抗劑）。","110-2#38":"<b>zolpidem</b>（非 BZD，選擇性 BZ1/ω1）作用快、半衰期短，專治<b>入睡困難（sleep onset）</b>。長效 BZD（diazepam）適合維持睡眠。答案 zolpidem。","110-2#59":"heparin 經由一段特定的<b>五醣序列（pentasaccharide）</b>與 antithrombin III 結合，使 ATIII 構型改變、活性大增。fondaparinux 即此合成五醣。答案 5。","110-2#69":"含 sulfonamide（磺胺）基團者：acetazolamide、probenecid（含磺醯基）、prontosil（最早磺胺前驅藥）。<b>rofecoxib</b>（COX-2 抑制劑）不含磺胺基（celecoxib 才含）。答案 rofecoxib。","111-1#1":"clearance（清除率）是器官清除藥物的內在能力，<b>與給藥途徑無關</b>（IV 與口服清除率相同，差別在生體可用率而非 CL），故 A 錯。CL＝吸收量/AUC、隨病情與合併用藥改變皆正確。","111-1#5":"acyclovir 需先被<b>病毒的 thymidine kinase 磷酸化</b>成單磷酸，再經宿主酶轉三磷酸才抑制病毒 DNA 聚合酶（D 正確）。正因依賴病毒 TK，只在<b>受感染細胞</b>活化（故 A 錯：不會出現在未感染細胞），對 HSV 比 VZV 強（C 顛倒）。","111-1#7":"doxorubicin 主要毒性為<b>心毒性、骨髓抑制、腸胃道、生殖</b>。<b>骨骼肌</b>非其主要受影響組織（增殖慢），故影響最小。答案 骨骼肌。","111-1#8":"bortezomib 是<b>蛋白酶體（proteasome）抑制劑</b>，並非阻斷 VEGFR 抗血管新生（A 機轉錯誤）。其餘 bevacizumab（抗 VEGF）、sorafenib（多激酶含 VEGFR/PDGFR）、imatinib/sunitinib（抑 PDGFR 治 GIST）皆正確。","111-1#9":"<b>metronidazole</b> 既治阿米巴原蟲（腸道與肝膿瘍），也治<b>厭氧菌</b>感染（其硝基被厭氧菌還原成毒性自由基破壞 DNA）。答案 metronidazole。","111-1#10":"β-lactam 破壞細胞壁後，使<b>aminoglycoside（kanamycin）更易進入</b>細菌，產生協同殺菌。<b>(a)ticarcillin 增加 (b)kanamycin 進入</b>＝典型協同。答案 D。其餘為固定複方或抑制劑搭配，非「增加進入」機轉。","111-1#12":"heparin 的拮抗藥（中和劑）是<b>protamine sulfate</b>（鹼性蛋白直接結合酸性 heparin）。aminocaproic acid 抗纖溶、phytonadione＝vit K1（解 warfarin）。答案 protamine sulfate。","111-1#13":"niacin 機轉是<b>抑制脂肪分解 → 減少 FFA → 減少肝 VLDL 合成</b>，並<b>減少 HDL 的分解代謝（使 HDL 上升）</b>。C 說「促進 HDL 分解」與「升 HDL」矛盾，故錯。","111-1#14":"<b>mecasermin</b> 是重組 <b>IGF-1</b> 製劑，用於 IGF-1 缺乏或 GH 受體缺陷導致的生長遲滯。bromocriptine（DA促效）、octreotide（somatostatin 類似物）、pegvisomant（GH 受體拮抗）皆相反方向。答案 mecasermin。","111-1#15":"<b>amiodarone</b> 含碘且抑制周邊 <b>T4→T3 去碘化（deiodinase）</b>，可影響甲狀腺功能。iodide/perchlorate 影響攝碘、liotrix 為甲狀腺素製劑。答案 amiodarone。","111-1#22":"aspirin 機轉＝<b>乙醯化（acetylation）COX 的 serine</b>，產生<b>不可逆</b>抑制（D 正確）。是「乙醯化」非「甲基化」，作用在 COX 酵素本身而非 TXA₂ 受體。","111-1#25":"trimethaphan 是<b>神經節阻斷劑</b>，會把交感與副交感都阻斷。phenylephrine 升壓引發的反射性心跳下降需經<b>迷走神經（副交感）</b>，被神經節阻斷後此反射消失；同時去除交感調控使血壓上升<b>更劇</b>。答案 C。","111-1#26":"治青光眼要<b>減少房水或增加外流</b>。<b>isoproterenol</b>（非選擇性β促效）反而可能增加房水生成，不能降眼壓（B 錯）。betaxolol（β阻斷減房水）、apraclonidine（α₂減房水）、carbachol（增外流）皆正確。","111-1#30":"<b>cholestyramine</b> 是陰離子交換樹脂，結合膽酸，除了降血脂也可用於膽酸吸收不良造成的<b>腹瀉</b>（結合多餘膽酸）。答案 cholestyramine。","111-1#31":"急性氣喘發作首選<b>短效 β₂ 促效劑（SABA）</b>＝<b>terbutaline</b>（快速擴張支氣管）。cromolyn（預防）、salmeterol（長效不用於急救）、propranolol（β阻斷會惡化氣喘）。答案 terbutaline。","111-1#32":"ibuprofen 屬<b>丙酸類（propionic acid derivative）</b>，與 naproxen、ketoprofen 同類。fenamates＝mefenamic acid、indole＝indomethacin、oxicam＝piroxicam。答案 propionic acid derivative。","111-1#35":"飲食缺 tryptophan（5-HT 前驅物）會使憂鬱復發 → 表示此藥<b>依賴血清素</b>。<b>bupropion</b> 機轉是 <b>NE/DA 回收抑制</b>，不靠血清素，故最不可能是它（A）。SSRI（fluoxetine/sertraline/citalopram）才依賴血清素。","111-1#37":"triazolam 是<b>短效</b>三唑類 BZD，經 α-hydroxylation 後接合排除，<b>無長效活性代謝物</b>。「主要活性代謝物是 desmethyldiazepam」（長半衰期）是 diazepam 那類的特徵，故 B 錯。","111-1#40":"BZD 的適應症含<b>癲癇（抗痙攣）</b>、焦慮、失眠、肌肉痙攣、酒精戒斷。不治阿茲海默、帕金森、舞蹈症。答案 癲癇。","111-1#46":"<b>atorvastatin</b>（與 simvastatin、lovastatin）經 CYP3A4 代謝產生<b>活性代謝物（ortho/para-hydroxy）</b>。pravastatin、fluvastatin、pitavastatin 代謝物多無活性。答案 atorvastatin。","111-1#57":"niacin 的潮紅（flushing）是<b>PGD₂ 介導</b>（前列腺素），預防用<b>aspirin</b>（抑制 COX 減 PG），而非 acetaminophen（不抑制周邊 PG，無效）。故 B 錯。","111-1#77":"<b>trastuzumab</b> 是抗 HER2 <b>單株抗體</b>，治 HER2 陽性（頑固性/轉移性）乳癌。imatinib/gefitinib/sunitinib 為小分子 TKI（非單抗）。答案 trastuzumab。","111-2#1":"<b>ketoconazole</b> 是強力 <b>CYP3A4 抑制劑</b>（azole 類抑制肝酵素），長期併用會升高其他藥濃度。phenytoin、rifampin、griseofulvin 反而是肝酵素<b>誘導劑</b>。答案 ketoconazole。","111-2#4":"penicillin 抗藥機轉：β-lactamase 分解、PBP 改變、porin 減少（革蘭氏<b>陰性</b>菌外膜）。D 說「革蘭氏<b>陽性</b>菌外膜 porin」錯——陽性菌沒有外膜/porin 結構，這是陰性菌的機轉，故 D 為錯誤敘述。","111-2#5":"<b>cephalexin（第一代）反而比 cefepime（第四代）更易</b>與 penicillin 交叉過敏（第一代結構較接近）。C 說 cephalexin 較不易交叉過敏，與事實相反，故錯。","111-2#6":"leucovorin（亞葉酸）繞過 DHFR 直接提供還原型葉酸，<b>救援正常細胞免於 MTX 毒性</b>（D 正確）。與 5-FU 併用則是<b>穩定 FdUMP-TS 複合物增強療效</b>（非減緩代謝），故 B 錯方向。","111-2#9":"chloroquine 殺紅血球內期，但 P. vivax/ovale 在肝有<b>休眠體（hypnozoites）</b>，需併用 <b>primaquine</b>（殺肝內休眠體）才能根治、防復發。答案 primaquine。","111-2#10":"heparin 副作用：出血、HIT（血小板低下）、長期骨質疏鬆。<b>皮膚壞死（cutaneous necrosis）是 warfarin</b> 的特徵副作用（蛋白 C 早期下降），非 heparin，故 C 為錯誤敘述。","111-2#12":"<b>tacrolimus</b>（與 cyclosporine）抑制 <b>calcineurin</b> → 阻 NFAT → 減少 IL-2 → 抑制 T 細胞活化。答案 tacrolimus。","111-2#15":"字尾 <b>-gliptin</b>＝<b>DPP-4 抑制劑</b>，<b>saxagliptin</b> 抑制 DPP-4 使內生性 GLP-1 不被分解、延長作用 → 促胰島素分泌。exenatide 是 GLP-1 促效劑（注射）。答案 saxagliptin。","111-2#16":"<b>octreotide</b> 是 <b>somatostatin 類似物</b>，抑制 GH 分泌，治肢端肥大症。bromocriptine（DA促效，部分有效）、desmopressin（ADH類似物）、leuprolide（GnRH）。答案 octreotide。","111-2#18":"furosemide 部分利尿效果依賴<b>前列腺素（PGE2）增加腎血流</b>。NSAID（indomethacin）<b>抑制 PGE2 生成</b> → 減少腎血流 → 削弱利尿效果。答案 抑制 PGE2 生成。","111-2#19":"<b>sotalol</b> 同時具<b>β 阻斷（Class II）＋鉀通道阻斷（Class III）</b>雙重作用。propranolol 純 II、propafenone 屬 IC、procainamide 屬 IA。答案 sotalol。","111-2#23":"心絞痛<b>急性發作</b>首選<b>舌下 nitroglycerin</b>（快速擴張靜脈減前負荷、緩解胸痛）。CCB、β阻斷為慢性預防。答案 nitroglycerin。","111-2#24":"digoxin 副作用：噁心嘔吐（刺激 CTZ）、視覺異常（黃綠視/光暈）、老人意識混亂。<b>會引起腹瀉而非便秘</b>（膽鹼性作用增強腸蠕動），故 A 錯。","111-2#25":"parathion（有機磷）中毒：用 atropine 解 M 症狀、pralidoxime/diacetylmonoxime 再活化 AChE。<b>carbachol</b> 是擬膽鹼促效劑，會<b>加重</b>中毒，最不適合（D）。","111-2#27":"<b>dobutamine</b> 是<b>β₁ 選擇性促效劑</b>（強心），對 β 受體親和力高。methoxamine/phenylephrine（α₁）、clonidine（α₂）皆作用於 α。答案 dobutamine。","111-2#31":"<b>allopurinol</b> 抑制 <b>xanthine oxidase</b> → 減少尿酸生成，用於痛風長期控制。colchicine（抗發炎）、sulfinpyrazone（促排泄）、indomethacin（NSAID）。答案 allopurinol。","111-2#32":"長期使用<b>類固醇（dexamethasone）</b>會造成<b>骨質疏鬆</b>（抑制成骨、促破骨、減鈣吸收）。aspirin/indomethacin/ibuprofen 為 NSAID，不是骨鬆主因。答案 dexamethasone。","111-2#35":"selegiline 機轉是<b>抑制 MAO-B</b>（減少 dopamine 分解），<b>不是</b>抑制 D₂ 受體（C 錯）。其餘 levodopa/carbidopa 胃造瘻凝膠、Rytary 長效、carbidopa 減周邊代謝皆正確。","111-2#36":"BZD 仍會產生<b>藥物依賴</b>（生理與心理），只是比 barbiturate 安全（治療指數較大、過量較不致命）。C 說「不會依賴」錯。其餘 A、B、D 皆為 BZD 較安全的正確原因。","111-2#38":"治療失神性癲癇（absence）：<b>ethosuximide（首選，阻 T 型鈣通道）</b>與 <b>valproate</b>。phenytoin、gabapentin 對 absence 無效甚至惡化。②valproate③ethosuximide＝答案 B。","111-2#58":"protamine 中和 heparin 是靠<b>鹼性 protamine 直接與酸性 heparin 結合</b>，並非「競爭 ATIII 結合區」（A 機轉描述錯誤）。其餘富含 arginine、可致過敏皆正確。","111-2#70":"lansoprazole（PPI）主要由<b>CYP2C19</b>（次要 3A4）代謝，與 omeprazole 同。答案 CYP2C19。","111-2#78":"cisplatin 最常見、劑量限制性毒性是<b>腎毒性（renal damage）</b>（近端腎小管壞死，需大量水化＋利尿預防），其次耳毒、神經毒、噁吐。答案 renal damage。","112-1#5":"linezolid 結合 <b>50S 上的 23S rRNA</b>，阻止 70S 起始複合體形成——這個結合位點<b>獨特</b>，與其他蛋白合成抑制劑不同，故不易產生交叉抗藥性（A 正確）。","112-1#7":"CLL 標準化療含 <b>cyclophosphamide＋vincristine＋prednisone</b>（C 正確）。A 錯（AML 不是 imatinib，imatinib 治 CML）、B 錯（CML 是 imatinib 不是 6-MP）、D 錯（ALL 不是 rituximab 為主）。","112-1#9":"抑制<b>微管聚合（tubulin polymerization）</b>的是 <b>vinca 類（vinorelbine）</b>。paclitaxel 反而穩定微管。topotecan（topo I）、cladribine（嘌呤類）機轉不同。答案 vinorelbine。","112-1#10":"rivaroxaban（-xaban 字尾）是直接口服<b>factor Xa 抑制劑</b>。dabigatran（-gatran）抑制 IIa（thrombin）。答案 factor Xa。","112-1#11":"fibrates 經腎排泄，<b>肝腎功能不全者禁用/慎用</b>（易橫紋肌溶解），故 C「適用於肝腎缺損病人」錯誤。其餘加強 warfarin、可與 fenofibrate＋statin、致膽結石皆正確。","112-1#15":"metformin <b>不刺激胰島素分泌</b>（不致低血糖），機轉是活化 AMPK 抑制糖質新生。A 說「促進胰島素自β細胞釋放」錯（那是 sulfonylurea）。","112-1#19":"手術中短效β阻斷劑＝<b>esmolol</b>（酯類，被血漿 esterase 快速水解，半衰期約 9 分鐘），可快速調控心律。答案 esmolol。","112-1#22":"HIT 發生後要換<b>非 heparin 類抗凝</b>，<b>argatroban</b>（直接凝血酶抑制劑）是首選。enoxaparin/dalteparin（仍是 heparin 類）、danaparoid 也可但 argatroban 為標準答案。答案 argatroban。","112-1#24":"<b>neostigmine</b> 既抑制 AChE（增加 ACh），又能<b>直接活化神經肌肉接合處的尼古丁受體</b>，雙重作用治重症肌無力。edrophonium 太短效（用於診斷）、physostigmine 偏中樞。答案 neostigmine。","112-1#27":"口乾要用擬膽鹼促效增加唾液（pilocarpine、cevimeline、neostigmine）。<b>atropine</b> 是抗膽鹼，會<b>更口乾</b>，無法緩解（D）。","112-1#28":"theophylline 作用：中樞興奮（神經緊張）、支氣管擴張改善換氣、利尿、強心。<b>抑制胃酸分泌不是其作用</b>（反而可能刺激胃酸），故 D 錯。","112-1#29":"胃潰瘍病人仍須用 NSAID 時，最佳保護是<b>PPI（omeprazole）</b>——抑酸力最強、預防 NSAID 潰瘍效果最好。H2 阻斷劑（famotidine/ranitidine）較弱。答案 omeprazole。","112-1#32":"<b>rituximab</b> 是抗 <b>CD20（B 淋巴細胞）</b>單株抗體，治類風濕關節炎。tocilizumab（抗IL-6R）、infliximab/adalimumab（抗TNF）。答案 rituximab。","112-1#33":"codeine 止咳是其<b>本身</b>或經 CYP2D6 代謝成嗎啡後活化 <b>mu（μ）受體</b>所致，並非「活化 kappa」（B 錯）。其餘 naloxone 拮抗、morphine 活化 μ、fentanyl 效力約 100 倍皆正確。","112-1#38":"<b>phenobarbital</b>（巴比妥）能治大發作（grand mal），且為強力<b>肝酵素誘導劑</b>，長期使用<b>加速 warfarin、digitalis 代謝</b>。答案 phenobarbital。","112-1#40":"<b>infliximab</b> 是抗 <b>TNF-α</b> 單株抗體，直接結合中和 TNF-α。thalidomide（減 TNF 生成但機轉不同）、muromonab（抗 CD3）、sirolimus（mTOR）。答案 infliximab。","112-1#45":"pramlintide（amylin 類似物）與 insulin 併用是<b>延緩（而非縮短）胃排空</b>、抑制升糖素、增飽足，控制餐後血糖。C 說「縮短胃排空」方向相反，故錯。","112-1#47":"<b>evolocumab</b> 是抗 <b>PCSK9</b> 單抗，PCSK9 本會促 LDL 受體降解；抑制 PCSK9 → <b>保留更多 LDL 受體</b> → 清除更多 LDL。答案 evolocumab。","112-1#57":"amiodarone 主要代謝途徑是<b>N-deethylation</b>，生成活性代謝物 desethylamiodarone（DEA）。答案 N-deethylation。","112-1#79":"paclitaxel 經 <b>CYP2C8</b> 氧化成 6α-hydroxypaclitaxel（CYP3A4 則代謝側鏈）。答案 CYP2C8。","112-2#1":"題目問會<b>抑制自身代謝酵素</b>者。一般 carbamazepine 是自我<b>誘導</b>；但本題官方答案為 clopidogrel——其經 CYP2C19 活化並對部分 CYP 有抑制，長期需注意調整。記憶以官方答案 clopidogrel（B）為準。","112-2#3":"<b>nafcillin</b>（抗葡萄球菌 penicillin，與 oxacillin/dicloxacillin 同類）本身<b>耐 β-lactamase</b>，治產酶葡萄球菌不需加抑制劑。amoxicillin/piperacillin/penG 易被酶分解。答案 nafcillin。","112-2#5":"治 MRSA 可用 vancomycin、dalbavancin、ceftaroline（第五代頭孢，特殊可抗 MRSA）。<b>aztreonam（monobactam）只抗革蘭氏陰性菌</b>，對 MRSA（陽性）無效。答案 aztreonam。","112-2#6":"治腦膜炎需高脂溶性、過 BBB。<b>cefepime（第四代頭孢）</b>脂溶性佳、過 BBB 好。tetracycline/aminoglycoside（amikacin）過 BBB 差、azithromycin 組織分布廣但腦膜濃度低。答案 cefepime。","112-2#9":"niacin 是<b>減少 HDL 的分解代謝 → 使 HDL 上升</b>，B 說「促進 HDL 分解代謝」與升 HDL 矛盾，故錯。其餘降 TG/LDL/Lp(a)、抑 VLDL、升尿酸皆正確。","112-2#10":"<b>pentostatin</b> 抑制 <b>adenosine deaminase（ADA）</b> → dATP 堆積毒殺淋巴細胞，用於毛細胞白血病與抗排斥。答案 抑制 adenosine deaminase。","112-2#11":"<b>amiodarone</b> 抑制 CYP2C9 → 減少 warfarin 代謝 → <b>增強</b>抗凝（出血風險↑）。cholestyramine（減吸收）、primidone/rifampin（誘導酶減效）皆是減弱。答案 amiodarone。","112-2#12":"甲狀腺功能不足（hypothyroidism）要<b>補充甲狀腺素</b>＝<b>levothyroxine（T4）</b>。methimazole（抗甲狀腺，用於亢進）方向相反。答案 levothyroxine。","112-2#14":"Paget disease（骨變形）第一線是<b>雙磷酸鹽（bisphosphonate）</b>＝<b>tiludronate</b>（抑制破骨細胞）。cinacalcet（鈣敏感受體促效）、raloxifene（SERM）非首選。答案 tiludronate。","112-2#15":"黏液水腫昏迷＝嚴重甲狀腺功能低下急症，需快速補<b>甲狀腺素 levothyroxine</b>（靜注）。答案 levothyroxine。","112-2#16":"amiodarone 副作用：肺纖維化、甲狀腺異常（亢進或低下）、肝毒、角膜沉積、心搏<b>過緩</b>（非過速）。A「心搏過速」非其副作用（它是抗心律不整、減慢心跳），故為答案。","112-2#22":"digoxin 毒性與低血鉀相關（loop/thiazide 排鉀會加重）。<b>spironolactone（保鉀）不會造成低血鉀</b>，較不增加 digoxin 毒性（D）。注意它會抑制 digoxin 排泄但本題以「不會增加毒性」選保鉀者。","112-2#25":"散瞳作用<b>最長久</b>的抗膽鹼眼藥＝<b>scopolamine</b>（與 atropine 同屬長效，達數天）。tropicamide 最短、homatropine/cyclopentolate 中短效。答案 scopolamine。","112-2#26":"PPI <b>半衰期很短（約 1-2 小時）</b>，但因<b>不可逆</b>結合質子幫浦，作用時間長。B 說「半衰期超過 8 小時」錯。其餘前驅藥、食物降生體可用率、餐前服用皆正確。","112-2#28":"COX-2 抑制劑（coxib）<b>反而增加血栓栓塞風險</b>（抑 PGI₂ 但不抑 TXA₂ 失衡），D 說「不易引起血管栓塞」錯。其餘少胃潰瘍、仍有腎毒、celecoxib 經 CYP2C9 皆正確。","112-2#32":"carbidopa <b>不過 BBB</b>，在<b>周邊抑制 DOPA decarboxylase</b> → 減少 levodopa 在周邊轉成 dopamine（保留更多進腦）（C 正確）。A 錯（不過 BBB）、B 錯（不是抑 MAO-B）、D 錯（需與 levodopa 併用）。","112-2#33":"癲癇重積症（status epilepticus）第一線是<b>BZD</b>＝<b>diazepam</b>（或 lorazepam/midazolam）快速止痙。答案 diazepam。","112-2#36":"ACh 的<b>合成</b>酶是 choline acetyltransferase，<b>代謝（分解）</b>酶是 <b>acetylcholinesterase</b>。B 把合成酶當代謝酶，故錯。其餘 DA→MAO-B、NE→COMT、5-HT→MAO-A 皆正確。","112-2#59":"gemfibrozil 含羧酸基，但<b>脂溶性高、水溶性差</b>。A 說「具極佳水溶性」錯。其餘作用 PPARα、經 CYP3A4、與 statin 併用易橫紋肌溶解皆正確。","112-2#61":"acetazolamide 結構修飾以增加眼內滲透——本題為結構式圖題，官方答案位置 <b>c</b>（導入甲基增脂溶性利於滲入眼液，如 methazolamide）。答案 c。","112-2#63":"分子量大小：<b>未分餾 heparin（大）＞ 低分子量肝素 dalteparin（中）＞ fondaparinux（五醣，最小）</b>。答案 heparin＞dalteparin＞fondaparinux（C）。","112-2#79":"造成<b>有絲分裂停止（M 期阻斷）</b>的是作用於微管的<b>vinblastine</b>（抑制紡錘體形成）。doxorubicin/mitoxantrone（topo II/嵌入）、cytarabine（S 期）非 M 期。答案 vinblastine。","113-1#2":"<b>tetracycline（抑菌型）＋vancomycin（殺菌型）</b>無協同（抑菌會干擾殺菌劑作用於增殖菌），故 D 不具協同。其餘 TMP+SMX、AmphoB+flucytosine、piperacillin+tazobactam 皆協同。答案 D。","113-1#3":"對 penicillin 全身性過敏的革蘭氏陰性肺炎病人，首選<b>aztreonam（monobactam）</b>——與 penicillin <b>無交叉過敏</b>且專抗陰性菌。ceftriaxone（頭孢仍有交叉過敏風險）。答案 aztreonam。","113-1#5":"fluoroquinolone 中抗綠膿桿菌最強者＝<b>ciprofloxacin</b>（第二代，抗陰性/Pseudomonas 最佳）。moxifloxacin 偏抗陽性/厭氧但不覆蓋綠膿桿菌。答案 ciprofloxacin。","113-1#6":"erlotinib/osimertinib（EGFR-TKI）、cetuximab（抗 EGFR 單抗）皆作用於 EGFR。<b>imatinib</b> 作用於 <b>BCR-ABL/c-KIT/PDGFR</b>，非 EGFR，故為答案。","113-1#7":"cyclophosphamide 抗藥機轉：GSH 增加、運輸蛋白減少、DNA 修復增強。<b>glutathione S-transferase 應該活性增加（解毒）</b>才造成抗藥，C 說「活性降低」方向相反，故為錯誤敘述。","113-1#10":"rosuvastatin 主要<b>不經 CYP3A4</b>（少量 CYP2C9，大部分原型排泄），首渡效應低、交互作用少。A 說「CYP3A4 代謝具首渡效應」錯（那是 simvastatin/atorvastatin）。","113-1#14":"<b>metformin</b> 不刺激胰島素分泌（不致低血糖）、不增重（甚至略減重），最不易低血糖/增重。insulin、sulfonylurea（glipizide/tolazamide）會低血糖且增重。答案 metformin。","113-1#19":"furosemide 排 K⁺、H⁺ → 造成<b>低血鉀代謝性鹼中毒（alkalosis）</b>，而非「酸中毒（acidosis）」。A「hypokalemic metabolic acidosis」錯（應為 alkalosis）。其餘耳毒、高尿酸、低血鎂皆其副作用。","113-1#20":"acetazolamide 抑制碳酸酐酶 → HCO₃⁻ 流失 → <b>尿液鹼化（alkaline urine）</b>，並非「酸化」。B 說「使尿液酸化」錯。其餘抑 CA、致腎結石、防高山症皆正確。","113-1#23":"治攝護腺肥大（BPH）選<b>α₁A/α₁D 選擇性拮抗劑</b>＝<b>tamsulosin</b>（鬆弛攝護腺平滑肌，較少低血壓）。phentolamine（非選擇性）、phenylephrine（促效）、brimonidine（α₂）。答案 tamsulosin。","113-1#24":"青光眼要用擬膽鹼（縮瞳促房水外流）：pilocarpine/carbachol/echothiophate。<b>scopolamine</b> 是抗膽鹼（散瞳、升眼壓），<b>最不適合、甚至禁用</b>於青光眼（D）。","113-1#31":"局麻加 epinephrine 好處：收縮血管延長藥效、減吸收降毒性、減出血。<b>不是「與局麻結合保護不被分解」</b>（C 機轉錯誤）——它靠血管收縮，非化學結合。","113-1#34":"phenytoin 阻斷鈉通道，<b>既抗癲癇也有抗心律不整（Class IB）作用</b>（A 正確）。B 錯（對 absence 無效甚至惡化）、C 錯（CBZ 是誘導加速代謝非抑制）、D 錯（副作用是牙齦增生/多毛非禿髮）。","113-1#43":"<b>tetrazole</b> 是 <b>carboxylic acid（-COOH）</b>的生物等價物（bioisostere），酸性相近但代謝較穩定（如 losartan 的 tetrazole 取代羧酸）。答案 R-COOH。","113-1#75":"<b>demeclocycline</b>（過期變質的四環素）最易產生 <b>Fanconi-like syndrome</b>（近端腎小管功能障礙）。答案 demeclocycline。","113-2#3":"含 <b>NMTT（甲硫四唑）側鏈</b>的頭孢（cefotetan、cefamandole、cefoperazone）會干擾維生素 K → <b>增加 warfarin 出血</b>，最不宜。答案 cefotetan（D）。","113-2#5":"aminoglycoside 是<b>濃度依賴型（concentration-dependent）</b>殺菌，故每日單次高劑量給藥。D 說「時間依賴型」錯。其餘抗陰性好氧菌、併 furosemide 增腎毒、tobramycin 抗藥可改 amikacin 皆正確。","113-2#11":"<b>cholestyramine</b>（膽酸結合樹脂）會干擾脂溶性維生素（含 vit K）吸收、並可能促<b>膽結石</b>形成。答案 cholestyramine。","113-2#12":"<b>denosumab</b> 是抗 <b>RANKL</b> 單株抗體，阻止破骨細胞活化，治骨質疏鬆。bevacizumab（VEGF）、golimumab（TNF）。答案 denosumab。","113-2#14":"sulfonylurea 機轉＝<b>阻斷胰臟β細胞 ATP 依賴型 K⁺ 通道</b> → 細胞去極化 → 鈣內流 → 促胰島素分泌（A 正確）。B 錯（glyburide 強於 tolbutamide）、C 錯（用於第二型）、D 錯（口服有效）。","113-2#15":"<b>dulaglutide</b>（-glutide，GLP-1 受體促效劑）為<b>皮下注射</b>，非口服降血糖藥。saxagliptin/metformin/glyburide 皆口服。答案 dulaglutide。","113-2#19":"<b>thiazide-like（chlorthalidone）</b>增加 DCT 鈣再吸收 → <b>降尿鈣</b>，可治高尿鈣型腎結石。loop（torsemide）反而增尿鈣。答案 chlorthalidone。","113-2#21":"<b>dronedarone</b> 是 amiodarone 去碘衍生物，<b>缺碘原子、半衰期較短</b>（甲狀腺/肺副作用較少），但對失代償心衰增加死亡率（禁用）。D 正確。","113-2#24":"COPD 支氣管擴張用<b>抗膽鹼 LAMA</b>＝<b>tiotropium</b>（M 受體拮抗，鬆弛支氣管）。bethanechol/neostigmine（擬膽鹼會收縮）、solifenacin（治膀胱過動）。答案 tiotropium。","113-2#26":"預防 NSAID 胃潰瘍的<b>前列腺素類似物</b>＝<b>misoprostol</b>（PGE₁ 類似物，補回被 NSAID 抑制的保護性 PG）。答案 misoprostol。","113-2#33":"valproate 可<b>治療躁鬱症（bipolar）</b>（B 正確）。A 錯（副作用是體重<b>增加</b>、<b>脫</b>髮非毛髮增生）、C 錯（valproate <b>抑制</b>酶、升高 phenytoin/lamotrigine）、D 錯（對 myoclonic 有效，廣效）。","113-2#34":"phenytoin 阻斷鈉通道機轉是<b>延長（而非縮短）鈉通道不活化狀態</b>，使神經元不易連續放電。B 說「縮短不活化狀態」與機轉相反，故為錯誤敘述。","113-2#36":"<b>levodopa</b> 長期使用會出現<b>on-off 現象</b>與劑末惡化（藥效波動）。DA 促效劑（bromocriptine/pergolide）波動較少。答案 levodopa。","113-2#38":"BZD 結合 GABA_A 受體 → 增加<b>氯離子（Cl⁻）</b>通道開啟頻率 → 細胞過極化 → 抑制神經。答案 氯離子。","113-2#43":"morphine 的胺基 pKa 約 8，在生理 pH（7.4）下主要<b>質子化帶正電（+1）</b>。答案 +1。","113-2#47":"bumetanide 為 loop 利尿劑結構題，官方答案 D「第5位導入 furanylmethyl 取代活性增加」為<b>錯誤</b>敘述（與實際構效不符）。記憶以官方答案 D 為錯。","113-2#49":"morphine 14β 導入 OH（如 oxymorphone 方向）會增加極性但<b>實際鎮痛活性增強</b>而非降低，B 描述「鎮痛活性降低」為錯誤敘述。其餘 N-phenethyl 增效、成癮與 μ 相關、便秘不耐受皆正確。","113-2#54":"前驅藥（prodrug）：<b>primidone</b>（代謝成 phenobarbital）、<b>fosphenytoin</b>（代謝成 phenytoin）。③primidone④fosphenytoin＝答案 B。topiramate、thiopental 非前驅藥。","113-2#57":"長期服 fluvastatin（statin，經 CYP 代謝）者，避免併用<b>強 CYP3A4 抑制劑 clarithromycin</b>（大環內酯）→ 升高 statin 濃度 → 橫紋肌溶解。答案 clarithromycin。","113-2#61":"兩性化合物＝同時有酸性與鹼性基（如胺基酸、β-lactam）。ampicillin、ciprofloxacin、fexofenadine 皆兩性。<b>fosinopril</b>（ACEI）含磷酸基，主要酸性，<b>非兩性</b>。答案 fosinopril。","113-2#69":"COX-2 抑制強度由強到弱：<b>②diclofenac ＞ ④indomethacin ＞ ③ibuprofen ＞ ①aspirin</b>。答案 ②④③①（D）。","113-2#70":"<b>adalimumab</b>（-umab，全人源 fully human）。certolizumab（-zumab 人源化但含 PEG 片段）、infliximab/rituximab（-ximab 嵌合）。答案 adalimumab。","113-2#79":"<b>cidofovir</b> 經腎小管分泌排泄，與 <b>probenecid</b> 併用會競爭分泌（probenecid 反而是用來<b>減少</b>腎毒，但題意指與 probenecid 處理相關之高腎毒藥）——cidofovir 本身腎毒性最強。答案 cidofovir。","113-2#80":"<b>ribavirin</b> 干擾病毒 RNA 合成（抑制 RNA 聚合酶/IMP dehydrogenase）。acyclovir/idoxuridine/vidarabine 為 DNA 病毒/核苷類。答案 ribavirin。","114-2#3":"治綠膿桿菌（Pseudomonas）：<b>piperacillin</b>（抗假單胞菌 penicillin，常配 tazobactam）。cefamandole（第二代不抗綠膿）、teicoplanin/linezolid（只抗陽性）皆無效。答案 piperacillin。","114-2#4":"leucovorin 救援的是<b>methotrexate（MTX）</b>——MTX 抑制 DHFR，leucovorin 提供還原型葉酸繞過 DHFR，救正常細胞。答案 methotrexate。","114-2#5":"cisplatin 的特徵是<b>腎毒性與耳毒性</b>，並非「hypotension（低血壓）」。B 配對「cisplatin：hypotension」錯誤。其餘 cyclophosphamide-出血性膀胱炎、bleomycin-肺纖維化、doxorubicin-心毒性皆正確。","114-2#7":"clindamycin、chloramphenicol、linezolid 皆作用於<b>50S 核糖體</b>（B 正確）。A 錯（doxy/mino 抗藥是因脂溶性高/外排幫浦差異非結合力強）、C 錯（doxycycline 可與食物併服）、D 錯（tigecycline 半衰期較長）。","114-2#8":"<b>vorapaxar</b> 抑制血小板 <b>PAR-1（凝血酶受體）</b>（A 正確）。B 錯（ticagrelor 抑 P2Y12 非 GPIIb/IIIa）、C 錯（clopidogrel 抑 P2Y12 非 PDE）、D 錯（tirofiban 抑 GPIIb/IIIa 非 TXA₂）。","114-2#12":"作用於 <b>sulfonylurea 受體</b>促胰島素釋放者＝<b>glyburide</b>（磺醯脲類）。metformin（AMPK）、liraglutide（GLP-1）、rosiglitazone（PPARγ）機轉不同。答案 glyburide。","114-2#13":"<b>semaglutide</b>（-glutide）是 <b>GLP-1 受體促效劑</b>。glipizide（SU）、dapagliflozin（SGLT2）、miglitol（α-glucosidase）。答案 semaglutide。","114-2#15":"鈉通道阻斷強度（0 期去極化抑制）：<b>Class IC（flecainide）＞ IA（quinidine）＞ IB（lidocaine）</b>。答案 flecainide＞quinidine＞lidocaine（A）。","114-2#17":"<b>abciximab</b> 抑制血小板 <b>glycoprotein IIb/IIIa</b>（最終共同路徑，阻血小板聚集）（B 正確）。A 錯（dipyridamole 主要抑 PDE/腺苷攝取，描述本身對但題比較）、C 錯（dabigatran 為口服）、D 錯（rivaroxaban 為口服）。","114-2#18":"最不易低血鉀者＝<b>保鉀利尿劑 eplerenone</b>（醛固酮拮抗）。thiazide/furosemide/acetazolamide 皆排鉀致低血鉀。答案 eplerenone。","114-2#23":"<b>dobutamine</b> 是<b>β₁ 選擇性促效劑</b>，增強心收縮力，治心因性休克。isoproterenol（非選擇β）、metaproterenol（β₂）、metoprolol（β阻斷）。答案 dobutamine。","114-2#24":"選擇性 β₁ 阻斷且<b>無局部麻醉（膜穩定）作用</b>者＝<b>nebivolol</b>（還兼具 NO 血管擴張）。propranolol（有膜穩定作用）、nadolol/sotalol（非選擇性）。答案 nebivolol。","114-2#25":"<b>amifampridine（3,4-DAP）</b>阻鉀通道 → 延長神經末梢去極化 → <b>增加 ACh 釋放</b>，治 Lambert-Eaton 肌無力症候群（突觸前鈣通道抗體致 ACh 釋放不足）。答案 amifampridine。","114-2#26":"無直接擴張支氣管但能<b>穩定肥大細胞（mast cell stabilizer）</b>者＝<b>nedocromil</b>（與 cromolyn 同類，預防性抗發炎）。ipratropium（抗膽鹼）、albuterol（β₂）、zileuton（5-LOX 抑制）。答案 nedocromil。","114-2#31":"<b>fluoxetine</b> 是典型 <b>SSRI</b>。mirtazapine（NaSSA）、trazodone（SARI）、duloxetine（SNRI）。答案 fluoxetine。","114-2#35":"治躁鬱症：lithium、valproate、carbamazepine、lamotrigine。<b>phenytoin</b> 是抗癲癇藥，<b>不用於躁鬱症</b>。答案 phenytoin。","114-2#36":"躁鬱症首選 lithium，但本病人有<b>腎絲球腎炎（腎功能不佳）</b>，lithium 經腎排泄且腎毒，<b>不適合</b>，故改<b>carbamazepine</b>（情緒穩定劑、非腎排泄為主）。答案 carbamazepine。","114-2#37":"治失神性小發作（absence）：ethosuximide、valproate、lamotrigine。<b>phenytoin</b> 對 absence <b>無效甚至惡化</b>，不適用。答案 phenytoin。","114-2#48":"急性嚴重氣喘要用<b>快速起效</b>的 β₂ 促效劑。<b>salmeterol（LABA）起效慢</b>，不可用於急救（延誤可致命）。formoterol 雖長效但起效快尚可，salmeterol 最不建議。答案 salmeterol。","114-2#50":"alfentanil 脂溶性雖較 sufentanil 低，但<b>非離子化比例高、起效快，更快穿過 BBB</b>（C 正確）。它與 μ 受體親和力較 sufentanil 弱、為 μ 促效（非 κ）。答案 C。","114-2#51":"<b>morphine-6-glucuronide（M6G）比 morphine 對 opioid 受體親和力更高</b>、鎮痛更強。A 說「morphine 親和力較高」與事實相反，故為錯誤敘述。其餘 heroin 是前驅藥、codeine 經代謝、normorphine 為 N-去甲基產物皆正確。","114-2#61":"Liddle syndrome＝集尿管 <b>ENaC 過度活化</b>（與醛固酮無關）。治療用<b>直接阻斷 ENaC 的 amiloride</b>（spironolactone 對此無效，因非醛固酮問題）。答案 amiloride。","114-2#62":"eplerenone 對 mineralocorticoid 受體之<b>親和力比 spironolactone 弱（但選擇性高、副作用少）</b>。C 說「親和力比 spironolactone 強」錯。其餘 epoxy 基、spirolactone 環、CYP3A4 代謝皆正確。","114-2#64":"statin 脂溶性最<b>低</b>（最親水）者＝<b>rosuvastatin</b>（與 pravastatin 同屬親水性，較少肌肉/CNS 副作用）。lovastatin/simvastatin/fluvastatin 較脂溶。答案 rosuvastatin。","114-2#65":"tamoxifen 是前驅藥，主要靠<b>CYP2D6</b>（非 CYP3A4）活化成 endoxifen。B 說「主要靠 CYP3A4 活化」錯（CYP2D6 才是關鍵，故 parox 應症：癲癇（部分發作）、三叉神經痛、躁鬱症。<b>不治帕金森氏症</b>（D）。答案 帕金森氏症。","115-1#50":"<b>acarbose</b> 是 <b>α-glucosidase 抑制劑</b>（延緩腸道醣類分解吸收，降餐後血糖）。metformin（AMPK）、sitagliptin（DPP-4）、pioglitazone（PPARγ）。答案 acarbose。","115-1#56":"valacyclovir 是 acyclovir 的<b>L-valine 酯前驅藥</b>，主要優點是<b>提高口服生體可用率</b>（約 3-5 倍）。答案 提高口服生體可用率。","115-1#57":"esmolol 確實是前驅藥需 esterase 水解——但題問「錯誤」者，本題官方答案 C：esmolol 為<b>酯類但其活性在原型，水解後反而失活</b>（esmolol 本身有活性，被 esterase 水解成無活性代謝物）。故「需經 esterase 水解才有活性」描述錯誤。其餘 atenolol β₁選擇、propranolol 非選擇且最脂溶易入 CNS 皆正確。","115-1#65":"statin 多經 <b>CYP3A4</b> 代謝，若被抑制（如 clarithromycin、葡萄柚汁）→ statin 濃度升高 → <b>橫紋肌溶解</b>。答案 CYP3A4。","115-1#69":"alteplase（tPA）是<b>組織纖溶酶原活化劑、為蛋白酶、可基因重組製造</b>，但<b>不是單株抗體</b>。C 說「為單株抗體藥」錯。"};
/* ---- 詳解產生器 ---- */
function examExplain(q){
  var ansIdx='ABCD'.indexOf(q[3]);
  var correctText=(q[5]&&q[5][ansIdx]!=null)?String(q[5][ansIdx]).trim():'';
  var secLabel=(typeof EXAM_SEC_LABEL!=='undefined'&&EXAM_SEC_LABEL[q[2]])?EXAM_SEC_LABEL[q[2]]:'綜合';
  // 優先採用手寫機轉詳解（高頻基本分 201 題）
  var key=q[0]+'#'+q[1];
  if(typeof EXAM_EXP!=='undefined' && EXAM_EXP[key]){
    var raw=EXAM_EXP[key];
    // 依句號斷句，把每一句邏輯獨立成段，方便閱讀
    var sentences=raw.split('。').map(function(t){return t.trim();}).filter(function(t){return t;});
    var paras=sentences.map(function(t){return '<p class="exp-p">'+t+'。</p>';}).join('');
    return '<div class="exp-head">【'+q[0]+' 國考第'+q[1]+'題 · '+secLabel+'】　官方答案 <b>('+q[3]+')</b></div>'
         + '<div class="exp-body">'+paras+'</div>';
  }
  var stem=q[4]||'';
  // 判斷題型：找出最正確 vs 找出錯誤
  var isErr=/錯誤|不正確|不適合|不可|不是|無法|最不|非|不屬於|何者不/.test(stem);
  var lead;
  if(isErr){
    lead='本題要選出<b>錯誤／不符合</b>的敘述。';
  } else {
    lead='本題要選出<b>正確／最符合</b>的選項。';
  }
  var ansLine='官方標準答案為 <b>('+q[3]+')</b>'+(correctText?'：「'+correctText+'」':'')+'。';
  var hint='';
  if(isErr){
    hint='（提示：選項('+q[3]+')所述內容與正確藥理機轉或臨床事實不符，故為應選的錯誤敘述；其餘選項皆為正確敘述，可一併記憶。）';
  } else {
    hint='（提示：('+q[3]+')最符合題幹的機轉、用途或結構特性；建議對照其餘選項，理解為何被排除，加深記憶。）';
  }
  return '【'+q[0]+' 國考第'+q[1]+'題 · '+secLabel+'】<br>'
        + lead + '<br>' + ansLine + '<br>'
        + '<span style="color:#666">'+hint+'</span>';
}

function examPick(i){
  if(TOOL.answered) return;
  var q=TOOL.pool[TOOL.qi];
  var ansIdx='ABCD'.indexOf(q[3]);
  TOOL.picked=i; TOOL.answered=true;
  var dunno=(i===-1);            // 「不知道」
  var correct=(!dunno && i===ansIdx);
  if(correct) TOOL.score++;
  recordExam(q[2], correct);
  if(TOOL.mode==='core') recordExam('__core__', correct);
  if(!correct){
    // 答錯或「不知道」都收進錯題本
    var wid='exam_'+q[0]+'_'+q[1];
    if(typeof WRONGBOOK!=='undefined'){
      if(!WRONGBOOK.some(function(w){return w.id===wid;})){
        WRONGBOOK.push({id:wid, sec:q[2]||'other', q:q[4], opts:q[5], ans:ansIdx,
          exp:examExplain(q), from:'考古題'+(dunno?'（不知道）':'')});
        if(typeof saveWrongBook==='function') saveWrongBook();
      }
    }
  }
  renderTool();
}
function examNext(){
  if(TOOL.qi>=TOOL.pool.length-1){ TOOL.stage='done'; }
  else { TOOL.qi++; TOOL.answered=false; TOOL.picked=undefined; }
  renderTool();
  var box=document.getElementById('exam-scroll'); if(box) box.scrollTop=0;
  window.scrollTo(0,0);
}

  if(TOOL.stage==='run'){

    h+='<div class="exam-run">';
    h+='<div class="exam-runbar"><span>'+title+'</span><span>'+(TOOL.qi+1)+' / '+TOOL.pool.length+'　✓'+TOOL.score+'</span></div>';
    h+='<div class="exam-progress"><div class="exam-progress-fill" style="width:'+Math.round((TOOL.qi)/TOOL.pool.length*100)+'%"></div></div>';
    h+='<div id="exam-scroll" class="exam-qbox">';
    h+='<div class="exam-qtag">'+q[0]+' 第'+q[1]+'題 · '+(EXAM_SEC_LABEL[q[2]]||'綜合')+'</div>';
    h+='<div class="exam-stem">'+escapeHtmlE(q[4])+'</div>';
    h+='<div class="exam-opts">';
    q[5].forEach(function(o,i){
      var cls='exam-opt';
      if(TOOL.answered){
        if(i===ansIdx) cls+=' correct';
        else if(i===TOOL.picked) cls+=' wrong';
      }
      h+='<button class="'+cls+'" onclick="examPick('+i+')"'+(TOOL.answered?' disabled':'')+'>'
        +'<span class="eo-letter">'+'ABCD'[i]+'</span>'+escapeHtmlE(o)+'</button>';
    });
    // 「不知道」選項：避免亂猜矇對，選了會收進錯題本
    var dunnoCls='exam-opt exam-dunno'+((TOOL.answered&&TOOL.picked===-1)?' wrong':'');
    h+='<button class="'+dunnoCls+'" onclick="examPick(-1)"'+(TOOL.answered?' disabled':'')+'>'
      +'<span class="eo-letter">?</span>不知道（誠實作答，收進錯題本）</button>';
    h+='</div>';
    if(TOOL.answered){
      var ok=(TOOL.picked===ansIdx);
      var dunno=(TOOL.picked===-1);
      h+='<div class="exam-feedback '+(ok?'ok':'no')+'">'
        +(ok?'✓ 答對':(dunno?'｜ 已標記「不知道」（已收進錯題本）':'✗ 答錯（已收進錯題本）'))
        +'　|　官方答案：<b>'+q[3]+'</b></div>';
      h+='<div class="exam-explain">'+examExplain(q)+'</div>';
      h+='<button class="exam-next" onclick="examNext()">'+(TOOL.qi>=TOOL.pool.length-1?'看成績 →':'下一題 →')+'</button>';
    }
    h+='</div></div>';
    return h;
  }

  if(TOOL.stage==='done'){
    var pct=Math.round(TOOL.score/TOOL.pool.length*100);
    var pass=pct>=60;
    var h=head+'<div class="exam-done">';
    h+='<div class="exam-done-emoji">'+(pct>=80?'🎉':pass?'💪':'📖')+'</div>';
    h+='<div class="exam-done-score" style="color:'+(pass?'#15803d':'#b91c1c')+'">'+pct+'%</div>';
    h+='<div class="exam-done-pass">'+(pass?'✓ 達國考及格標準（60%）':'未達 60%，建議加強此範圍')+'</div>';
    h+='<div class="exam-done-detail">答對 '+TOOL.score+' / '+TOOL.pool.length+' 題　·　答錯已收進錯題本</div>';
    h+='<button class="exam-next" onclick="examStart(\''+TOOL.mode+'\',\''+(TOOL.key||'')+'\')">🔁 再做一次</button>';
    h+='<button class="exam-next" style="background:#fff;color:'+ac+';border:1.5px solid '+ac+'" onclick="TOOL.stage=\'menu\';renderTool()">← 回考古題選單</button>';
    if(typeof WRONGBOOK!=='undefined' && WRONGBOOK.length)
      h+='<button class="exam-next" style="background:#fff;color:#b45309;border:1.5px solid #b45309" onclick="openTool(\'wrong\')">📕 看錯題本（'+WRONGBOOK.length+'）</button>';
    h+='</div>';
    return h;
  }
  return head;
}

function _treeNodeHTML(node, path, depth){
  var hasKids = (node.c && node.c.length) || (node.d && node.d.length);
  var open = !!TREE_OPEN[path];
  var pad = 8 + depth*16;
  var accent = ['#0e7490','#7c3aed','#b45309','#be185d','#15803d','#1e40af'][depth%6];
  var h='';
  if(hasKids){
    h += '<div class="tree-row" style="padding-left:'+pad+'px;border-left:3px solid '+accent+'33" onclick="treeToggle(\'' + path + '\')">'
       + '<span class="tree-caret">'+(open?'\u25be':'\u25b8')+'</span>'
       + '<span class="tree-label" style="color:'+accent+'">'+node.t+'</span>'
       + (node.d&&node.d.length?'<span class="tree-count">'+node.d.length+'</span>':'')
       + '</div>';
    if(open){
      h += '<div class="tree-children">';
      if(node.c) node.c.forEach(function(ch,i){ h += _treeNodeHTML(ch, path+'/'+i, depth+1); });
      if(node.d && node.d.length){
        h += '<div class="tree-drugs" style="padding-left:'+(pad+22)+'px">';
        node.d.forEach(function(dn){ h += '<span class="tree-drug">'+dn+'</span>'; });
        h += '</div>';
      }
      h += '</div>';
    }
  } else {
    h += '<div class="tree-row leaf" style="padding-left:'+pad+'px"><span class="tree-label" style="color:#475569">'+node.t+'</span></div>';
  }
  return h;
}
function renderDrugTree(){
  var h='<div class="tool-head"><button class="tool-back" onclick="closeTool()">\u2039 \u8fd4\u56de</button>'
    + '<div class="tool-title">\u85e5\u7269\u7e3d\u89bd\u30fb\u5fc3\u667a\u5716</div></div>';
  h += '<div class="tree-intro">\u9ede\u5206\u985e\u9010\u5c64\u5c55\u958b\uff0f\u518d\u9ede\u6536\u5408\uff0c\u53ef\u540c\u6642\u958b\u591a\u500b\uff0c\u6700\u672b\u5c64\u986f\u793a\u85e5\u7269\u3002\u5171 19 \u5927\u985e \u00b7 495 \u500b\u85e5</div>';
  h += '<div class="tree-ctrl">'
    + '<button class="tree-ctrl-btn" onclick="treeExpandAll(true)">\u5168\u90e8\u5c55\u958b</button>'
    + '<button class="tree-ctrl-btn" onclick="treeExpandAll(false)">\u5168\u90e8\u6536\u5408</button>'
    + '</div>';
  h += '<div class="tree-wrap">';
  DRUG_TREE.forEach(function(cat,i){ h += _treeNodeHTML(cat, 't/'+i, 0); });
  h += '</div>';
  return h;
}

  function fs2(z){return on(z)?COL[z].bg:'#ffffff';}

    urate:['急性：Colchicine(抑微管)/NSAID/類固醇','慢性降尿酸：Allopurinol/Febuxostat(抑XO)','促排泄：Probenecid(抑腎小管再吸收)','Colchicine不降尿酸；Allopurinol+Azathioprine危險'],
    acid:['PPI→不可逆抑 H⁺/K⁺-ATPase(最強)','H2阻斷劑→抑組織胺刺激泌酸','Misoprostol(PGE1)→護胃黏膜','Omeprazole降Clopidogrel；Misoprostol孕婦禁用'],
    airway:['ICS(吸入類固醇)→抗發炎為控制核心','β2致效→擴張支氣管(LABA不可單用)','LAMA(抗膽鹼)/Montelukast(抗白三烯)','Theophylline治療指數窄']
  };
  var L=[],body=[],y=58;
  function tapG(z){return '<g onclick="miscToggle(\''+z+'\')" style="cursor:pointer">';}
  function phys(cy,x,w,label,sub){
    var s='<rect x="'+x+'" y="'+(cy-15)+'" width="'+w+'" height="30" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.4"/>';
    s+='<text x="'+(x+w/2)+'" y="'+(cy+(sub?-2:4))+'" text-anchor="middle" font-size="10.5" font-weight="800" fill="#475569" font-family="sans-serif">'+label+'</text>';
    if(sub)s+='<text x="'+(x+w/2)+'" y="'+(cy+10)+'" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="sans-serif">'+sub+'</text>';
    return s;
  }
  function arrow(x1,y1,x2,y2){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#94a3b8" stroke-width="2" marker-end="url(#mscA)"/>';}
  function box(z,x,w,cy,title,sub){
    var h=36;var s=tapG(z);
    s+='<rect x="'+x+'" y="'+(cy-h/2)+'" width="'+w+'" height="'+h+'" rx="10" fill="'+fs2(z)+'" stroke="'+lc(z)+'" stroke-width="'+(on(z)?2.6:1.5)+'"/>';
    s+='<text x="'+(x+w/2)+'" y="'+(cy-2)+'" text-anchor="middle" font-size="11" font-weight="800" fill="'+tx(z)+'" font-family="sans-serif">'+title+'</text>';
    s+='<text x="'+(x+w/2)+'" y="'+(cy+11)+'" text-anchor="middle" font-size="8" fill="'+tx(z)+'" font-family="sans-serif">'+(on(z)?'▼ 點此關閉':sub)+'</text>';
    s+='</g>';return s;
  }
  function popup(z,topY){
    if(!on(z))return{svg:'',h:0};
    var lines=POP[z]||[];var lineH=15,headH=20,h=headH+lines.length*lineH+12,x=14,w=W-28;

  function band(txt,sub){
    var s='<rect x="14" y="'+(y-16)+'" width="'+(W-28)+'" height="24" rx="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>';

    body.push(s);y+=30;

  var BX=100, BW=150;

  // ── 第一段：花生四烯酸級聯（cox）──
  band('NSAID｜花生四烯酸級聯','膜磷脂→COX→前列腺素');
  var a1=y; body.push(phys(a1,BX-BW/2,BW,'膜磷脂','phospholipid'));
  y+=40; body.push(arrow(BX,a1+15,BX,y-15));
  var a2=y; body.push(phys(a2,BX-BW/2,BW,'花生四烯酸','arachidonic acid'));
  // 類固醇擋上游（磷脂酶A2）— 標在 a1→a2 之間，屬 cox zone 的旁注
  body.push(box('cox',210,136,(a1+a2)/2,'NSAID / 類固醇','點此展開'));
  body.push('<line x1="210" y1="'+((a1+a2)/2)+'" x2="'+(BX+30)+'" y2="'+((a1+a2)/2)+'" stroke="'+lc('cox')+'" stroke-width="'+(on('cox')?2.2:1.1)+'" stroke-dasharray="4 3"/>');
  y+=40; body.push(arrow(BX,a2+15,BX,y-15));
  var a3=y; body.push(phys(a3,BX-BW/2,BW,'COX-1 / COX-2',''));
  y+=40; body.push(arrow(BX,a3+15,BX,y-15));
  var a4=y; body.push(phys(a4,BX-BW/2,BW,'前列腺素 PG','護胃/發炎/熱痛'));
  // 抑制符號標在 COX
  body.push('<circle cx="'+(BX+BW/2+10)+'" cy="'+a3+'" r="7.5" fill="#fff" stroke="'+lc('cox')+'" stroke-width="'+(on('cox')?2.2:1.3)+'"/>');
  body.push('<line x1="'+(BX+BW/2+6)+'" y1="'+a3+'" x2="'+(BX+BW/2+14)+'" y2="'+a3+'" stroke="'+lc('cox')+'" stroke-width="'+(on('cox')?2.2:1.3)+'"/>');
  y+=30;
  (function(){var p=popup('cox',y);if(p.h){body.push(p.svg);y+=p.h+10;}})();

  // ── 其餘三條小徑：痛風/腸胃/呼吸 ──
  band('痛風｜尿酸代謝','急性抗發炎＋慢性降尿酸');
  var u1=y; body.push(phys(u1,BX-BW/2,BW,'普林→(XO)→尿酸',''));
  body.push(box('urate',210,136,u1,'痛風用藥','點此展開'));
  body.push('<line x1="210" y1="'+u1+'" x2="'+(BX+BW/2)+'" y2="'+u1+'" stroke="'+lc('urate')+'" stroke-width="'+(on('urate')?2.2:1.1)+'" stroke-dasharray="4 3"/>');
  y+=30;
  (function(){var p=popup('urate',y);if(p.h){body.push(p.svg);y+=p.h+10;}})();

  band('腸胃｜胃酸分泌','壁細胞 H⁺/K⁺-ATPase');
  var g1=y; body.push(phys(g1,BX-BW/2,BW,'壁細胞泌酸',''));
  body.push(box('acid',210,136,g1,'腸胃用藥','點此展開'));
  body.push('<line x1="210" y1="'+g1+'" x2="'+(BX+BW/2)+'" y2="'+g1+'" stroke="'+lc('acid')+'" stroke-width="'+(on('acid')?2.2:1.1)+'" stroke-dasharray="4 3"/>');
  y+=30;
  (function(){var p=popup('acid',y);if(p.h){body.push(p.svg);y+=p.h+10;}})();

  band('呼吸｜氣喘控制','抗發炎＋支氣管擴張');
  var r1=y; body.push(phys(r1,BX-BW/2,BW,'發炎＋支氣管收縮',''));
  body.push(box('airway',210,136,r1,'呼吸用藥','點此展開'));

  y+=30;
  (function(){var p=popup('airway',y);if(p.h){body.push(p.svg);y+=p.h+10;}})();

  // 底部 應用直覺
  y+=4;var bh=74;

  body.push('<text x="24" y="'+(y+54)+'" font-size="9" fill="#78716c" font-family="sans-serif">痛風急性別動尿酸（Colchicine/NSAID）；慢性才降尿酸</text>');
  body.push('<text x="24" y="'+(y+70)+'" font-size="9" fill="#78716c" font-family="sans-serif">氣喘控制核心＝吸入類固醇；LABA 不可單用</text>');

  var H=y;

  L.push(body.join('\n'));
  L.push('</svg>');
  return L.join('\n');
}

function miscToggle(id){
  var st=STATE.misc;
  if(!st._open) st._open={};
  st._open[id]=!st._open[id];
  var svgWrap=document.getElementById("nephron-svg-wrap");
  if(svgWrap) svgWrap.innerHTML=buildMiscSVG(st._open);
  var legend=document.getElementById("nephron-legend");
  if(legend) legend.innerHTML=buildMapLegend("misc",null);
  var detail=document.getElementById("nephron-detail");
  if(detail) detail.innerHTML=buildMiscMultiDetail(st._open);
}
function buildMiscMultiDetail(openMap){
  openMap=openMap||{};
  var ids=["cox","urate","acid","airway"].filter(function(z){return openMap[z];});
  if(!ids.length) return "<div style=\"text-align:center;padding:20px;color:#bbb;font-size:13px\">點擊上方攻擊點查看詳細說明（可同時展開多個）</div>";
  return ids.map(function(z){return buildGenericDetailPanel("misc",z);}).join("<div style=\"height:10px\"></div>");
}

function buildMockPool(n){
  // 使用真實高頻考古題（基本分），轉成 mock 題型格式
  var all=[];
  if(typeof EXAM_CORE!=='undefined' && EXAM_CORE.length){
    EXAM_CORE.forEach(function(q){
      all.push({sec:q[2]||'other', q:q[4], opts:q[5], ans:'ABCD'.indexOf(q[3]),
        exp:'【'+q[0]+' 國考第'+q[1]+'題】官方答案：'+q[3], type:'真題', _exam:q[0], _num:q[1]});
    });
  }
  // 若高頻題庫不足，補上自編題
  if(all.length<n){
    ALL_SECS.forEach(function(sec){
      var qz=SECTIONS[sec]&&SECTIONS[sec].quiz;
      if(!qz) return;
      qz.forEach(function(q){ all.push({sec:sec, q:q.q, opts:q.opts, ans:q.ans, exp:q.exp||'', type:q.type||''}); });
    });
  }
  for(var i=all.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=all[i];all[i]=all[j];all[j]=t;}
  return all.slice(0, Math.min(n, all.length));
}
function startMock(n){
  TOOL={kind:'mock', stage:'run', pool:buildMockPool(n), qi:0, score:0, answered:false, picked:undefined, n:n};
  renderTool(); window.scrollTo(0,0);
}
function mockPick(i){
  if(TOOL.answered) return;
  TOOL.picked=i; TOOL.answered=true;
  var q=TOOL.pool[TOOL.qi];
  if(i===q.ans) TOOL.score++;
  else addWrong(q.sec, q);
  renderTool();
}
function mockNext(){
  if(TOOL.qi===TOOL.pool.length-1){ TOOL.stage='done'; }
  else { TOOL.qi++; TOOL.answered=false; TOOL.picked=undefined; }
  renderTool(); window.scrollTo(0,0);
}

/* ════════════════════════════════════════════
   弱點儀表板：整合 考古題正確率 + 閃卡信心 → 每章掌握度
════════════════════════════════════════════ */
function sectionMastery(secId){
  // exam component
  if(typeof EXAM_STATS==='undefined' || !EXAM_STATS) { if(typeof loadExamStats==='function') loadExamStats(); }
  var ex=(EXAM_STATS&&EXAM_STATS[secId])||{seen:0,right:0};
  var examRate = ex.seen>0 ? ex.right/ex.seen : null;

  // flashcard confidence component
  var conf={};
  try{ var raw=localStorage.getItem('pharma_'+secId+'_conf'); if(raw) conf=JSON.parse(raw); }catch(e){}
  var total=0,score=0,rated=0;
  // total cards = drugs in section
  var nCards = (typeof SECTIONS!=='undefined'&&SECTIONS[secId]&&SECTIONS[secId].drugs)?SECTIONS[secId].drugs.length:0;
  for(var k in conf){
    if(!conf.hasOwnProperty(k)) continue;
    rated++;
    if(conf[k]==='good') score+=1; else if(conf[k]==='mid') score+=0.5;
  }
  var confRate = rated>0 ? score/rated : null;

  // combine: weight by amount of evidence
  var parts=[], weights=[];
  if(examRate!==null){ parts.push(examRate); weights.push(Math.min(ex.seen,20)); }
  if(confRate!==null){ parts.push(confRate); weights.push(Math.min(rated,15)); }
  if(!parts.length) return {pct:null, ex:ex, rated:rated, nCards:nCards};
  var num=0,den=0;
  for(var i=0;i<parts.length;i++){ num+=parts[i]*weights[i]; den+=weights[i]; }
  return {pct:Math.round(num/den*100), ex:ex, rated:rated, nCards:nCards, examRate:examRate, confRate:confRate};
}

function masteryColor(pct){
  if(pct===null) return '#cbd5e1';
  if(pct>=70) return '#15803d';
  if(pct>=50) return '#d97706';
  return '#dc2626';
}
function masteryLabel(pct){
  if(pct===null) return '未開始';
  if(pct>=70) return '穩固';
  if(pct>=50) return '加強中';
  return '弱點';
}

function buildDashboard(){
  var order=['ans','cns','pk','mc','abx','cancer','coag','diur','infx','lipid','dm','epi','misc','tgt','immu'];
  var rows=[], anyData=false, weak=[], overallNum=0, overallDen=0;
  order.forEach(function(s){
    var m=sectionMastery(s);
    if(m.pct!==null){ anyData=true; overallNum+=m.pct; overallDen++; if(m.pct<50) weak.push(s); }
    rows.push({sec:s,m:m});
  });

  var h='<div class="dash-box">';
  h+='<div class="dash-head"><span class="dash-title">📊 我的掌握度</span>';
  if(anyData){
    var overall=Math.round(overallNum/overallDen);
    h+='<span class="dash-overall" style="color:'+masteryColor(overall)+'">約 '+overall+'%</span>';
  }
  h+='</div>';

  if(!anyData){
    h+='<div class="dash-empty">做幾題<b>考古題</b>或翻幾張<b>閃卡</b>後，這裡會顯示各章掌握度，幫你找出最該補強的章節。</div>';
    h+='<button class="dash-cta" onclick="openExam()">📚 開始做考古題</button>';
    h+='</div>';
    return h;
  }

  // weak-spot hint
  if(weak.length){
    var names=weak.slice(0,3).map(function(s){return (EXAM_SEC_LABEL&&EXAM_SEC_LABEL[s])||s;}).join('、');
    h+='<div class="dash-weak">⚠️ 最該補強：<b>'+names+'</b>　→ 建議優先練這幾章的考古題</div>';
  }

  // bars
  h+='<div class="dash-bars">';
  rows.forEach(function(r){
    var pct=r.m.pct, col=masteryColor(pct);
    var label=(EXAM_SEC_LABEL&&EXAM_SEC_LABEL[r.sec])||r.sec;
    var w = pct===null?0:pct;
    var sub = pct===null?'未開始':(r.m.ex.seen?('考古'+r.m.ex.right+'/'+r.m.ex.seen):'')+(r.m.rated?(' 閃卡'+r.m.rated):'');
    h+='<div class="dash-row" onclick="enterSection(\''+r.sec+'\')">'
      +'<span class="dash-name">'+label+'</span>'
      +'<span class="dash-track"><span class="dash-fill" style="width:'+w+'%;background:'+col+'"></span></span>'
      +'<span class="dash-pct" style="color:'+col+'">'+(pct===null?'—':pct+'%')+'</span>'
      +'</div>';
  });
  h+='</div>';
  h+='<div class="dash-foot">數字＝考古題正確率＋閃卡信心綜合估計 · 點章節進入複習</div>';
  h+='</div>';
  return h;
}

function enterSection(id){

  closeAll(id);

  block.classList.add('open');
  renderSection(id);
  enterFocus(id);
}

function switchSection(id){
  closeSecMenu();

  if(!body||!block) return;
  body.classList.add('open');

  enterFocus(id);

}

    // anchor the menu just below the header's actual bottom (only if measurable)
    try{
      var hr=hd?hd.getBoundingClientRect():null;
      if(hr && hr.bottom>0) m.style.top=(hr.bottom+6)+'px';
    }catch(e){}
    m.removeAttribute('hidden'); if(bd) bd.removeAttribute('hidden');
    hd&&hd.classList.add('menu-open'); btn&&btn.setAttribute('aria-expanded','true');
  }else{ closeSecMenu(); }
}
function closeSecMenu(){
  var m=document.getElementById('secmenu');
  var bd=document.getElementById('secmenu-backdrop');
  var hd=document.getElementById('focus-header');
  var btn=document.getElementById('focus-titlebtn');
  if(m) m.setAttribute('hidden','');
  if(bd) bd.setAttribute('hidden','');
  hd&&hd.classList.remove('menu-open'); btn&&btn.setAttribute('aria-expanded','false');
}

/* goHome: exit focus mode back to home grid */
function goHome(){
  closeSecMenu();
  exitFocus();
}

function syncBottomNav(id){
  highlightSecMenu(id);
}
function toggleNav(){ toggleSecMenu(); }


/* Override exitFocus to go back to home */
var _origExitFocus=exitFocus;
exitFocus=function(){
  _focusSec=null;
  closeSecMenu();
  _origExitFocus();
  document.querySelectorAll('.secmenu-btn').forEach(function(b){b.classList.remove('on');});
  renderHome();
};

/* goTab: no bottom nav override needed */

/* Initial render */
renderHome();

</script>
