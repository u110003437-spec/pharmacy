   steps:['阻斷神經元 <strong>電壓依賴性 Na⁺ 通道</strong>（細胞內側）→ 阻斷動作電位','兩類：<strong>酯類（procaine 等）</strong>由血漿 esterase 水解、易過敏（PABA）；<strong>醯胺類（lidocaine 等）</strong>由肝代謝、過敏少','發炎組織呈酸性 → 藥物離子化↑ → 局麻效果差','常加 epinephrine 收縮血管 → 延長作用、減少吸收'],
   adv:['CNS：口周麻、耳鳴 → 抽搐（高濃度）','心臟：Bupivacaine 心毒性最強（難復甦）','酯類過敏（PABA）'],
   uses:['Lidocaine：浸潤／表面麻醉、抗心律不整（IB）','Bupivacaine：長效、硬膜外／脊髓麻醉'],
   key:'醯胺類記法：名稱中有「兩個 i」（lidocaine、bupivacaine）→ 肝代謝；酯類一個 i → 血漿水解＋易過敏。Bupivacaine 心毒性最強。發炎／膿瘍處局麻無效（酸性環境）。'},
  {id:'cn11',cat:'anes',cL:'麻醉劑',name:'全身麻醉劑（General Anesthetics）',alias:'Propofol / Ketamine / Etomidate ‖ 吸入性（Sevoflurane / N₂O）',sub:'靜脈 + 吸入',color:CNS_COLORS.anes,
   steps:['<strong>Propofol</strong>：GABA_A 增強 → 誘導快、甦醒快；無止痛、降血壓、注射痛','<strong>Ketamine</strong>：<strong>NMDA 受體拮抗</strong> → 解離麻醉；刺激交感 → 血壓／心跳↑（休克可用）；幻覺','<strong>Etomidate</strong>：心血管穩定，但抑制腎上腺皮質醇合成','吸入性：<strong>血／氣分配係數低 → 誘導與甦醒快</strong>（如 N₂O、desflurane）；MAC 越低效價越高','吸入性可誘發<strong>惡性高熱</strong>（malignant hyperthermia）→ Dantrolene 治療'],
   adv:['Propofol：低血壓、注射痛、丙泊酚輸注症候群','Ketamine：幻覺、顱內壓／眼壓↑、分泌物增加','吸入性：惡性高熱（合併 succinylcholine）'],
   uses:['Propofol：麻醉誘導／維持、ICU 鎮靜','Ketamine：兒童／休克／氣喘麻醉、難治性憂鬱','吸入性：麻醉維持'],
   key:'血／氣分配係數低＝誘導甦醒快（重要概念）。MAC 低＝效價高。Ketamine ＝ NMDA 拮抗＋升血壓（與其他全麻降壓相反）。惡性高熱解藥 ＝ Dantrolene。Propofol 無止痛作用。'},
  {id:'cn12',cat:'aps',cL:'抗精神病',name:'抗精神病藥（Antipsychotics）',alias:'典型 Haloperidol / Chlorpromazine ‖ 非典型 Clozapine / Risperidone / Olanzapine / Quetiapine',sub:'阻斷 D₂ 受體',color:CNS_COLORS.aps,
   steps:['<strong>典型（第一代）</strong>：強力阻斷 <strong>D₂ 受體</strong> → 控制陽性症狀；錐體外症候群（EPS）多','<strong>非典型（第二代）</strong>：阻斷 <strong>D₂ + 5-HT₂A</strong> → EPS 較少、對陰性症狀較好；代謝副作用多','阻斷中腦邊緣 D₂ → 抗精神病；阻斷黑質紋狀體 D₂ → EPS；阻斷結節漏斗 → 泌乳素↑','Clozapine：療效最強（難治型）但有顆粒球缺乏（需監測 CBC）'],
   adv:['EPS：急性肌張力不全、靜坐不能、類巴金森、遲發性運動異常（tardive dyskinesia）','高泌乳素血症（溢乳、月經失調）','惡性症候群（NMS）：高燒、肌僵、CK↑ → Dantrolene／Bromocriptine','非典型：體重增加、糖尿病、血脂異常（Olanzapine／Clozapine 最明顯）','Clozapine：顆粒球缺乏、癲癇、心肌炎；Ziprasidone／Haloperidol：QT 延長'],
   uses:['思覺失調症（陽性＋陰性症狀）','雙相情緒障礙躁期','頑固噁心嘔吐（部分）'],
   key:'典型＝D₂ 阻斷＋EPS 多；非典型＝D₂+5-HT₂A＋代謝副作用多。EPS vs 遲發性運動異常要分清。Clozapine 最有效但需監測白血球。NMS（抗精神病）vs 血清素症候群（血清素藥）要鑑別。'},
  {id:'cn13',cat:'pd',cL:'巴金森/肌鬆',name:'抗巴金森藥（Antiparkinson）',alias:'Levodopa+Carbidopa / Pramipexole / Selegiline / Entacapone / Amantadine',sub:'補多巴胺、抗膽鹼',color:CNS_COLORS.pd,
   steps:['巴金森＝黑質多巴胺神經退化 → DA↓、ACh 相對↑','<strong>Levodopa</strong>：DA 前驅物（DA 不過血腦障壁，L-dopa 可）；加 <strong>Carbidopa</strong>（抑制周邊 dopa decarboxylase，不過 BBB）→ 減少周邊副作用、增加進腦量','<strong>多巴胺致效劑</strong>（Pramipexole／Ropinirole）：直接刺激 D₂','<strong>MAO-B 抑制劑</strong>（Selegiline）、<strong>COMT 抑制劑</strong>（Entacapone）：減少 DA 降解','<strong>抗膽鹼</strong>（Benztropine）：改善震顫；<strong>Amantadine</strong>：促 DA 釋放'],
   adv:['Levodopa：噁心、姿勢性低血壓、異動症（dyskinesia）、開關現象（on-off）、長期療效減退','多巴胺致效劑：衝動控制障礙（賭博／購物）、幻覺、嗜睡','Selegiline 高劑量失去 MAO-B 選擇性 → tyramine 反應'],
   uses:['巴金森氏症（Levodopa／Carbidopa 為核心）','早期可先用多巴胺致效劑（年輕者延後 levodopa）'],
   key:'Carbidopa 抑制「周邊」decarboxylase（不入腦）→ 讓更多 L-dopa 進腦、減少周邊噁心／低血壓。維生素 B6 會加速周邊 L-dopa 代謝（合 carbidopa 則不受影響）。長期 levodopa → 異動症與開關現象。'},
  {id:'cn14',cat:'pd',cL:'巴金森/肌鬆',name:'骨骼肌鬆弛劑（Muscle Relaxants）',alias:'Dantrolene / Baclofen / Tizanidine / Cyclobenzaprine',sub:'中樞 vs 周邊作用',color:CNS_COLORS.pd,
   steps:['<strong>Dantrolene</strong>：唯一<strong>直接作用骨骼肌</strong>者 → 抑制肌漿網 <strong>ryanodine 受體</strong>、Ca²⁺ 釋放↓','<strong>Baclofen</strong>：GABA_B 致效劑（脊髓）→ 緩解痙攣','<strong>Tizanidine</strong>：α₂ 致效（中樞）→ 抗痙攣','<strong>Cyclobenzaprine</strong>：結構似 TCA，抗膽鹼，急性肌肉痙攣短期用'],
   adv:['Dantrolene：肝毒性、肌無力','Baclofen：鎮靜、突停 → 戒斷（幻覺、抽搐）','Tizanidine：低血壓、嗜睡'],
   uses:['Dantrolene：<strong>惡性高熱（首選）</strong>、抗精神病惡性症候群、痙攣','Baclofen／Tizanidine：脊髓損傷／多發性硬化痙攣','Cyclobenzaprine：急性肌肉骨骼痛'],
   key:'Dantrolene 是唯一作用在肌肉（ryanodine 受體／Ca²⁺ 釋放）者 → 惡性高熱與 NMS 的解藥。Baclofen ＝ GABA_B（脊髓），突然停藥危險。'}
];
var CNS_FLASH=[
  {id:'cnf1',type:'compare',q:'⚖️ SSRI vs TCA\n安全性與副作用差異？',a:'SSRI：\n· 只抑制 SERT（5-HT↑）\n· 過量「不致命」（安全）\n· 主要副作用：性功能障礙\n\nTCA：\n· 抑制 SERT+NET，並阻斷 M/H₁/α₁\n· 過量「致命」3C：抽搐/昏迷/心毒性\n· 抗膽鹼、姿勢性低血壓、鎮靜\n\n→ 第一線選 SSRI；TCA 多用於神經痛'},
  {id:'cnf2',type:'mech',q:'血清素症候群有哪些常見誘發藥物組合？',a:'機轉：5-HT 過量\n\n危險組合：\n· SSRI/SNRI + MAOI（最典型）\n· + Tramadol、Meperidine\n· + Linezolid（具MAOI活性）\n· + 聖約翰草、止吐劑\n\n三聯徵：\n① 神經肌肉（陣攣、反射亢進）\n② 自主神經（高燒、出汗、心跳快）\n③ 精神狀態改變\n\n與 NMS 鑑別：SS 起病快、有陣攣/反射亢進'},
  {id:'cnf3',type:'mech',q:'非典型抗憂鬱劑各自的記憶點？\n（Bupropion / Mirtazapine / Trazodone）',a:'Bupropion（NE/DA）：\n· 無性功能障礙、可戒菸\n· 降癲癇閾值 → 癲癇/暴食症禁用\n\nMirtazapine（阻α₂/5-HT₂/5-HT₃）：\n· 助眠、增食慾、增重\n· 用於消瘦+失眠的憂鬱\n\nTrazodone（阻5-HT₂）：\n· 助眠\n· 副作用：priapism（陰莖異常勃起）'},
  {id:'cnf4',type:'compare',q:'⚖️ BZD vs 巴比妥\n在 GABA_A 的差異？',a:'BZD（Diazepam）：\n· Cl⁻ 通道「開放頻率↑」\n· 需 GABA 才作用 → 安全性較高\n· 解毒劑 Flumazenil\n\n巴比妥（Phenobarbital）：\n· Cl⁻ 通道「開放時間↑」\n· 高劑量可不需 GABA 直接開通道\n· 過量更易致死\n\n記憶：BZD=頻率、Barb=時間'},
  {id:'cnf5',type:'compare',q:'⚖️ Zolpidem vs Buspirone\n各自特性？',a:'Zolpidem（Z-drug）：\n· 選擇作用 GABA_A 的 α₁\n· 主要助眠、依賴性較BZD低\n· 副作用：睡眠相關複雜行為（夢遊）\n· 仍可被 Flumazenil 拮抗\n\nBuspirone：\n· 5-HT₁A 部分致效\n· 抗焦慮，無鎮靜/無依賴/無肌鬆\n· 起效慢（1-2週）\n· 適合慢性廣泛性焦慮'},
  {id:'cnf6',type:'mech',q:'嗎啡中毒的三大徵象與解毒劑？\n哪些副作用不會耐受？',a:'三大中毒徵象：\n① 呼吸抑制（致死主因）\n② 昏迷/嗜睡\n③ 針點瞳孔（pinpoint pupil）\n\n解毒劑：Naloxone（IV，半衰期短\n→ 須監測再中毒、可能需重複給）\n\n不會產生耐受的副作用：\n· 便秘（縮瞳也不會）\n\n→ 其他（鎮痛、欣快、呼吸抑制）會耐受'},
  {id:'cnf7',type:'mech',q:'Codeine 為什麼療效因人而異？\nFentanyl / Methadone / Tramadol 各記什麼？',a:'Codeine：\n· 是前驅藥，須 CYP2D6 → 轉成嗎啡\n· 超快代謝者 → 呼吸抑制；\n  弱代謝者 → 無效\n\nFentanyl：脂溶性高、效價最強（~100×）\nMethadone：長效、QT 延長、戒癮維持\nTramadol：弱μ+抑5-HT/NE回收\n→ 血清素症候群、降癲癇閾值'},
  {id:'cnf8',type:'mech',q:'Acetaminophen 過量的肝毒機轉與解毒劑？',a:'機轉：\n常規劑量 → 大多 glucuronide/sulfate 結合\n少量經 CYP2E1 → NAPQI（毒性代謝物）\n→ 正常被 glutathione 中和\n\n過量時：\nglutathione 耗盡 → NAPQI 蓄積\n→ 肝細胞壞死\n\n解毒劑：N-acetylcysteine（NAC）\n（補充 glutathione 前驅物）\n★ 不是維生素C（常見陷阱）'},
  {id:'cnf9',type:'compare',q:'⚖️ 局麻：酯類 vs 醯胺類\n如何區分與代謝？',a:'醯胺類（Amide）：\n· 名稱有「兩個 i」：lidocaine、\n  bupivacaine、ropivacaine\n· 肝臟代謝、過敏少\n· Bupivacaine 心毒性最強\n\n酯類（Ester）：\n· 名稱一個 i：procaine、benzocaine\n· 血漿 esterase 水解\n· 代謝物 PABA → 較易過敏\n\n發炎/膿瘍（酸性）→ 局麻效果差'},
  {id:'cnf10',type:'mech',q:'吸入麻醉劑：血/氣分配係數與 MAC 的意義？',a:'血/氣分配係數（溶解度）：\n· 低 → 血中達平衡快\n→ 誘導與甦醒「快」（如 N₂O、desflurane）\n· 高 → 誘導甦醒慢\n\nMAC（最低肺泡濃度）：\n· 反映「效價」\n· MAC 越低 → 效價越高\n\n惡性高熱：\n吸入麻醉+succinylcholine 誘發\n→ 解藥 Dantrolene'},
  {id:'cnf11',type:'mech',q:'Ketamine 與其他全麻有何關鍵差異？',a:'Ketamine：\n· 機轉：NMDA 受體「拮抗」\n· 解離性麻醉（保留部分反射）\n· 刺激交感 → 血壓/心跳「上升」\n  （其他全麻多降壓 → 休克可用）\n· 支氣管擴張（氣喘可用）\n· 副作用：幻覺、顱內壓/眼壓↑\n  分泌物增加'},
  {id:'cnf12',type:'compare',q:'⚖️ 典型 vs 非典型抗精神病\n機轉與副作用差異？',a:'典型（Haloperidol）：\n· 強阻斷 D₂\n· 錐體外症候群（EPS）多\n· 高泌乳素\n\n非典型（Risperidone/Olanzapine/\nClozapine）：\n· 阻斷 D₂ + 5-HT₂A\n· EPS 較少、對陰性症狀較好\n· 代謝副作用多（增重、糖尿病）\n\nClozapine：最有效但顆粒球缺乏\n（需監測白血球）'},
  {id:'cnf13',type:'compare',q:'⚖️ 惡性症候群(NMS) vs 血清素症候群\n如何鑑別？',a:'NMS（抗精神病/停 levodopa）：\n· D₂ 阻斷過度\n· 高燒、肌「鉛管樣僵直」、CK↑\n· 起病慢（數天）、反射「正常或↓」\n· 治療：Dantrolene、Bromocriptine\n\n血清素症候群（5-HT藥）：\n· 5-HT 過量\n· 高燒、「陣攣、反射亢進」\n· 起病「快」（數小時）\n· 治療：停藥、Cyproheptadine'},
  {id:'cnf14',type:'mech',q:'Levodopa 為何要加 Carbidopa？\nVitamin B6 的影響？',a:'Levodopa：DA 前驅物（DA 不過BBB）\n但周邊就被 dopa decarboxylase\n轉成 DA → 噁心、姿勢性低血壓\n\nCarbidopa：\n· 抑制「周邊」decarboxylase\n· 本身不過 BBB\n→ 更多 L-dopa 進腦、周邊副作用↓\n\nVitamin B6：\n· 是 decarboxylase 輔酶\n· 單用 levodopa 時 → 加速周邊代謝、療效↓\n· 但合用 carbidopa 後不受影響'},
  {id:'cnf15',type:'mech',q:'Dantrolene 的特殊地位？',a:'唯一「直接作用骨骼肌」的肌鬆劑\n\n機轉：\n抑制肌漿網 ryanodine 受體\n→ Ca²⁺ 釋放↓ → 肌肉收縮↓\n\n關鍵用途（必背）：\n① 惡性高熱（首選解藥）\n② 抗精神病惡性症候群(NMS)\n③ 痙攣\n\n副作用：肝毒性、肌無力'},
  {id:'cnsmn90',type:'mech',q:'BZD 半衰期由長到短的口訣?',a:'泡(Prazepam)芙(Flurazepam)>打折(Diazepam)>蘿拉(Lorazepam)>阿胖(Alprazolam)>喔(Oxazepam)、算了(Triazolam)。短效者(Triazolam)用於入睡困難,長效者用於維持睡眠/抗焦慮。'},
  {id:'cnsmn91',type:'mech',q:'唯一會降體重的抗憂鬱藥?機制?',a:'Bupropion(DNRI)。唯一不作用於 5-HT、唯一體重下降,且用於戒菸。代價:降低癲癇閾值,癲癇/暴食症病人禁用。'}
];
var CNS_QUIZ=[
  {type:'機轉',q:'SSRI 類抗憂鬱劑的主要作用機轉為何？',opts:['同時抑制 SERT 與 NET','選擇性抑制 SERT（血清素轉運體）','阻斷突觸後 5-HT₂ 受體','抑制單胺氧化酶 MAO'],ans:1,exp:'SSRI（如 fluoxetine）選擇性抑制突觸前血清素轉運體 SERT，使突觸間隙 5-HT 上升，對 NE/DA/組織胺/膽鹼受體幾乎無作用，故副作用比 TCA 少、過量較安全。'},
  {type:'交互作用',q:'下列何種組合最容易引起血清素症候群（serotonin syndrome）？',opts:['SSRI + 制酸劑','TCA + 抗組織胺','SSRI + MAOI','SSRI + 鐵劑'],ans:2,exp:'SSRI 與 MAOI 併用會使 5-HT 大量累積，引發血清素症候群（高燒、陣攣、反射亢進、自主神經不穩）。兩者須間隔至少 14 天（fluoxetine 因半衰期長須隔約 5 週）。Tramadol、meperidine、linezolid 也是危險組合。'},
  {type:'副作用',q:'關於三環抗憂鬱劑（TCA）過量，下列何者正確？',opts:['過量幾乎不致命','主要毒性為心臟毒性，可用碳酸氫鈉處理','僅引起輕微腸胃不適','解毒劑為 Flumazenil'],ans:1,exp:'TCA 阻斷心臟 Na⁺ 通道，過量導致 QRS 增寬與致命性心律不整（3C：抽搐 Convulsions、昏迷 Coma、心毒性 Cardiotoxicity）。處理以碳酸氫鈉（NaHCO₃）穩定心肌。這也是 TCA 不再是第一線、避免用於自殺風險者的原因。'},
  {type:'選藥',q:'憂鬱症病人擔心性功能障礙且想戒菸，下列何種抗憂鬱劑最適合？',opts:['Paroxetine','Bupropion','Sertraline','Venlafaxine'],ans:1,exp:'Bupropion 作用於 NE/DA 回收抑制，不引起性功能障礙，且可用於戒菸。但會降低癲癇閾值，癲癇病史或暴食症/厭食症病人禁用。'},
  {type:'機轉',q:'Benzodiazepines 與巴比妥類在 GABA_A 受體的作用差異為何？',opts:['BZD 增加 Cl⁻ 開放時間；巴比妥增加開放頻率','BZD 增加 Cl⁻ 開放頻率；巴比妥增加開放時間','兩者皆直接開啟通道','兩者皆作用於 5-HT₁A'],ans:1,exp:'BZD 增加 Cl⁻ 通道「開放頻率」（需有 GABA 存在）；巴比妥增加「開放時間」（高劑量可不需 GABA 直接開通道）。因 BZD 需 GABA 才作用，過量較少致死，安全性較高。解毒劑為 Flumazenil。'},
  {type:'機轉',q:'下列何種抗焦慮藥為 5-HT₁A 部分致效劑，無鎮靜、無依賴性，但起效需 1-2 週？',opts:['Alprazolam','Zolpidem','Buspirone','Diazepam'],ans:2,exp:'Buspirone 是 5-HT₁A 部分致效劑，抗焦慮但不引起鎮靜、肌肉鬆弛或依賴性，缺點是起效慢（1-2 週），適合需長期治療的廣泛性焦慮症病人。'},
  {type:'副作用',q:'嗎啡中毒的典型三聯徵，以及不會產生耐受性的副作用為何？',opts:['散瞳、高血壓、便秘；耐受：呼吸抑制','針點瞳孔、呼吸抑制、昏迷；不耐受：便秘','心搏過速、發燒、腹瀉；不耐受：鎮靜','瞳孔放大、抽搐、低血糖；不耐受：噁心'],ans:1,exp:'嗎啡（μ 受體致效）中毒三聯徵：針點瞳孔（pinpoint pupil）、呼吸抑制（致死主因）、昏迷。解毒劑為 Naloxone。便秘與縮瞳「不會」產生耐受性，鎮痛與呼吸抑制則會。'},
  {type:'機轉',q:'Codeine 的鎮痛與止咳作用，主要依賴下列何種酵素活化？',opts:['CYP3A4','CYP2D6','CYP2C9','血漿 esterase'],ans:1,exp:'Codeine 是前驅藥，須經 CYP2D6 代謝成嗎啡才有強效鎮痛。CYP2D6 超快代謝者用 codeine 易呼吸抑制，弱代謝者則止痛無效，造成療效個體差異。'},
  {type:'解毒',q:'Acetaminophen（普拿疼）過量的肝毒性解毒劑為何？',opts:['維生素 C','N-acetylcysteine（NAC）','維生素 K','Flumazenil'],ans:1,exp:'過量 acetaminophen 經 CYP2E1 產生毒性代謝物 NAPQI，耗盡 glutathione 而造成肝壞死。解毒劑是 N-acetylcysteine（NAC，補充 glutathione 前驅物），不是維生素 C（常見陷阱）。'},
  {type:'分類',q:'下列局部麻醉劑何者屬於醯胺類（amide），由肝臟代謝、較少過敏？',opts:['Procaine','Benzocaine','Lidocaine','Tetracaine'],ans:2,exp:'醯胺類局麻名稱中含「兩個 i」（lidocaine、bupivacaine、ropivacaine），由肝臟代謝、過敏少。酯類（procaine、benzocaine、tetracaine）由血漿 esterase 水解，代謝物 PABA 較易引起過敏。'},
  {type:'機轉',q:'關於吸入性麻醉劑，下列敘述何者正確？',opts:['血/氣分配係數越高，誘導與甦醒越快','MAC 越低代表效價越低','血/氣分配係數越低，誘導與甦醒越快','吸入麻醉劑不會引起惡性高熱'],ans:2,exp:'血/氣分配係數（溶解度）越低，血中越快達平衡，誘導與甦醒越快（如 N₂O、desflurane）。MAC 越低代表效價越高。吸入麻醉劑（尤其合併 succinylcholine）可誘發惡性高熱，以 Dantrolene 治療。'},
  {type:'機轉',q:'Ketamine 與多數全身麻醉劑相比，最大的不同點為何？',opts:['增強 GABA_A 作用','拮抗 NMDA 受體並刺激交感、升高血壓','直接開啟 Cl⁻ 通道','降低血壓與心跳'],ans:1,exp:'Ketamine 機轉為拮抗 NMDA 受體（解離性麻醉），並刺激交感神經使血壓、心跳上升（與多數全麻降壓相反），且具支氣管擴張作用，適合休克、氣喘或兒童麻醉。副作用為幻覺、顱內壓/眼壓上升。'},
  {type:'副作用',q:'Clozapine 雖然對難治型思覺失調最有效，但使用時必須監測下列何者？',opts:['血糖','白血球（顆粒球缺乏症）','血鉀','凝血時間'],ans:1,exp:'Clozapine 可能引起致命性顆粒球缺乏症（agranulocytosis），使用期間須定期監測全血球計數（CBC）。此外也有癲癇、心肌炎與顯著代謝副作用（增重、糖尿病）。'},
  {type:'鑑別',q:'高燒、肌肉鉛管樣僵直、CK 升高，數天內漸進，停用抗精神病藥後發生。最可能診斷與處理？',opts:['血清素症候群；給 SSRI','惡性症候群(NMS)；給 Dantrolene/Bromocriptine','膽鹼性危象；給 atropine','低血糖；給葡萄糖'],ans:1,exp:'這是抗精神病藥惡性症候群（NMS）：D₂ 過度阻斷導致高燒、鉛管樣肌僵直、CK 升高，起病較慢、反射正常或下降。處理以 Dantrolene（鬆弛肌肉）與 Bromocriptine（D₂ 致效）。血清素症候群則起病快、有陣攣/反射亢進。'},
  {type:'機轉',q:'Levodopa 治療巴金森氏症時併用 Carbidopa 的主要目的為何？',opts:['抑制中樞多巴胺代謝','抑制周邊 dopa decarboxylase，減少周邊副作用並讓更多 L-dopa 進入腦部','直接刺激 D₂ 受體','延長 levodopa 半衰期至 24 小時'],ans:1,exp:'Carbidopa 抑制「周邊」的 dopa decarboxylase，本身不通過血腦障壁，使更多 levodopa 能進入腦部轉換成多巴胺，同時減少周邊轉換造成的噁心與姿勢性低血壓。Vitamin B6 是該酶輔酶，單用 levodopa 時會降低療效，但合用 carbidopa 後不受影響。'}
];

   adv:['競爭性拮抗 → 平行右移、Emax 不變','非競爭性拮抗 → Emax 下降','部分致效劑與完全致效劑併用 → 部分致效劑降低總反應'],
   uses:['理解劑量反應曲線圖（國考常考圖判讀）','Phenoxybenzamine = 不可逆 α 拮抗（嗜鉻細胞瘤術前）','Buprenorphine = 部分 μ 致效'],
   key:'競爭性拮抗：曲線右移、Emax 不變、可被高劑量致效劑克服（EC50↑）。非競爭性／不可逆拮抗：Emax 下降、不可克服。部分致效劑在完全致效劑存在時可表現拮抗作用。'},
  {id:'pk02',cat:'pd',cL:'藥效學 PD',name:'效價、效能、治療指數',alias:'Potency / Efficacy / EC50 / TI / ED50 / LD50',sub:'藥效學量化指標',color:PK_COLORS.pd,
   steps:['<strong>效價（potency）</strong>：達到一定效果所需劑量；EC50／ED50 越小 → 效價越高（曲線越左）','<strong>效能（efficacy, Emax）</strong>：能產生的最大反應（與曲線高度有關）','<strong>治療指數 TI ＝ LD50 / ED50</strong>（或 TD50/ED50）；TI 越大越安全','窄治療指數藥（warfarin、digoxin、lithium、phenytoin、theophylline、aminoglycosides）需監測血中濃度'],
   adv:['效價高 ≠ 臨床較佳（效能、安全性更重要）','TI 小 → 安全範圍窄，需 TDM'],

  {id:'pk03',cat:'abs',cL:'吸收/分布',name:'生體可用率與首渡效應',alias:'Bioavailability (F) / First-pass effect',sub:'吸收程度與途徑',color:PK_COLORS.abs,
   steps:['<strong>生體可用率 F</strong>：藥物進入全身循環的比例；靜脈注射 F＝100%','口服藥經腸壁與肝臟代謝 → <strong>首渡效應（first-pass）</strong> → F 下降','首渡效應大的藥（propranolol、lidocaine、nitroglycerin、morphine）口服效果差','舌下、直腸（部分）、經皮、靜脈可「繞過」首渡效應'],
   adv:['F 低 → 口服需更高劑量','首渡效應大 → 改用其他給藥途徑（如 nitroglycerin 舌下）'],

   key:'IV 的 F＝100%（基準）。首渡效應大的藥（硝化甘油、propranolol、lidocaine、morphine）改用舌下/靜脈/經皮避開肝臟。F = (口服 AUC / 靜脈 AUC) × (劑量校正)。'},
  {id:'pk04',cat:'abs',cL:'吸收/分布',name:'分布體積 Vd 與血漿蛋白結合',alias:'Volume of distribution / Protein binding',sub:'藥物在體內分布',color:PK_COLORS.abs,
   steps:['<strong>Vd ＝ 體內總藥量 / 血漿藥物濃度</strong>（表觀體積，非真實體積）','Vd 大 → 藥物多分布到組織（脂溶性高、組織結合多）；Vd 小 → 多留在血漿（水溶性、血漿蛋白結合高）','血漿蛋白結合高（如 warfarin 結 albumin）→ Vd 小；只有「游離型」有藥理活性','蛋白結合競爭 → 游離型↑ → 作用/毒性↑（如 warfarin 被置換）'],
   adv:['Vd 大 → 血液透析難移除（如 digoxin）','低白蛋白血症 → 游離型藥物↑ → 毒性風險','肥胖、水腫、年齡會改變 Vd'],
   uses:['計算負荷劑量（Loading dose = Vd × 目標濃度 / F）','判斷中毒能否用透析移除'],

  {id:'pk05',cat:'met',cL:'代謝/排除',name:'藥物代謝：Phase I / II 與 CYP450',alias:'CYP450 inducers / inhibitors / Phase I & II',sub:'肝臟代謝與交互作用',color:PK_COLORS.met,
   steps:['<strong>Phase I</strong>（氧化、還原、水解；主要 CYP450）→ 多使藥物失活，產生官能基','<strong>Phase II</strong>（接合：glucuronidation、sulfation、acetylation）→ 增加水溶性利排除','<strong>CYP 誘導劑</strong>（加速他藥代謝、降效）：rifampin、carbamazepine、phenytoin、phenobarbital、St. John草、慢性酒精、吸菸','<strong>CYP 抑制劑</strong>（升高他藥濃度、增毒）：azole 抗黴菌、macrolide（erythromycin/clarithromycin）、grapefruit juice、cimetidine、ritonavir、amiodarone'],
   adv:['誘導劑 → 併用藥失效（如降低口服避孕藥、warfarin 效果）','抑制劑 → 併用藥中毒（如升高 statin、warfarin 濃度）','前驅藥被誘導/抑制 → 效果相反（如 codeine 需活化）'],
   uses:['判斷藥物交互作用方向','解釋療效不足或毒性'],
   key:'誘導劑（rifampin、抗癲癇老藥、St. John草）→ 加速代謝、降效；抑制劑（azole、macrolide、grapefruit、cimetidine）→ 升濃度、增毒。前驅藥（codeine）方向相反。這是國考交互作用題核心。'},
  {id:'pk06',cat:'met',cL:'代謝/排除',name:'清除率、半衰期與排除動力學',alias:'Clearance / Half-life / Zero vs First-order',sub:'藥物消除速率',color:PK_COLORS.met,
   steps:['<strong>清除率 CL</strong>：單位時間清除藥物的血漿體積（L/h）；決定維持劑量','<strong>半衰期 t½ ＝ 0.693 × Vd / CL</strong> → 受 Vd 與 CL 共同影響','<strong>一級動力學（first-order）</strong>：消除速率與濃度成正比，t½ 固定（多數藥）','<strong>零級動力學（zero-order）</strong>：固定量／時間被代謝，酶飽和，t½ 隨濃度變（phenytoin、乙醇、高劑量 aspirin、theophylline）','約 4-5 個 t½ 達穩定狀態，也約需 4-5 個 t½ 排除'],
   adv:['零級動力學藥小幅加量 → 濃度暴增（phenytoin 易中毒）','腎/肝功能差 → CL↓ → t½↑ → 蓄積'],
   uses:['計算維持劑量（= CL × 目標濃度 / F）','估算達穩態與藥物洗出時間'],
   key:'t½ = 0.693·Vd/CL。一級＝比例消除、t½固定；零級＝定量消除、酶飽和、t½可變（phenytoin、酒精、高劑量aspirin）。維持劑量由 CL 決定；負荷劑量由 Vd 決定。4-5 個 t½ 達穩態。'},
  {id:'pk07',cat:'kin',cL:'動力學計算',name:'劑量計算：負荷與維持劑量',alias:'Loading dose / Maintenance dose / 尿液pH與排除',sub:'臨床計算題',color:PK_COLORS.kin,
   steps:['<strong>負荷劑量 ＝ (Vd × 目標血中濃度) / F</strong>（快速達到目標濃度，與 Vd 有關，與腎肝功能無關）','<strong>維持劑量速率 ＝ (CL × 目標濃度) / F</strong>（補充被清除的量，與 CL 有關）','腎功能差時：負荷劑量「不需」調整，維持劑量需「減量」','<strong>尿液 pH 與離子捕捉</strong>：弱酸（aspirin、phenobarbital）中毒 → 鹼化尿液（NaHCO₃）促排；弱鹼（amphetamine）→ 酸化尿液促排'],
   adv:['負荷劑量過大 → 急性中毒','離子捕捉用於加速毒物排除'],
   uses:['ICU/抗生素劑量計算','中毒處理（尿液 pH 調整）'],
   key:'負荷劑量看 Vd（與腎功能無關）；維持劑量看 CL（腎肝差需減）。離子捕捉：酸性藥鹼化尿（NaHCO₃）排得快、鹼性藥酸化尿排得快 ——「同性相斥」記法：要排出帶電（離子化）的形式留在尿中。'},
  {id:'pk08',cat:'dev',cL:'藥物開發/臨床試驗',name:'臨床試驗分期與藥物開發',alias:'Phase I-IV clinical trials',sub:'新藥開發流程',color:PK_COLORS.dev,
   steps:['<strong>臨床前</strong>：動物試驗（安全、藥動）','<strong>第一期</strong>：20-100 名「健康自願者」，測安全性與劑量範圍（特例：抗癌藥用病人）','<strong>第二期</strong>：約 100-300 名「病人」，測初步療效與劑量','<strong>第三期</strong>：數百至數千名病人，雙盲隨機對照，確立療效與安全 → 申請上市','<strong>第四期</strong>：上市後監測，偵測罕見／長期副作用（藥物警戒）'],
   adv:['每期目的不同（安全 vs 療效 vs 確認 vs 監測）','第四期才能發現罕見不良反應'],
   uses:['判斷各期目的與受試對象（國考常考敘述對錯）'],
   key:'第一期＝健康自願者測安全；第二期＝病人測初步療效；第三期＝大規模雙盲確立療效安全；第四期＝上市後監測罕見/長期副作用。受試對象（健康者 vs 病人）與人數是常見考點。'}

var PK_FLASH=[
  {id:'pkf1',type:'compare',q:'⚖️ 競爭性 vs 非競爭性拮抗\n對劑量反應曲線的影響？',a:'競爭性拮抗（可逆）：\n· 與致效劑搶「同一位點」\n· 曲線「平行右移」\n· Emax「不變」、EC50↑\n· 可被「增加致效劑劑量」克服\n\n非競爭性/不可逆拮抗：\n· Emax「下降」\n· 「無法」被增加劑量克服\n· 例：phenoxybenzamine(不可逆α)\n\n圖判讀必考！'},
  {id:'pkf2',type:'mech',q:'部分致效劑（partial agonist）特性？\n為何在完全致效劑存在時像拮抗劑？',a:'部分致效劑：\n· 即使佔滿受體，Emax 仍較低\n· 單獨給：產生部分反應\n\n在完全致效劑存在時：\n· 競爭受體但只給「部分」反應\n· 把完全致效劑擠掉\n→ 總反應「下降」→ 表現如拮抗\n\n例：buprenorphine(部分μ致效)\n   varenicline(部分尼古丁致效)'},
  {id:'pkf3',type:'mech',q:'治療指數 TI 公式？\n哪些是窄治療指數藥？',a:'TI = LD50 / ED50\n（分母是有效劑量，分子是致死劑量）\n→ TI 越大越安全\n\n★陷阱：別寫反了\n\n窄治療指數藥（需TDM）：\n· Warfarin、Digoxin、Lithium\n· Phenytoin、Theophylline\n· Aminoglycosides\n\n→ 安全範圍窄，須監測血中濃度'},
  {id:'pkf4',type:'mech',q:'生體可用率F與首渡效應？\n哪些途徑可繞過？',a:'生體可用率 F：\n進入全身循環的比例\n· IV → F = 100%(基準)\n· 口服 → 經腸壁+肝臟代謝↓\n\n首渡效應大的藥：\nPropranolol、Lidocaine、\nNitroglycerin、Morphine\n→ 口服效果差\n\n繞過首渡的途徑：\n舌下、經皮、直腸(部分)、靜脈\n(例：硝化甘油用舌下)'},
  {id:'pkf5',type:'mech',q:'分布體積 Vd 大小的意義？\n與負荷劑量、透析的關係？',a:'Vd = 體內總藥量 / 血漿濃度\n（表觀體積）\n\nVd 大：\n· 組織分布多(脂溶性高)\n· 透析「難」移除(如digoxin)\n\nVd 小：\n· 留血漿(水溶性、高蛋白結合)\n\n負荷劑量 = Vd × 目標濃度 / F\n→ 由 Vd 決定(與腎功能無關)\n\n只有「游離型」藥物有活性'},
  {id:'pkf6',type:'compare',q:'⚖️ CYP 誘導劑 vs 抑制劑\n各舉例與後果？',a:'誘導劑(加速代謝→降效)：\n· Rifampin\n· Carbamazepine/Phenytoin/\n  Phenobarbital\n· 聖約翰草、慢性酒精、吸菸\n→ 使warfarin、避孕藥失效\n\n抑制劑(升濃度→增毒)：\n· Azole抗黴菌\n· Macrolide(erythromycin等)\n· Grapefruit juice、Cimetidine\n· Amiodarone、Ritonavir\n→ 使statin、warfarin中毒\n\n前驅藥(codeine)方向相反'},
  {id:'pkf7',type:'compare',q:'⚖️ 一級 vs 零級消除動力學\n哪些藥是零級？',a:'一級(first-order)：\n· 消除速率 ∝ 濃度\n· t½「固定」\n· 多數藥物\n\n零級(zero-order)：\n· 固定「量」/時間被代謝(酶飽和)\n· t½「隨濃度變」\n· 小幅加量→濃度暴增\n\n零級藥(必背)：\nPhenytoin、乙醇(酒精)、\n高劑量Aspirin、Theophylline'},
  {id:'pkf8',type:'mech',q:'半衰期公式？\n維持劑量與負荷劑量分別由什麼決定？',a:'t½ = 0.693 × Vd / CL\n→ Vd 與 CL 共同決定\n\n負荷劑量(Loading)：\n= Vd × 目標濃度 / F\n→ 由「Vd」決定\n→ 腎肝差「不需」調整\n\n維持劑量(Maintenance)：\n= CL × 目標濃度 / F\n→ 由「CL」決定\n→ 腎肝差「需減量」\n\n約4-5個t½達穩態'},
  {id:'pkf9',type:'mech',q:'中毒時尿液pH調整(離子捕捉)原則？',a:'原理：離子化(帶電)的藥\n不易被腎小管再吸收→留尿排出\n\n弱酸性藥中毒(aspirin、\nphenobarbital)：\n→「鹼化尿液」(給NaHCO₃)\n→ 酸藥在鹼性尿中離子化↑→排出\n\n弱鹼性藥中毒(amphetamine)：\n→「酸化尿液」\n\n記法：酸藥鹼化尿、鹼藥酸化尿\n(讓藥變離子型卡在尿中)'},
  {id:'pkf10',type:'mech',q:'臨床試驗各期目的與受試對象？',a:'第一期(Phase I)：\n· 20-100名「健康自願者」\n· 測安全性、劑量範圍\n· (抗癌藥例外：用病人)\n\n第二期(Phase II)：\n· ~100-300名「病人」\n· 測初步療效\n\n第三期(Phase III)：\n· 大規模、雙盲隨機對照\n· 確立療效與安全→上市申請\n\n第四期(Phase IV)：\n· 上市後監測\n· 偵測罕見/長期副作用'}
];
var PK_QUIZ=[
  {type:'藥效學',q:'某藥為受體的競爭性（可逆）拮抗劑，對致效劑劑量反應曲線的影響為何？',opts:['Emax 下降，無法被增加致效劑劑量克服','曲線平行右移，Emax 不變，可被增加致效劑劑量克服','曲線左移，效價增加','對曲線無影響'],ans:1,exp:'競爭性可逆拮抗劑與致效劑搶同一結合位點，使曲線平行右移、EC50 增加，但 Emax 不變，且可被增加致效劑劑量克服。非競爭性/不可逆拮抗則使 Emax 下降且無法被克服。'},
  {type:'藥效學',q:'治療指數（therapeutic index, TI）的正確定義為何？',opts:['TI = ED50 / LD50','TI = LD50 / ED50','TI = 每日劑量 / ED50','TI = ED50 / 每日劑量'],ans:1,exp:'治療指數 TI = LD50 / ED50（致死劑量除以有效劑量），TI 越大代表安全範圍越廣。把分子分母寫反是最常見的陷阱。Warfarin、digoxin、lithium、phenytoin 等屬窄治療指數藥，需監測血中濃度。'},
  {type:'藥動學',q:'關於分布體積（Vd）的敘述，下列何者正確？',opts:['血漿蛋白結合比例越高，Vd 越大','Vd 大代表藥物多分布到組織，脂溶性通常較高','Vd 是真實的解剖體積','Vd 大的藥物容易用血液透析移除'],ans:1,exp:'Vd = 體內總藥量 / 血漿濃度，是「表觀」體積。Vd 大代表藥物大量分布到組織（脂溶性高），這類藥（如 digoxin）透析難以移除。血漿蛋白結合高的藥多留在血漿，Vd 反而小。'},
  {type:'交互作用',q:'下列何者為 CYP450 酵素「誘導劑」，會加速併用藥物代謝而降低其療效？',opts:['Erythromycin','Ketoconazole','Rifampin','Grapefruit juice'],ans:2,exp:'Rifampin 是強效 CYP 誘導劑，加速併用藥（如 warfarin、口服避孕藥）代謝而降低療效。Erythromycin、ketoconazole（azole）、grapefruit juice 則是 CYP 抑制劑，會升高併用藥濃度而增加毒性。'},
  {type:'藥動學',q:'Phenytoin、乙醇、高劑量 aspirin 共同的藥動學特性為何？',opts:['一級動力學，半衰期固定','零級動力學，代謝酶飽和，半衰期隨濃度改變','不經肝臟代謝','分布體積極大'],ans:1,exp:'這些藥呈零級（zero-order）動力學：代謝酶飽和，固定量/時間被代謝，半衰期隨濃度變化。因此 phenytoin 小幅加量可使血中濃度暴增而中毒，治療窗窄需監測。'},

/* ════════ 分類配對遊戲 (tap-to-pair matching game) ════════ */
/* modes: target(藥→標的) · cancer(藥→癌症) · klass(藥→分類) */
function _shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}

function buildMatchRound(mode){
  var key = mode; // 'target' | 'cancer' | 'klass'
  // pick entries with DISTINCT values in the chosen dimension (avoid ambiguity)
  var pool=_shuffle(TGT_MATCH);
  var seen={}, picked=[];
  for(var i=0;i<pool.length && picked.length<5;i++){
    var v=pool[i][key];
    if(seen[v]) continue;
    seen[v]=1; picked.push(pool[i]);
  }
  // left = drugs (in given order), right = values shuffled
  var left = picked.map(function(p,idx){return {id:idx, drug:p.drug, val:p[key]};});
  var right = _shuffle(picked.map(function(p,idx){return {id:idx, val:p[key]};}));
  return {mode:mode, left:left, right:right, sel:null, matched:{}, wrong:null, done:false};
}

function ensureMatch(sec){
  var s=STATE[sec];
  if(!s._match){ s._match=buildMatchRound('target'); }
  return s._match;
}

function matchPickLeft(sec, lid){
  var m=ensureMatch(sec);
  if(m.matched[lid]!==undefined) return;
  m.sel = (m.sel===lid? null : lid);
  m.wrong=null;
  renderSection(sec);
}
function matchPickRight(sec, val){
  var m=ensureMatch(sec);
  if(m.sel===null){ return; }
  var left=m.left[m.sel];
  if(left.val===val){
    m.matched[m.sel]=val;
    m.sel=null; m.wrong=null;
    // done?
    if(Object.keys(m.matched).length===m.left.length){ m.done=true; }
  } else {
    m.wrong={lid:m.sel, val:val};
    // brief flash then clear selection
    m.sel=null;
  }
  renderSection(sec);
}
function matchNewRound(sec, mode){
  STATE[sec]._match=buildMatchRound(mode||STATE[sec]._match.mode);
  renderSection(sec);
}

function renderMatchGame(sec, data){
  var s=STATE[sec];
  var m=ensureMatch(sec);
  var ac=data.accentColor||'#1a1a18', ab=data.accentBg||'#f5f4f0';
  var modes=[{id:'target',label:'藥 → 標的'},{id:'cancer',label:'藥 → 癌症'},{id:'klass',label:'藥 → 分類'}];

  var html='<div style="margin-bottom:10px">';
  // mode selector
  html+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  modes.forEach(function(md){
    var on=m.mode===md.id;
    html+='<button onclick="matchNewRound(\''+sec+'\',\''+md.id+'\')" '
      +'style="flex:1;padding:9px 4px;border-radius:10px;border:2px solid '+(on?ac:'#e0ded8')+';'
      +'background:'+(on?ab:'#fff')+';color:'+(on?ac:'#888')+';font-size:12px;font-weight:700;cursor:pointer">'
      +md.label+'</button>';
  });
  html+='</div>';

  var total=m.left.length, done=Object.keys(m.matched).length;

  if(m.done){
    html+='<div style="text-align:center;padding:24px 12px;background:'+ab+';border-radius:16px">'
      +'<div style="font-size:40px">🎉</div>'
      +'<div style="font-size:18px;font-weight:800;color:'+ac+';margin:8px 0">全部配對完成！</div>'
      +'<div style="font-size:13px;color:#666;margin-bottom:16px">'+total+' / '+total+' 正確</div>'
      +'<button onclick="matchNewRound(\''+sec+'\')" style="padding:11px 22px;border-radius:12px;border:none;background:'+ac+';color:#fff;font-size:14px;font-weight:700;cursor:pointer">🔀 下一輪</button>'
      +'</div></div>';
    return html;
  }

  // instructions + progress
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:12px;color:#888">點左邊藥物，再點右邊對應'+(m.mode==='target'?'標的':m.mode==='cancer'?'癌症':'分類')+'</span>'
    +'<span style="font-size:12px;font-weight:700;color:'+ac+'">'+done+' / '+total+'</span></div>';

  // two-column board
  html+='<div style="display:flex;gap:10px;align-items:stretch">';
  // LEFT column (drugs)
  html+='<div style="flex:1;display:flex;flex-direction:column;gap:8px">';
  m.left.forEach(function(l){
    var isMatched=m.matched[l.id]!==undefined;
    var isSel=m.sel===l.id;
    var isWrong=m.wrong&&m.wrong.lid===l.id;
    var bg=isMatched?'#dcfce7':(isSel?ab:(isWrong?'#fee2e2':'#fff'));
    var bd=isMatched?'#4ade80':(isSel?ac:(isWrong?'#f87171':'#e0ded8'));
    var col=isMatched?'#166534':(isSel?ac:'#333');
    html+='<button onclick="matchPickLeft(\''+sec+'\','+l.id+')" '+(isMatched?'disabled ':'')
      +'style="padding:13px 10px;border-radius:12px;border:2px solid '+bd+';background:'+bg+';color:'+col+';'
      +'font-size:13px;font-weight:700;cursor:'+(isMatched?'default':'pointer')+';text-align:left;min-height:48px;display:flex;align-items:center;gap:6px">'
      +(isMatched?'<span>✓</span>':'')+'<span>'+l.drug+'</span></button>';
  });
  html+='</div>';
  // RIGHT column (values)
  html+='<div style="flex:1.1;display:flex;flex-direction:column;gap:8px">';
  m.right.forEach(function(r){
    // is this value already matched (locked)?
    var lockedLid=null;
    Object.keys(m.matched).forEach(function(k){ if(m.matched[k]===r.val) lockedLid=k; });
    var isLocked=lockedLid!==null;
    var bg=isLocked?'#dcfce7':'#fff';
    var bd=isLocked?'#4ade80':'#e0ded8';
    var col=isLocked?'#166534':'#333';
    html+='<button onclick="matchPickRight(\''+sec+'\',\''+r.val.replace(/'/g,"\\'")+'\')" '+(isLocked?'disabled ':'')
      +'style="padding:13px 10px;border-radius:12px;border:2px solid '+bd+';background:'+bg+';color:'+col+';'
      +'font-size:12px;font-weight:600;cursor:'+(isLocked?'default':'pointer')+';text-align:left;min-height:48px;display:flex;align-items:center;gap:6px;line-height:1.3">'
      +(isLocked?'<span>✓</span>':'')+'<span>'+r.val+'</span></button>';
  });
  html+='</div>';
  html+='</div>';

  if(m.wrong){
    html+='<div style="text-align:center;font-size:12px;color:#dc2626;margin-top:10px;font-weight:700">✗ 配對錯誤，再試一次</div>';
  }
  html+='<button onclick="matchNewRound(\''+sec+'\')" style="width:100%;margin-top:14px;padding:10px;border-radius:10px;border:1.5px dashed '+ac+';background:#fff;color:'+ac+';font-size:12px;font-weight:700;cursor:pointer">🔀 換一組題目</button>';
  html+='</div>';
  return html;
}

var MISC_QUIZ=[
  {type:'機轉',q:'非選擇性 NSAID 造成腸胃潰瘍與出血的主要原因為何？',opts:['抑制COX-2','抑制COX-1使保護胃黏膜的前列腺素減少','刺激胃酸分泌','直接腐蝕黏膜'],ans:1,exp:'COX-1 持續產生保護胃黏膜的前列腺素(PG)。非選擇性 NSAID 抑制 COX-1 使這些 PG 減少，黏膜防禦下降而導致潰瘍與出血；同時抑制血小板 TXA2 也增加出血。'},

↓SA ↓AV ↓K ↓Ca</td><td>↑PR ↑QRS ↑QT</td><td>有 class I~IV 作用</td><td>Torsade de Pointes</td><td>—</td></tr><tr><td>Sotalol</td><td>↓SA ↓AV ↓K</td><td>↑PR ↑QT</td><td>有 class II+III 作用；降低去顫器閾值</td><td>Torsade de Pointes</td><td>—</td></tr><tr><td>Dofetilide</td><td>↓K</td><td>↑QT</td><td>—</td><td>Torsade de Pointes</td><td>—</td></tr><tr><td>Ibutilide</td><td>↑Na ↓K</td><td>↑QT</td><td>—</td><td>Torsade de Pointes</td><td>心房撲動</td></tr><tr class=\"tbl-group\"><td colspan=\"6\"><span class=\"tg-label\">Class IV（心房 > 心室）<span class=\"tg-count\">2</span></span></td></tr><tr><td>Verapamil</td><td>↓SA ↓AV ↓Ca(L-type)</td><td>↑PR</td><td>心衰竭禁用(負向心肌作用)</td><td>—</td><td>PSVT(陣發性上心室心搏過速)</td></tr><tr><td>Diltiazem</td><td>↓SA ↓AV ↓Ca(L-type)</td><td>↑PR</td><td>—</td><td>—</td><td>PSVT</td></tr><tr class=\"tbl-group\"><td colspan=\"6\"><span class=\"tg-label\">其他<span class=\"tg-count\">3</span></span></td></tr><tr><td>Adenosine</td><td>↓AV ↑K(內流) ↓Ca</td><td>—</td><td>半衰期10秒</td><td>心房顫動</td><td>PSVT</td></tr><tr><td>Ivabradine</td><td>抑制 SA node I_f</td><td>—</td><td>不抑制心肌</td><td>心搏過緩</td><td>—</td></tr><tr><td>Digoxin</td><td>抑制 Na⁺/K⁺ ATPase；抑制 AV node</td><td>—</td><td>—</td><td>腹瀉/嘔吐/黃綠色視覺</td><td>心衰竭；心房顫動</td></tr></tbody></table></div>";


var DX_TABLE = "<div class=\"dx-wrap\">\n\n<div class=\"dx-intro\">國考最常考<b>鑑別</b>與<b>口訣</b>。每格附「為什麼」而非死背。↑↓ = 上升/下降。</div>\n\n<!-- ░░ 1 抗憂鬱藥 ░░ -->\n<div class=\"dx-grp\" data-g=\"抗憂鬱藥\">\n<h3 class=\"dx-h\">🧠 抗憂鬱藥分類鑑別</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>類別</th><th>機轉</th><th>代表（字尾）</th><th>必考點</th></tr></thead>\n<tbody>\n<tr><td><b>TCA</b></td><td>抑制 5-HT + NE 再回收</td><td>~triptyline、~pramine</td><td><span class=\"kp\">神經病變痛<b>一線</b></span><span class=\"kp\">副作用三大類：H 嗜睡、α 姿勢性低血壓、M 抗膽鹼</span><span class=\"kp\">過量 → Class Ia 樣心律不整</span></td></tr>\n<tr><td><b>SNRI</b></td><td>抑制 5-HT + NE（= TCA 加強版，無 H/α/M）</td><td>Duloxetine、Venlafaxine</td><td><span class=\"kp\">神經病變痛一線</span><span class=\"kp\">Venlafaxine：升舒張壓</span></td></tr>\n<tr><td><b>SSRI</b></td><td>只抑制 5-HT 再回收</td><td>~oxetine、~pram</td><td><span class=\"kp\">最安全、第一線首選</span><span class=\"kp\">性功能障礙、初期失眠</span><span class=\"kp\">Fluvoxamine：oxime 結構，需<b>避光</b></span></td></tr>\n<tr><td><b>NaSSA</b></td><td>促進 5-HT/NE 釋放（α2 拮抗）</td><td>Mirtazapine</td><td><span class=\"kp\">嗜睡 + 增體重</span><span class=\"kp\">→ 失眠／食慾差者反而有利</span></td></tr>\n<tr><td><b>DNRI</b></td><td>抑制 DA + NE（<b>唯一不碰 5-HT</b>）</td><td>Bupropion</td><td><span class=\"kp\"><b>唯一體重下降</b></span><span class=\"kp\">用於戒菸</span><span class=\"kp\">降癲癇閾值（癲癇／暴食症禁用）</span></td></tr>\n<tr><td><b>MAOI</b></td><td>抑制 5-HT/NE/DA 分解</td><td>Selegiline、Moclobemide</td><td><span class=\"kp\">配 tyramine → 高血壓危象</span><span class=\"kp\">Selegiline：肝代謝成 amphetamine</span></td></tr>\n</tbody></table>\n<div class=\"dx-mn\">口訣：抗憂鬱起效約 <b>2–4 週</b>，因受體下調需時間（≠ 立刻補神經傳導物）。</div>\n</div>\n\n<!-- ░░ 2 Cephalosporin 世代 ░░ -->\n<div class=\"dx-grp\" data-g=\"頭孢菌素世代\">\n<h3 class=\"dx-h\">🦠 Cephalosporin 各代鑑別</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>世代</th><th>抗菌走向</th><th>代表</th><th>必考特例</th></tr></thead>\n<tbody>\n<tr><td>一代</td><td>偏 G(+)；過 BBB 差</td><td>Cefazolin、Cephalexin</td><td><span class=\"kp\">手術預防首選：Cefazolin</span></td></tr>\n<tr><td>二代</td><td>G(+)↓ G(−)↑</td><td>Cefuroxime、Cefaclor</td><td><span class=\"kp\"><b>兩特例可口服、過 BBB 較好</b></span><span class=\"kp\">Cefuroxime、Cefaclor</span></td></tr>\n<tr><td>三代</td><td>G(−)↑↑，部分入 CNS</td><td>Ceftriaxone、Ceftazidime</td><td><span class=\"kp\">Ceftriaxone：治腦膜炎</span><span class=\"kp\">Ceftazidime：抗綠膿桿菌</span></td></tr>\n<tr><td>四代</td><td>G(+)(−) 廣，抗 β-內醯胺酶</td><td>Cefepime</td><td><span class=\"kp\">抗綠膿桿菌</span></td></tr>\n<tr><td>五代</td><td>涵蓋 <b>MRSA</b></td><td>Ceftaroline</td><td><span class=\"kp\">唯一可打 MRSA 的頭孢</span></td></tr>\n</tbody></table>\n<div class=\"dx-mn\">原理：世代越高 → G(−) 外膜穿透力＋對 β-lactamase 穩定性越好，故抗 G(−) 增強。</div>\n</div>\n\n<!-- ░░ 3 Insulin 起效 ░░ -->\n<div class=\"dx-grp\" data-g=\"胰島素起效\">\n<h3 class=\"dx-h\">🍬 Insulin 起效時間鑑別</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>類型</th><th>代表</th><th>起效/特性</th><th>用途</th></tr></thead>\n<tbody>\n<tr><td>速效</td><td>Lispro、Aspart、Glulisine</td><td>最快（單體化、不聚合）</td><td>餐前即打</td></tr>\n<tr><td>短效</td><td>Regular</td><td>較速效慢；<b>唯一可靜注</b></td><td>DKA 首選靜注</td></tr>\n<tr><td>中效</td><td>NPH</td><td>加 protamine 延長吸收，<b>有峰值</b></td><td>基礎補充</td></tr>\n<tr><td>長效</td><td>Glargine、Detemir、Degludec</td><td><b>無峰值</b>，模擬基礎分泌</td><td>每日 1–2 次基礎</td></tr>\n</tbody></table>\n<div class=\"dx-mn\">機制：速效靠胺基酸取代防止六聚體形成 → 快吸收；長效靠酸性沉澱（Glargine）或脂肪酸結白蛋白（Detemir）→ 緩釋無峰。</div>\n</div>\n\n<!-- ░░ 4 利尿劑電解質 ░░ -->\n<div class=\"dx-grp\" data-g=\"利尿劑電解質\">\n<h3 class=\"dx-h\">💧 利尿劑作用位置 × 電解質</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>類別</th><th>作用位置/機轉</th><th>K⁺</th><th>必考</th></tr></thead>\n<tbody>\n<tr><td>碳酸酐酶抑制</td><td>近曲小管，抑 CA</td><td>↓</td><td><span class=\"kp\">Acetazolamide</span><span class=\"kp\">代謝性酸中毒、青光眼、高山症</span></td></tr>\n<tr><td>滲透性</td><td>降 nephron 滲透壓</td><td>—</td><td><span class=\"kp\">Mannitol：降腦壓／眼壓</span><span class=\"kp\"><b>心衰禁用</b>（增血容）</span></td></tr>\n<tr><td>環利尿</td><td>升枝粗段 NKCC2</td><td>↓ Ca↓</td><td><span class=\"kp\">Furosemide：最強利尿</span><span class=\"kp\">耳毒性、低鈣</span></td></tr>\n<tr><td>Thiazide</td><td>遠曲小管 NCC</td><td>↓ Ca↑</td><td><span class=\"kp\">升血鈣 → 治腎結石</span><span class=\"kp\">升血糖、尿酸、血脂</span></td></tr>\n<tr><td>保鉀</td><td>集尿管</td><td>↑</td><td><span class=\"kp\">Spironolactone：醛固酮拮抗</span><span class=\"kp\">Amiloride：ENaC</span><span class=\"kp\">男性女乳化</span></td></tr>\n</tbody></table>\n<div class=\"dx-mn\">記憶錨：<b>環利尿降鈣、Thiazide 升鈣</b>（環 → 低鈣血、Thiazide → 治高鈣尿結石）。</div>\n</div>\n\n<!-- ░░ 5 抗組織胺世代 ░░ -->\n<div class=\"dx-grp\" data-g=\"抗組織胺\">\n<h3 class=\"dx-h\">🤧 H1 抗組織胺 1代 vs 2代</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>項目</th><th>一代</th><th>二代</th></tr></thead>\n<tbody>\n<tr><td>過 BBB</td><td>會（親脂）→ 嗜睡</td><td>不易過 → 不嗜睡</td></tr>\n<tr><td>抗膽鹼</td><td>強（口乾、尿滯留）</td><td>弱</td></tr>\n<tr><td>代表</td><td>Diphenhydramine、Chlorpheniramine</td><td>Cetirizine、Loratadine、Fexofenadine</td></tr>\n<tr><td>額外用途</td><td>止暈、止吐、助眠</td><td>單純過敏</td></tr>\n</tbody></table>\n<div class=\"dx-mn\">關鍵：一代「過 BBB ＋ 抗膽鹼」是所有副作用與額外用途的<b>同一根源</b>。</div>\n</div>\n\n<!-- ░░ 6 β-blocker 選擇性 ░░ -->\n<div class=\"dx-grp\" data-g=\"β-blocker\">\n<h3 class=\"dx-h\">❤️ β-blocker 分類鑑別</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>類別</th><th>特性</th><th>代表</th><th>必考</th></tr></thead>\n<tbody>\n<tr><td>非選擇性 β</td><td>β1 + β2</td><td>Propranolol、Timolol</td><td><span class=\"kp\">氣喘禁用（β2）</span><span class=\"kp\">掩蓋低血糖症狀</span></td></tr>\n<tr><td>選擇性 β1</td><td>心臟為主</td><td>Metoprolol、Atenolol、Bisoprolol、Esmolol</td><td><span class=\"kp\">氣喘相對安全</span><span class=\"kp\">Esmolol：超短效靜注</span></td></tr>\n<tr><td>α+β</td><td>兼擴血管</td><td>Labetalol、Carvedilol</td><td><span class=\"kp\">Labetalol：孕婦／高血壓急症</span></td></tr>\n<tr><td>β + NO</td><td>釋 NO 擴血管</td><td>Nebivolol</td><td><span class=\"kp\">β1 選擇 ＋ 內皮 NO</span></td></tr>\n</tbody></table>\n<div class=\"dx-mn\">口訣：<b>第一字母 A–M 多為 β1 選擇性</b>（Acebutolol → Metoprolol），N–Z 多非選擇性（少數例外）。</div>\n</div>\n\n<!-- ░░ 7 自律神經受體 ░░ -->\n<div class=\"dx-grp\" data-g=\"自律神經受體\">\n<h3 class=\"dx-h\">⚡ ANS 受體效應速查</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>受體</th><th>G蛋白</th><th>主要效應</th></tr></thead>\n<tbody>\n<tr><td>α1</td><td>Gq → IP3/Ca</td><td>血管收縮、瞳孔散大、尿道括約肌收縮</td></tr>\n<tr><td>α2</td><td>Gi → ↓cAMP</td><td>突觸前回饋抑制 NE（降血壓中樞）</td></tr>\n<tr><td>β1</td><td>Gs → ↑cAMP</td><td>心↑（率／力）、腎素↑</td></tr>\n<tr><td>β2</td><td>Gs → ↑cAMP</td><td>支氣管／血管／子宮平滑肌<b>舒張</b></td></tr>\n<tr><td>M2</td><td>Gi</td><td>心率↓</td></tr>\n<tr><td>M3</td><td>Gq</td><td>腺體分泌、平滑肌收縮、瞳孔縮小</td></tr>\n</tbody></table>\n<div class=\"dx-mn\">心法：Gq → 收縮／分泌、Gs → 興奮心臟＋舒張平滑肌、Gi → 抑制。記 G 蛋白就能推效應。</div>\n</div>\n\n<!-- ░░ 8 標靶 / 單株抗體 ░░ -->\n<div class=\"dx-grp\" data-g=\"標靶單抗\">\n<h3 class=\"dx-h\">🎯 標靶藥 × 單株抗體鑑別</h3>\n\n<div class=\"dx-sub\">小分子激酶抑制劑（字尾 ~tinib，口服）</div>\n<table class=\"dx-tb\">\n<thead><tr><th>標靶</th><th>機轉/路徑</th><th>代表</th><th>必考</th></tr></thead>\n<tbody>\n<tr><td><b>EGFR</b></td><td>阻斷 EGFR 酪胺酸激酶 → 抑制增殖訊號</td><td>Gefitinib、Erlotinib、Osimertinib</td><td><span class=\"kp\">非小細胞肺癌（EGFR 突變）</span><span class=\"kp\">副作用：痤瘡樣皮疹、腹瀉</span><span class=\"kp\">Osimertinib：對抗 T790M 抗藥突變</span></td></tr>\n<tr><td><b>BCR-ABL</b></td><td>抑制費城染色體融合激酶</td><td>Imatinib、Dasatinib、Nilotinib</td><td><span class=\"kp\">慢性骨髓性白血病（CML）</span><span class=\"kp\">Imatinib：靶向治療里程碑</span></td></tr>\n<tr><td><b>JAK</b></td><td>抑制 JAK-STAT，阻斷細胞激素訊號</td><td>Tofacitinib、Baricitinib、Ruxolitinib</td><td><span class=\"kp\">類風濕、潰瘍性結腸炎、骨髓纖維化</span><span class=\"kp\">副作用：感染、血栓、血脂↑</span></td></tr>\n<tr><td><b>BTK</b></td><td>抑制 B 細胞受體訊號激酶</td><td>Ibrutinib</td><td><span class=\"kp\">B 細胞淋巴瘤、CLL</span></td></tr>\n<tr><td><b>VEGFR / multi</b></td><td>抑制血管新生激酶</td><td>Sorafenib、Sunitinib</td><td><span class=\"kp\">腎細胞癌、肝癌</span><span class=\"kp\">副作用：高血壓、手足症候群</span></td></tr>\n<tr><td><b>CDK4/6</b></td><td>阻斷細胞週期 G1→S</td><td>Palbociclib</td><td><span class=\"kp\">HR+ 乳癌（配荷爾蒙療法）</span></td></tr>\n<tr><td><b>BRAF</b></td><td>抑制突變 BRAF V600E</td><td>Vemurafenib、Dabrafenib</td><td><span class=\"kp\">黑色素瘤（BRAF 突變）</span></td></tr>\n</tbody></table>\n\n<div class=\"dx-sub\">單株抗體（字尾 ~mab，注射）</div>\n<table class=\"dx-tb\">\n<thead><tr><th>標靶</th><th>機轉</th><th>代表</th><th>必考</th></tr></thead>\n<tbody>\n<tr><td><b>HER2</b></td><td>結合 HER2 受體，阻斷增殖訊號＋ADCC</td><td>Trastuzumab、Pertuzumab</td><td><span class=\"kp\">HER2+ 乳癌</span><span class=\"kp\"><b>心毒性</b>（用藥前後測心功能）</span></td></tr>\n<tr><td><b>EGFR</b></td><td>抗 EGFR 單抗（≠小分子）</td><td>Cetuximab、Panitumumab</td><td><span class=\"kp\">大腸直腸癌（RAS 野生型才有效）</span><span class=\"kp\">皮疹</span></td></tr>\n<tr><td><b>VEGF</b></td><td>結合 VEGF 配體，抑制血管新生</td><td>Bevacizumab</td><td><span class=\"kp\">大腸癌、肺癌</span><span class=\"kp\">出血、傷口癒合差、高血壓</span></td></tr>\n<tr><td><b>CD20</b></td><td>標記 B 細胞清除</td><td>Rituximab</td><td><span class=\"kp\">B 細胞淋巴瘤、類風濕</span><span class=\"kp\">輸注反應</span></td></tr>\n<tr><td><b>TNF-α</b></td><td>中和 TNF-α 發炎訊號</td><td>Infliximab、Adalimumab、Etanercept</td><td><span class=\"kp\">類風濕、發炎性腸病、乾癬</span><span class=\"kp\"><b>結核再活化</b>（用藥前篩 TB）</span></td></tr>\n<tr><td><b>PD-1 / PD-L1</b></td><td>解除免疫煞車（免疫檢查點）</td><td>Pembrolizumab、Nivolumab、Atezolizumab</td><td><span class=\"kp\">多種實體癌</span><span class=\"kp\">免疫相關副作用（甲狀腺炎、腸炎、肺炎）</span></td></tr>\n<tr><td><b>CTLA-4</b></td><td>解除 T 細胞活化煞車</td><td>Ipilimumab</td><td><span class=\"kp\">黑色素瘤</span><span class=\"kp\">免疫毒性較強</span></td></tr>\n</tbody></table>\n<div class=\"dx-mn\">字尾辨識：<b>~tinib</b> = 小分子激酶抑制劑（口服、可入細胞內）；<b>~mab</b> = 單株抗體（注射、作用於細胞外/表面）。<br>~<b>xi</b>mab = 嵌合型、~<b>zu</b>mab = 人源化、~<b>u</b>mab = 全人源。</div>\n</div>\n\n<!-- ░░ 9 致命交互作用 ░░ -->\n<div class=\"dx-grp\" data-g=\"致命交互作用\">\n<h3 class=\"dx-h\">⚠️ 高頻致命交互作用</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>組合</th><th>後果</th><th>機制</th></tr></thead>\n<tbody>\n<tr><td>Nitrate ＋ Sildenafil（PDE5i）</td><td>嚴重低血壓</td><td>NO ↑cGMP ＋ PDE5 被抑 → cGMP 過高，血管過度舒張</td></tr>\n<tr><td>MAOI ＋ tyramine／SSRI</td><td>高血壓危象／血清素症候群</td><td>單胺無法分解堆積</td></tr>\n<tr><td>Warfarin ＋ CYP 抑制劑</td><td>出血</td><td>Warfarin 代謝↓ → 血中濃度↑</td></tr>\n<tr><td>ACEI ＋ 保鉀利尿劑</td><td>高血鉀</td><td>兩者皆保鉀</td></tr>\n<tr><td>Aminoglycoside ＋ 環利尿</td><td>耳毒性加成</td><td>兩者皆耳毒</td></tr>\n</tbody></table>\n</div>\n\n<!-- ░░ 10 經典解毒劑 ░░ -->\n<div class=\"dx-grp\" data-g=\"解毒劑\">\n<h3 class=\"dx-h\">💉 必背解毒劑</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>中毒</th><th>解毒劑</th></tr></thead>\n<tbody>\n<tr><td>Acetaminophen</td><td>N-acetylcysteine（補 GSH）</td></tr>\n<tr><td>Opioid</td><td>Naloxone</td></tr>\n<tr><td>BZD</td><td>Flumazenil</td></tr>\n<tr><td>Warfarin</td><td>Vit K（＋ FFP 急救）</td></tr>\n<tr><td>Heparin</td><td>Protamine</td></tr>\n<tr><td>Digoxin</td><td>Digoxin antibody（Fab）</td></tr>\n<tr><td>有機磷</td><td>Atropine ＋ Pralidoxime（PAM）</td></tr>\n<tr><td>氰化物</td><td>硫代硫酸鈉、亞硝酸鈉</td></tr>\n<tr><td>甲醇／乙二醇</td><td>Fomepizole、Ethanol</td></tr>\n<tr><td>鐵</td><td>Deferoxamine</td></tr>\n<tr><td>鉛</td><td>EDTA、DMSA、Dimercaprol</td></tr>\n</tbody></table>\n</div>\n\n<!-- ░░ 11 口訣集 ░░ -->\n<div class=\"dx-grp\" data-g=\"記憶口訣\">\n<h3 class=\"dx-h\">🎯 高頻記憶口訣</h3>\n<table class=\"dx-tb\">\n<thead><tr><th>主題</th><th>口訣 / 記憶法</th></tr></thead>\n<tbody>\n<tr><td>BZD 半衰期長→短</td><td>泡（Prazepam）芙（Flurazepam）｜打折（Diazepam）｜蘿拉（Lorazepam）｜阿胖（Alprazolam）｜喔（Oxazepam）、算了（Triazolam）</td></tr>\n<tr><td>失神性發作機制</td><td>T-type Ca²⁺ channel 過度活化 → 故 Ethosuximide 阻斷 T-type 有效</td></tr>\n<tr><td>Digoxin 中毒誘因</td><td>低血鉀、低血鎂、高血鈣 → 增毒性（TI 窄需測濃度 1–2 ng/mL）</td></tr>\n<tr><td>Sulfa 結構交叉過敏</td><td>磺胺類、某些利尿劑（Furosemide、Thiazide）、磺醯尿素皆含 sulfa → 交叉過敏</td></tr>\n<tr><td>濃度依賴型殺菌</td><td>Aminoglycoside、Fluoroquinolone、Metronidazole → 每日單次大劑量</td></tr>\n<tr><td>時間依賴型殺菌</td><td>β-lactam → 維持 MIC 以上時間，需頻繁給藥</td></tr>\n</tbody></table>\n</div>\n\n</div>";

/* Build a question pool from a section's drugs */
function buildMechPool(sec, data){
  var drugs = data.drugs.filter(function(d){
    // skip the "special" catch-all entry like pregnancy drug guide
    return d.steps && d.steps.length && d.steps[0].length > 10 &&
           d.name.indexOf('孕婦') === -1 && d.name.indexOf('孕期') === -1;
  });

  var questions = [];

  // Pick distractor drugs that are genuinely confusable:
  // prefer SAME category (cat) first — those are the real exam traps —
  // then fall back to other categories. Never just array order.
  function _shuf(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  function pickDistractorDrugs(drug, count){
    var sameCat = drugs.filter(function(x){ return x.id!==drug.id && x.cat===drug.cat; });
    var diffCat = drugs.filter(function(x){ return x.id!==drug.id && x.cat!==drug.cat; });
    var pool = _shuf(sameCat).concat(_shuf(diffCat));
    return pool.slice(0, count);
  }

  drugs.forEach(function(drug){
    // Q-type 1: "這個藥的作用機轉是？" — answer is steps[0] keyword
    var correctMech = drug.steps[0].replace(/<[^>]+>/g,'').trim();
    var distractorDrugs = pickDistractorDrugs(drug, 3);
    var others = drugs.filter(function(x){ return x.id !== drug.id; });
    _shuf(others);
    var distractors = distractorDrugs.map(function(x){
      return x.steps[0].replace(/<[^>]+>/g,'').trim();
    });
    // trim to reasonable length
    var maxLen = 55;
    function trim(s){ return s.length>maxLen ? s.substring(0,maxLen)+'…' : s; }
    var opts = [trim(correctMech)].concat(distractors.map(trim));
    // shuffle opts
    for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=opts[i];opts[i]=opts[j];opts[j]=t;}
    var ans = opts.indexOf(trim(correctMech));

    questions.push({
      type:'mech',
      drug: drug.name,
      alias: drug.alias || '',
      cL: drug.cL,
      color: drug.color,
      q: drug.name + ' 的主要作用機轉是？',
      opts: opts,
      ans: ans,
      fullMech: correctMech,
      exp: drug.steps.map(function(s,i){
        return ['①','②','③','④','⑤'][i] + ' ' + s.replace(/<[^>]+>/g,'');
      }).join('\n')
    });

    // Q-type 2: "這個機轉對應的是哪個藥？" (reverse)
    // Use first meaningful step as clue
    var mechClue = trim(correctMech);
    var drugOpts = [drug.name].concat(distractorDrugs.map(function(x){return x.name;}));
    for(var i=drugOpts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=drugOpts[i];drugOpts[i]=drugOpts[j];drugOpts[j]=t;}
    var drugAns = drugOpts.indexOf(drug.name);

    questions.push({
      type:'reverse',
      drug: drug.name,
      alias: drug.alias || '',
      cL: drug.cL,
      color: drug.color,
      q: '「' + mechClue + '」\n\n↑ 這是哪個藥物的作用機轉？',
      opts: drugOpts,
      ans: drugAns,
      fullMech: correctMech,
      exp: drug.steps.map(function(s,i){
        return ['①','②','③','④','⑤'][i] + ' ' + s.replace(/<[^>]+>/g,'');
      }).join('\n')
    });
  });

  // Shuffle the whole pool
  for(var i=questions.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=questions[i]; questions[i]=questions[j]; questions[j]=t;
  }
  return questions;
}

function renderMechChallenge(sec, data){
  var s = STATE[sec];
  var accentColor = data.accentColor || '#1a1a18';
  var accentBg = data.accentBg || '#f5f4f0';

  // Build pool on first render
  if(!s._mqpool || s._mqpool.length === 0){
    s._mqpool = buildMechPool(sec, data);
    s._mqi = 0; s._mqs = 0; s._mqa = false; s._mqd = false; s._mqp = undefined;
  }
  var pool = s._mqpool;

  // Difficulty selector + mode selector at top
  var html = '';

  // Done screen
  if(s._mqd){
    var pct = Math.round(s._mqs / pool.length * 100);
    var msg = pct>=85 ? '🎉 機轉全部掌握！' : pct>=65 ? '💪 不錯，繼續練習' : '📖 多練幾次加強記憶';
    return '<div class="quiz-wrap">'
      +'<div class="score-card">'
      +'<div class="score-big" style="color:'+accentColor+'">'+s._mqs+'/'+pool.length+'</div>'
      +'<div class="score-label">'+msg+'</div>'
      +'<div class="score-breakdown" style="font-size:13px;color:#888;margin-bottom:20px">正確率 '+pct+'%</div>'
      +'<div style="display:flex;gap:10px;justify-content:center">'
      +'<button class="restart-btn" onclick="STATE[\''+sec+'\']._mqpool=null;STATE[\''+sec+'\']._mqi=0;STATE[\''+sec+'\']._mqs=0;STATE[\''+sec+'\']._mqa=false;STATE[\''+sec+'\']._mqd=false;STATE[\''+sec+'\']._mqp=undefined;saveMech(\''+sec+'\');renderSection(\''+sec+'\')">🔀 重新出題</button>'
      +'</div>'
      +'</div></div>';
  }

  var q = pool[s._mqi];
  var typeLabel = q.type === 'mech'
    ? '<span style="background:'+accentBg+';color:'+accentColor+';font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em">藥 → 機轉</span>'
    : '<span style="background:#fef3c7;color:#78350f;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em">機轉 → 藥</span>';

  html += '<div class="quiz-wrap">';

  // Progress
  html += '<div class="quiz-meta">'
    +'<span class="quiz-prog">'+(s._mqi+1)+' / '+pool.length+'</span>'
    +'<span class="quiz-prog" style="color:'+accentColor+'">✓ '+s._mqs+'</span>'
    +'</div>'
    +'<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+Math.round(s._mqi/pool.length*100)+'%;background:'+accentColor+'"></div></div>';

  html += '<div class="quiz-card">';

  // Drug / type badge
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
    + typeLabel;
  if(q.type === 'mech'){
    html += '<span style="background:'+q.color.bg+';color:'+q.color.tx+';border:1px solid '+q.color.bd+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">'+q.cL+'</span>';
  }
  html += '</div>';

  // Question
  var qLines = q.q.split('\n');
  html += '<div class="quiz-q">';
  if(q.type === 'mech'){
    // Show drug name prominently
    html += '<span style="font-size:17px;font-weight:800;color:'+accentColor+'">'+qLines[0].replace(' 的主要作用機轉是？','')+'</span>'
         + '<div style="font-size:14px;color:#555;margin-top:4px;font-weight:500">的主要作用機轉是？</div>';
    if(q.alias) html += '<div style="font-size:12px;color:#aaa;margin-top:2px">'+q.alias+'</div>';
  } else {
    // Show mechanism clue
    html += '<div style="background:#f5f4f0;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#1a1a18;line-height:1.6;font-weight:500">'+qLines[0]+'</div>';
    html += '<div style="font-size:14px;font-weight:600;color:#1a1a18">↑ 這是哪個藥物的作用機轉？</div>';
  }
  html += '</div>';

  // Options
  html += '<div class="quiz-opts">';
  q.opts.forEach(function(o, i){
    var cls = 'opt';
    if(s._mqa){
      if(i === q.ans) cls += ' correct';
      else if(s._mqp === i) cls += ' wrong';
    }
    html += '<button class="'+cls+'" onclick="mechPick(\''+sec+'\','+i+')"'+(s._mqa?' disabled':'')+'>'+String.fromCharCode(65+i)+'. '+o+'</button>';
  });
  html += '</div>';

  // Explanation after answer
  if(s._mqa){
    var isLast = (s._mqi === pool.length - 1);
    var expHtml = formatFlashAnswer(q.exp);
    html += '<div class="quiz-explain">'
      +'<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px">完整機轉</div>'
      + expHtml
      +'</div>'
      +'<button class="next-btn" style="background:'+accentColor+'" onclick="mechNext(\''+sec+'\')">'+(isLast?'查看結果':'下一題 →')+'</button>';
  }

  html += '</div></div>';
  return html;
}

function mechPick(sec, i){
  var s = STATE[sec];
  if(s._mqa) return;
  s._mqp = i; s._mqa = true;
  if(i === s._mqpool[s._mqi].ans) s._mqs++;
  saveMech(sec);
  renderSection(sec);
}
function mechNext(sec){
  var s = STATE[sec];
  if(s._mqi === s._mqpool.length - 1){ s._mqd = true; }
  else { s._mqi++; s._mqa = false; s._mqp = undefined; }
  saveMech(sec);
  renderSection(sec);
}

/* Find drug id within any section by matching name */
function findDrugInSection(sec, label) {
  var drugs = SECTIONS[sec] && SECTIONS[sec].drugs;
  if (!drugs) return null;
  // Strip parenthetical explanations for matching
  var key = label.split('（')[0]  // full-width (
              .split('（')[0]
              .split('）')[0]
              .split('（')[0]
              .split('/')[0]
              .split('（')[0]
              .trim();
  var found = drugs.find(function(dr) {
    var drKey = dr.name.split('/')[0].trim();
    var drAlias = (dr.alias||'').split('/')[0].trim();
    var drCL = (dr.cL||'').trim();
    return dr.name.indexOf(key) > -1 || key.indexOf(drKey) > -1 || drKey.indexOf(key) > -1
      || drAlias.indexOf(key) > -1 || key.indexOf(drAlias) > -1
      || drCL.indexOf(key) > -1 || key.indexOf(drCL) > -1;
  });
  return found ? found.id : null;
}

/* Find drug in any section by name fragment — robust matcher.
   Handles grouped entries (class name) whose individual members live in alias,
   plus suffix-style labels like "-xaban" and parenthetical notes. */
function findDrugInSection(sec, label) {
  var drugs = SECTIONS[sec] ? SECTIONS[sec].drugs : [];
  if (!drugs || !label) return null;

  // normalise: strip parentheses content, suffix dashes, arrows, notes
  function norm(s){
    return (s||'')
      .replace(/[（(][^）)]*[）)]/g,' ')   // remove (...) and （...）
      .replace(/[／/]/g,' ')               // slashes → space
      .replace(/[-‑–—]/g,'')               // drop dashes (suffix style)
      .replace(/[，,；;→↑↓·•]/g,' ')
      .toLowerCase()
      .trim();
  }
  // candidate tokens from the clicked label
  var lab = norm(label);
  var labTokens = lab.split(/\s+/).filter(function(t){return t.length>=3;});
  if (!lab) return null;

  function tokensOf(dr){
    var arr=[];
    [dr.name, dr.alias, dr.cL, dr.sub].forEach(function(field){
      if(!field) return;
      norm(field).split(/\s+/).forEach(function(t){ if(t.length>=3) arr.push(t); });
    });
    return arr;
  }

  // 1) try strong token overlap
  for (var i=0;i<drugs.length;i++){
    var dr=drugs[i]; if(!dr) continue;
    var dtok=tokensOf(dr);
    for (var a=0;a<labTokens.length;a++){
      var lt=labTokens[a];
      for (var b=0;b<dtok.length;b++){
        var dt=dtok[b];
        if (lt===dt || (lt.length>=4 && dt.indexOf(lt)>-1) || (dt.length>=4 && lt.indexOf(dt)>-1)){
          return dr.id;
        }
      }
    }
  }
  // 2) fallback: whole-label substring against name/alias
  var keyRaw = label.split('（')[0].split('(')[0].split('/')[0].split('／')[0].replace(/[-‑–—]/g,'').trim();
  if (keyRaw.length>=2){
    for (var j=0;j<drugs.length;j++){
      var d2=drugs[j]; if(!d2) continue;
      var hay=(d2.name+' '+(d2.alias||'')+' '+(d2.cL||''));
      if (hay.indexOf(keyRaw)>-1) return d2.id;
    }
    // 3) deep fallback: search within the card body (key / steps / sub / uses)
    //    so an individual member (e.g. Gemfibrozil) links to its grouped card (Fibrates)
    for (var k=0;k<drugs.length;k++){
      var d3=drugs[k]; if(!d3) continue;
      var body=(d3.key||'')+' '+(d3.sub||'')+' '+((d3.steps||[]).join(' '))+' '+((d3.uses||[]).join(' '))+' '+((d3.adv||[]).join(' '));
      if (body.indexOf(keyRaw)>-1) return d3.id;
    }
  }
  return null;
}

function findDiurDrugId(label) {
  var key = label.split('（')[0].split('/')[0].trim();
  var found = DIUR_DRUGS.find(function(dr) {
    return dr.name.indexOf(key) > -1 || key.indexOf(dr.name.split('/')[0].trim()) > -1;
  });
  return found ? found.id : null;
}

/* Navigate to drug detail from map */
function mapGoToDrug(drugId) {
  STATE.diur._scrollY = 0;
  STATE.diur.drug = drugId;
  STATE.diur.tab = 'browse';
  // switch inner tab nav highlight
  var nav = document.getElementById('nav-diur');
  if (nav) nav.querySelectorAll('.snav-btn').forEach(function(b,i){
    b.classList.toggle('on', i===0);
  });
  var el = document.getElementById('main-diur');
  if (el) el.innerHTML = renderDetail('diur', SECTIONS.diur);
  window.scrollTo(0, 0);
}

/* ════════════════════════════════════════════════
   B 類：分類樹（仿 image 2/5/6/14/15 階層樹）
   結構：CLASS_TREE[sec] = { root, hint, branches:[ ... ] }
   branch = {
     label, color, dark, bg,        // 大分類標籤
     tap,                            // 若給藥名 → 標籤可點跳到該藥詳解
     mnemonic,                       // 選填：口訣
     subs:[ {label, leafs:[...]} ],  // 兩段式（如 β-lactam 下分 penicillins...）
     leafs:[ {name, suffix, note, tap} ]
   }
════════════════════════════════════════════════ */

function _ctreeLeaf(sec, lf){
  var tap = lf.tap || lf.name;
  var did = (typeof findDrugInSection==='function') ? findDrugInSection(sec, tap) : null;
  var inner = '<span class="lf-main">'
    + (lf.name||'')
    + (lf.suffix? ' <span class="lf-suffix">'+lf.suffix+'</span>' : '')
    + '</span>'
    + (lf.note? '<span class="lf-note">'+lf.note+'</span>' : '');
  if (did) {
    return '<div class="ctree-leaf tappable" style="cursor:pointer" onclick="goToDrugFromMap(\''+sec+'\',\''+did+'\')">'+inner+'</div>';
  }
  return '<div class="ctree-leaf">'+inner+'</div>';
}

/* 分類樹折疊狀態與切換（各 branch 獨立開關，可多開） */
function ctreeToggle(sec, key){
  var st=STATE[sec]; if(!st) return;
  if(!st._ctreeOpen) st._ctreeOpen={};
  st._ctreeOpen[key] = !st._ctreeOpen[key];
  var box=document.getElementById('nephron-detail');
  if(box) box.innerHTML = buildClassTree(sec);
}
/* 把各章節對應到「心智圖 PDF」的頂層大類（DRUG_TREE 內 .t 開頭代號） */
var SEC_PDF_CATS={
  cancer:['02 抗癌'], tgt:['03 標靶'], immu:['04 免疫藥理','05 類風溼'],
  abx:['06 抑制細胞壁','06 抑制細胞膜','06 抑制蛋白質','06 影響 DNA','06 抑制葉酸','06 其他類抗生素','08 抗肺結核'],
  infx:['07 抗黴菌','09 抗原蟲','01 抗病毒'],
  ans:['10 交感神經','11 副交感神經','12 自主神經節','13 神經肌肉']
};
/* 遞迴渲染一個 PDF 節點（可折疊），key 前綴用 p: 區隔 */
function _pdfNodeHTML(sec, node, path, depth){
  var st=STATE[sec]; var openMap=(st&&st._ctreeOpen)||{};
  var hasKids=(node.c&&node.c.length)||(node.d&&node.d.length);
  var open=!!openMap[path];
  var pad=depth*14;
  var accent=['#5b3d9e','#0f6f63','#8a5212','#9d3666','#1e497e','#356322'][depth%6];
  var h='';
  if(hasKids){
    h+='<div class="pdftree-row" style="margin-left:'+pad+'px;border-left:3px solid '+accent+'33" onclick="ctreeToggle(\''+sec+'\',\''+path+'\')">'
      +'<span class="pdftree-caret">'+(open?'▾':'▸')+'</span>'
      +'<span class="pdftree-label" style="color:'+accent+'">'+node.t+'</span>'
      +(node.d&&node.d.length?'<span class="pdftree-count">'+node.d.length+'</span>':'')
      +'</div>';
    if(open){
      if(node.c) node.c.forEach(function(ch,i){ h+=_pdfNodeHTML(sec,ch,path+'/'+i,depth+1); });
      if(node.d&&node.d.length){
        h+='<div class="pdftree-drugs" style="margin-left:'+(pad+20)+'px">';
        node.d.forEach(function(dn){
          var did=(typeof findDrugInSection==='function')?findDrugInSection(sec,dn.split(/[ (（]/)[0]):null;
          if(did) h+='<span class="pdftree-drug tappable" onclick="goToDrugFromMap(\''+sec+'\',\''+did+'\')">'+dn+'</span>';
          else h+='<span class="pdftree-drug">'+dn+'</span>';
        });
        h+='</div>';
      }
    }
  } else {
    h+='<div class="pdftree-row leaf" style="margin-left:'+pad+'px"><span class="pdftree-label" style="color:#475569">'+node.t+'</span></div>';
  }
  return h;
}

function buildClassTree(sec){
  var T = CLASS_TREE[sec];
  if(!T) return '<div style="text-align:center;color:#bbb;padding:30px;font-size:13px">此章節暫無分類樹</div>';
  var H = ['<div class="ctree">'];
  H.push('<div class="ctree-root"><span class="ctree-rootbox">'+T.root+'</span></div>');
  if(T.hint) H.push('<div class="ctree-hint" style="text-align:left;margin:4px 0 10px">'+T.hint+'</div>');
  // section-level 口訣 box (collapsible-feel, always shown)
  if(T.mnemonics && T.mnemonics.length){
    H.push('<div class="ctree-mn-box"><div class="ctree-mn-title">🧠 背誦口訣</div>');
    T.mnemonics.forEach(function(m){
      H.push('<div class="ctree-mn-row"><span class="ctree-mn-key">'+m[0]+'</span><span class="ctree-mn-val">'+m[1]+'</span></div>');
    });
    H.push('</div>');
  }
  var st=STATE[sec]; var openMap=(st&&st._ctreeOpen)||{};

  // 若此章節有心智圖 PDF 資料 → 以 PDF 完整分類為骨架（口訣已在上方保留）
  var cats=(typeof SEC_PDF_CATS!=='undefined')?SEC_PDF_CATS[sec]:null;
  var matched=[];
  if(cats && typeof DRUG_TREE!=='undefined'){
    DRUG_TREE.forEach(function(cat,idx){
      for(var k=0;k<cats.length;k++){ if(cat.t.indexOf(cats[k])===0){ matched.push([cat,idx]); break; } }
    });
  }

  if(matched.length){
    // ===== PDF 骨架模式：整棵樹用 PDF，藥名自動跳轉 =====
    H.push('<div class="ctree-pdf-body" style="margin-top:4px">');
    matched.forEach(function(pair){ H.push(_pdfNodeHTML(sec, pair[0], 'p'+pair[1], 0)); });
    H.push('</div>');
    H.push('</div></div>');
    return H.join('');
  }

  // ===== 手工樹模式（無 PDF 的章節）：可折疊分支 =====
  H.push('<div class="ctree-l1">');
  T.branches.forEach(function(b, bi){
    var bkey='b'+bi;
    var bopen=!!openMap[bkey];
    var hasContent=(b.leafs&&b.leafs.length)||(b.subs&&b.subs.length);
    H.push('<div class="ctree-branch">');
    var catCls = 'ctree-cat'+(hasContent?' ct-toggle':'');
    var catStyle = 'background:'+(b.bg||'#fce9e9')+';color:'+(b.dark||'#7a2222')+';border-color:'+(b.color||'#e6a3a3');
    H.push('<div class="ctree-node">');
    if(hasContent){
      H.push('<div class="'+catCls+'" style="'+catStyle+'" onclick="ctreeToggle(\''+sec+'\',\''+bkey+'\')">'
        +'<span class="ct-caret">'+(bopen?'▾':'▸')+'</span>'+b.label+'</div>');
    } else {
      var onclick='';
      if(b.tap){
        var did=(typeof findDrugInSection==='function')?findDrugInSection(sec,b.tap):null;
        if(did) onclick=' onclick="goToDrugFromMap(\''+sec+'\',\''+did+'\')"';
      }
      H.push('<div class="ctree-cat'+(b.tap?' tappable':'')+'" style="'+catStyle+'"'+onclick+'>'+b.label+'</div>');
    }
    H.push('</div>'); // node

    if(hasContent && bopen){
      H.push('<div class="ctree-expand">');
      if(b.leafs && b.leafs.length){
        H.push('<div class="ctree-leafs" style="margin-left:6px">');
        b.leafs.forEach(function(lf){ H.push(_ctreeLeaf(sec, lf)); });
        H.push('</div>');
      }
      if(b.subs && b.subs.length){
        H.push('<div class="ctree-sub">');
        b.subs.forEach(function(sb){
          H.push('<div class="ctree-sub-row"><span class="ctree-sub-label">'+sb.label+'</span>');
          H.push('<div class="ctree-leafs">');
          (sb.leafs||[]).forEach(function(lf){ H.push(_ctreeLeaf(sec, lf)); });
          H.push('</div></div>');
        });
        H.push('</div>');
      }
      if(b.mnemonic) H.push('<div class="ctree-mnemonic">💡 '+b.mnemonic+'</div>');
      H.push('</div>'); // expand
    }
    H.push('</div>'); // branch
  });

  H.push('</div></div>');
  return H.join('');
}

function renderMapView(sec, data) {
  var s = STATE[sec];
  var active = s._mapActive || null;
  var isDiur = sec === 'diur';
  var isCancer = sec === 'cancer';
  // All map SVGs are responsive (width:100%). The horizontal nephron keeps a
  // light min-width so labels stay legible, but small enough to fit phones.
  var minW = 'auto';

  var hasTree = !!(CLASS_TREE && CLASS_TREE[sec]);
  var noSVG = false;   // cardio 已有 SVG
  var mode = s._mapMode || 'a';   // 'a' = 機轉因果圖, 'b' = 分類樹
  if (mode==='b' && !hasTree) mode='a';
  if (noSVG) mode='b';            // 強制分類樹

  var html = '<div style="max-width:560px;margin:0 auto;padding:4px 0 20px">';

  // A/B toggle (only when a classification tree exists AND a mechanism SVG exists)
  if (hasTree && !noSVG) {
    html += '<div class="mapmode-wrap">'
      + '<button class="mapmode-btn'+(mode==='a'?' on':'')+'" style="'+(mode==='a'?'background:'+(data.accentColor||'#0e7490'):'')+'" onclick="setMapMode(\''+sec+'\',\'a\')">🔗 機轉因果圖<span class="mm-sub">理解「為什麼」</span></button>'
      + '<button class="mapmode-btn'+(mode==='b'?' on':'')+'" style="'+(mode==='b'?'background:'+(data.accentColor||'#0e7490'):'')+'" onclick="setMapMode(\''+sec+'\',\'b\')">🌳 分類樹<span class="mm-sub">記憶「有哪些藥」</span></button>'
      + '</div>';
  }

  if (mode==='b') {
    html += '<div class="ctree-hint">點分類標籤展開／收合，可逐層點到藥物（各自獨立，可同時展開多個）</div>';
    html += '<div id="nephron-detail">' + buildClassTree(sec) + '</div>';
    html += '</div>';
    return html;
  }

  html += '<div style="text-align:center;margin-bottom:12px">'
    + '<div style="font-size:11px;color:#aaa">點擊各部位查看對應藥物說明</div>'
    + '</div>';
  html += '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px 4px">'
    + '<div style="min-width:'+minW+'" id="nephron-svg-wrap">'
    + buildMapSVG(sec, active)
    + '</div></div>';
  html += '<div id="nephron-legend" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0 14px">'
    + buildMapLegend(sec, active)
    + '</div>';
  html += '<div id="nephron-detail">'
    + (isDiur ? buildDetailPanel(active) : (sec==='coag' ? buildCoagMultiDetail((STATE.coag&&STATE.coag._open)||{}) : (sec==='cardio' ? buildCardioMultiDetail((STATE.cardio&&STATE.cardio._open)||{}) : (sec==='immu' ? buildImmuMultiDetail((STATE.immu&&STATE.immu._open)||{}) : (sec==='misc' ? buildMiscMultiDetail((STATE.misc&&STATE.misc._open)||{}) : buildGenericDetailPanel(sec, active))))))
    + '</div>';
  html += '</div>';
  return html;
}

function setMapMode(sec, mode){
  STATE[sec]._mapMode = mode;
  renderSection(sec);
}

function buildNephronSVG(active) {
  var cols = {};
  DIUR_MAP_DATA.sections.forEach(function(s){ cols[s.id] = s; });

  function isOn(id)       { return active === id; }
  function strokeCol(id)  { return isOn(id) ? cols[id].darkColor : '#cbd5e1'; }
  function strokeW(id)    { return isOn(id) ? 9 : 5; }
  function labelCol(id)   { return isOn(id) ? cols[id].darkColor : '#94a3b8'; }
  function pillBg(id)     { return isOn(id) ? cols[id].color     : '#f1f5f9'; }
  function pillTx(id)     { return isOn(id) ? '#fff'             : '#475569'; }
  function pillBd(id)     { return isOn(id) ? cols[id].darkColor : '#cbd5e1'; }

  function click(id) {
    return 'onclick="mapPick(\'' + id + '\')" style="cursor:pointer"';
  }

  // Pill label: centred at (cx, cy)
  function pill(cx, cy, txt, id, bold) {
    var pw = txt.length * 6.8 + 18;
    var ph = bold ? 22 : 20;
    return '<rect x="'+(cx-pw/2)+'" y="'+(cy-ph/2)+'" width="'+pw+'" height="'+ph+'" rx="'+(ph/2)+'" '
      +'fill="'+pillBg(id)+'" stroke="'+pillBd(id)+'" stroke-width="1.5"/>'
      +'<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="'+(bold?11:9)+'" '
      +'font-weight="'+(bold?800:600)+'" fill="'+pillTx(id)+'" font-family="sans-serif">'+txt+'</text>';
  }

  // Dashed connector line
  function dash(x1,y1,x2,y2,id) {
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+labelCol(id)+'" stroke-width="1" stroke-dasharray="4,3"/>';
  }

  // ── Layout constants ──────────────────────────────────────
  // Horizontal nephron: left→right
  // Sections x-centres:
  //  Glomerulus  : 60
  //  PCT (wavy)  : 60→160
  //  TAL (up)    : 200→200→270 (loop bottom 230)
  //  DCT (wavy)  : 270→370
  //  CD (down)   : 410
  //  Mannitol    : floats top

  var W = 800, H = 280;
  var midY = 140;  // centre rail y

  var L = [];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
    +'style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">');

  // Defs
  L.push('<defs>'
    +'<marker id="arr2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">'
    +'<polygon points="0 0,6 2.5,0 5" fill="#94a3b8"/></marker>'
    +'<filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/>'
    +'<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>');

  // Background
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');

  // ── Glomerulus ──────────────────────────────────────────
  var gx=60, gy=midY;
  L.push('<ellipse cx="'+gx+'" cy="'+gy+'" rx="34" ry="26" fill="none" stroke="#94a3b8" stroke-width="2"/>');
  L.push('<ellipse cx="'+gx+'" cy="'+gy+'" rx="18" ry="13" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>');
  L.push('<text x="'+gx+'" y="'+(gy-4)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b" font-family="sans-serif">腎絲球</text>');
  L.push('<text x="'+gx+'" y="'+(gy+8)+'" text-anchor="middle" font-size="7" fill="#94a3b8" font-family="sans-serif">Glomerulus</text>');

  // ── PCT: wavy tube going right, then down then right ────
  // Path: from right of glomerulus, wave up-down twice, exit at right ~x=220
  var pctPath = 'M '+(gx+34)+' '+gy
    +' C 120 '+(gy-45)+', 130 '+(gy-45)+', 150 '+gy
    +' C 170 '+(gy+45)+', 180 '+(gy+45)+', 200 '+gy;
  L.push('<g '+click('pct')+'>');
  L.push('<path d="'+pctPath+'" fill="none" stroke="'+strokeCol('pct')+'" stroke-width="'+strokeW('pct')+'" stroke-linecap="round"'+(isOn('pct')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('pct')) L.push('<path d="'+pctPath+'" fill="none" stroke="'+cols['pct'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  // Label above wave
  L.push('<text x="150" y="'+(gy-55)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+labelCol('pct')+'" font-family="sans-serif">近曲小管</text>');
  L.push(pill(150, gy-38, 'CA 抑制劑', 'pct', true));
  L.push(dash(150, gy-27, 150, gy-18, 'pct'));
  L.push('</g>');

  // ── Descending limb: horizontal then curves down ─────────
  // goes right from PCT exit (x=200) then curves down to loop bottom
  var loopBottomY = midY + 80;
  var loopX = 280;
  // descending: right from x=200 to x=loopX, then down to loopBottomY
  L.push('<path d="M 200 '+gy+' L '+(loopX-30)+' '+gy+' Q '+loopX+' '+gy+' '+loopX+' '+(gy+30)+' L '+loopX+' '+loopBottomY+'"'
    +' fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>');
  L.push('<text x="'+(loopX+8)+'" y="'+(gy+55)+'" font-size="8" fill="#c0ccd8" font-family="sans-serif">降支</text>');

  // Loop bend
  L.push('<path d="M '+loopX+' '+loopBottomY+' Q '+loopX+' '+(loopBottomY+28)+' '+(loopX+28)+' '+(loopBottomY+28)
    +' Q '+(loopX+56)+' '+(loopBottomY+28)+' '+(loopX+56)+' '+loopBottomY+'"'
    +' fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>');
  L.push('<text x="'+(loopX+28)+'" y="'+(loopBottomY+46)+'" text-anchor="middle" font-size="8" fill="#b0bec5" font-family="sans-serif">亨氏套底端</text>');

  // ── TAL: ascending ──────────────────────────────────────
  // from loop bottom right side (x=loopX+56) ascends back up to midY
  var talX = loopX+56;
  L.push('<g '+click('tal')+'>');
  L.push('<path d="M '+talX+' '+loopBottomY+' L '+talX+' '+(gy+30)+' Q '+talX+' '+gy+' '+(talX+30)+' '+gy+'"'
    +' fill="none" stroke="'+strokeCol('tal')+'" stroke-width="'+strokeW('tal')+'" stroke-linecap="round"'+(isOn('tal')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('tal')) {
    L.push('<path d="M '+talX+' '+loopBottomY+' L '+talX+' '+(gy+30)+' Q '+talX+' '+gy+' '+(talX+30)+' '+gy+'"'
      +' fill="none" stroke="'+cols['tal'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  }
  // Label below the tube (going down side)
  L.push('<text x="'+(talX-10)+'" y="'+(midY+55)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+labelCol('tal')+'" font-family="sans-serif">升支粗段（TAL）</text>');
  L.push(pill(talX-10, midY+72, 'Loop 利尿劑', 'tal', true));
  L.push(dash(talX-10, midY+61, talX-10, midY+50, 'tal'));
  L.push('</g>');

  // ── DCT: wavy again heading right ──────────────────────
  var dctStartX = talX+30, dctEndX = dctStartX+150;
  var dctPath = 'M '+dctStartX+' '+gy
    +' C '+(dctStartX+40)+' '+(gy-42)+', '+(dctStartX+60)+' '+(gy-42)+', '+(dctStartX+80)+' '+gy
    +' C '+(dctStartX+100)+' '+(gy+42)+', '+(dctStartX+120)+' '+(gy+42)+', '+dctEndX+' '+gy;
  L.push('<g '+click('dct')+'>');
  L.push('<path d="'+dctPath+'" fill="none" stroke="'+strokeCol('dct')+'" stroke-width="'+strokeW('dct')+'" stroke-linecap="round"'+(isOn('dct')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('dct')) L.push('<path d="'+dctPath+'" fill="none" stroke="'+cols['dct'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  L.push('<text x="'+(dctStartX+75)+'" y="'+(gy-55)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+labelCol('dct')+'" font-family="sans-serif">遠曲小管（DCT）</text>');
  L.push(pill(dctStartX+75, gy-38, 'Thiazide', 'dct', true));
  L.push(dash(dctStartX+75, gy-27, dctStartX+75, gy-18, 'dct'));
  L.push('</g>');

  // ── CD: straight going down ─────────────────────────────
  var cdX = dctEndX + 20;
  var cdTopY = gy, cdBotY = gy + 100;
  // connector
  L.push('<line x1="'+dctEndX+'" y1="'+gy+'" x2="'+cdX+'" y2="'+gy+'" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>');
  L.push('<g '+click('cd')+'>');
  L.push('<line x1="'+cdX+'" y1="'+cdTopY+'" x2="'+cdX+'" y2="'+cdBotY+'" stroke="'+strokeCol('cd')+'" stroke-width="'+strokeW('cd')+'" stroke-linecap="round"'+(isOn('cd')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('cd')) L.push('<line x1="'+cdX+'" y1="'+cdTopY+'" x2="'+cdX+'" y2="'+cdBotY+'" stroke="'+cols['cd'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  L.push('<text x="'+(cdX+12)+'" y="'+(cdTopY+35)+'" font-size="10" font-weight="800" fill="'+labelCol('cd')+'" font-family="sans-serif">集尿管</text>');
  L.push(pill(cdX+50, cdTopY+50, '保鉀利尿劑', 'cd', true));
  L.push(dash(cdX+12, cdTopY+44, cdX+22, cdTopY+49, 'cd'));
  L.push('</g>');

  // urine arrow
  L.push('<line x1="'+cdX+'" y1="'+cdBotY+'" x2="'+cdX+'" y2="'+(cdBotY+22)+'" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>');
  L.push('<text x="'+cdX+'" y="'+(cdBotY+40)+'" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="sans-serif">尿液</text>');

  // ── Mannitol: floating pill at top-right ───────────────
  var mox = 730, moy = 38;
  L.push('<g '+click('osmotic')+'>');
  L.push('<rect x="'+(mox-46)+'" y="'+(moy-16)+'" width="92" height="32" rx="10" '

function renderPractice(sec, data) {
  var s = STATE[sec];
  if ((!data.flashCards || !data.flashCards.length) && (!data.quiz || !data.quiz.length)) {
    return '<div style="padding:24px;text-align:center;color:#888;font-size:13px">本區為純查閱表格,無練習題。</div>';
  }
  if (!s._psubtab) s._psubtab = 'flash';
  var sub = s._psubtab;
  var accentColor = data.accentColor || '#1a1a18';
  var accentBg    = data.accentBg    || '#f5f4f0';

  var subtabs = [
    {id:'flash',  icon:'🃏', label:'閃卡'},
    {id:'mech',   icon:'🎯', label:'機轉配對'},
    {id:'quiz',   icon:'✏️', label:'測驗'}
  ];
  if(data.hasMatch){ subtabs.splice(1,0,{id:'match', icon:'🔗', label:'分類配對'}); }

  var html = '<div style="margin-bottom:14px">';
  // Sub-tab selector
  html += '<div style="display:flex;gap:8px;padding:2px 0">';
  subtabs.forEach(function(t) {
    var on = sub === t.id;
    html += '<button onclick="STATE[\''+sec+'\']._psubtab=\''+t.id+'\';renderSection(\''+sec+'\')" '
      + 'style="flex:1;padding:10px 6px;border-radius:12px;border:2px solid '+(on?accentColor:'#e0ded8')+';'
      + 'background:'+(on?accentBg:'#fff')+';color:'+(on?accentColor:'#888')+';'
      + 'font-size:13px;font-weight:700;cursor:pointer;transition:all .15s">'
      + t.icon+' '+t.label+'</button>';
  });
  html += '</div></div>';

  // Render the chosen sub-tab content
  if (sub === 'flash')  html += renderFlash(sec, data);
  else if (sub === 'match') html += renderMatchGame(sec, data);
  else if (sub === 'mech')  html += renderMechChallenge(sec, data);
  else if (sub === 'quiz')  html += renderQuiz(sec, data);

  return html;
}

/* ════════════════════════════════════════════
   歷屆考古題系統（110–115 國考真題（自動過濾缺圖題），官方答案）
   EXAM_BANK = [[exam, num, sec, ans, stem, [A,B,C,D]], ...]
   模式：依年份練 / 依章節練 / 全部隨機
   答錯自動進錯題本；作答紀錄存 localStorage 供弱點儀表板使用。
════════════════════════════════════════════ */

var EXAM_SEC_LABEL={lipid:'降血脂',cancer:'抗癌',dm:'糖尿病',abx:'抗生素',diur:'利尿劑',ans:'自律神經',epi:'抗癲癇',cns:'中樞神經',coag:'抗凝血',tgt:'標靶/單抗',infx:'抗黴/病毒',immu:'免疫抑制',pk:'藥動藥效',mc:'藥物化學',misc:'NSAID/其他',other:'綜合/其他'};
var EXAM_YEARS=['110-1','110-2','111-1','111-2','112-1','112-2','113-1','113-2','114-2','115-1'];

/* ---- 作答紀錄（供弱點儀表板）---- */
function examStatKey(){return 'pharma_exam_stats';}
var EXAM_STATS=null;
function loadExamStats(){ try{var r=localStorage.getItem(examStatKey());EXAM_STATS=r?JSON.parse(r):{};}catch(e){EXAM_STATS={};} if(!EXAM_STATS)EXAM_STATS={}; }
function saveExamStats(){ try{localStorage.setItem(examStatKey(),JSON.stringify(EXAM_STATS));}catch(e){} }
function recordExam(sec, correct){
  if(!EXAM_STATS) loadExamStats();
  var k=sec||'other';
  if(!EXAM_STATS[k]) EXAM_STATS[k]={seen:0,right:0};
  EXAM_STATS[k].seen++; if(correct) EXAM_STATS[k].right++;
  saveExamStats();
}

/* ---- 取題 ---- */
function examPoolBy(mode, key){
  if(mode==='core'){
    return (typeof EXAM_CORE!=='undefined')?EXAM_CORE.slice():[];
  }
  var pool=EXAM_BANK.filter(function(q){
    if(mode==='year') return q[0]===key;
    if(mode==='sec')  return (q[2]||'other')===key;
    return true; // all
  });
  return pool;
}
function shuffleArr(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* ---- 開啟考古題 ---- */
function openExam(){
  loadExamStats();
  TOOL={kind:'exam', stage:'menu'};
  document.body.classList.remove('focus-mode');
  document.body.classList.add('tool-mode');
  window.scrollTo(0,0);
  renderTool();
}
function examStart(mode, key){
  var pool=examPoolBy(mode,key);
  if(mode!=='year') pool=shuffleArr(pool); // 年份照原順序，其餘隨機
  TOOL={kind:'exam', stage:'run', mode:mode, key:key, pool:pool, qi:0, score:0, answered:false, picked:undefined, wrongIds:[]};
  renderTool();
  window.scrollTo(0,0);
}
