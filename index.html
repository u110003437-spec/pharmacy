/* ── Flash answer formatter ── */
function formatFlashAnswer(raw){
  // Split into logical blocks by double newline
  var blocks = raw.split(/\n\n+/);
  var out = '';
  // pre-colour arrows and acid/base keywords
  raw = colourText(raw);
  blocks = raw.split(/\n\n+/);
  blocks.forEach(function(block, bi){
    if(bi > 0) out += '<div class="fa-sep"></div>';
    var lines = block.split('\n');
    // detect if block has a "label:" first line (ends with ：or :)
    var firstLine = lines[0];
    var isLabel = /[：:]$/.test(firstLine.trim());
    var contentLines = isLabel ? lines.slice(1) : lines;
    var labelLine = isLabel ? firstLine.trim().replace(/[：:]$/, '') : null;

    out += '<div class="fa-block">';
    if(labelLine){
      out += '<div class="fa-label">'+labelLine+'</div>';
    }
    contentLines.forEach(function(line){
      var t = line.trim();
      if(!t) return;
      // Warning line starting with ★ or ⚠️ or 陷阱
      if(/^(★|⚠️|！|注意|陷阱|記憶|禁忌)/.test(t)){
        out += '<div class="fa-warn">'+t+'</div>';
      }
      // Numbered step ① ② etc
      else if(/^[①②③④⑤]/.test(t)){
        var num = t[0];
        var rest = t.slice(1).trim();
        out += '<div class="fa-step"><span class="fa-num">'+num+'</span><span>'+rest+'</span></div>';
      }
      // Bullet line starting with · or ・
      else if(/^[·・]/.test(t)){
        var rest = t.slice(1).trim();
        out += '<div class="fa-row"><span class="fa-dot">·</span><span>'+rest+'</span></div>';
      }
      // Regular line
      else {
        out += '<div class="fa-row"><span>'+t+'</span></div>';
      }
    });
    out += '</div>';
  });
  return out;
}

.fa-block:last-child{margin-bottom:0}
.fa-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:3px}
.fa-row{display:flex;gap:6px;align-items:baseline;line-height:1.55;padding:1px 0}
.fa-dot{flex-shrink:0;font-size:12px;color:#aaa}
.fa-sep{height:1px;background:rgba(0,0,0,.08);margin:7px 0}

/* ── Global arrow & acid/base colours ── */
.arr-up{color:#059669;font-size:1.15em;font-weight:800}
.arr-dn{color:#dc2626;font-size:1.15em;font-weight:800}
.arr-neu{color:#6b7280;font-size:1.15em;font-weight:700}
.acid-txt{color:#dc2626;font-weight:700}
.base-txt{color:#2563eb;font-weight:700}
.fa-step{display:flex;gap:7px;align-items:baseline;line-height:1.55;padding:1px 0}
.fa-num{flex-shrink:0;font-weight:700;color:#a855f7;font-size:12px}
.fa-warn{background:#fef9c3;border-radius:6px;padding:4px 8px;font-size:12px;color:#713f12;margin-top:4px;line-height:1.5}

/* confidence buttons */
.conf-row{display:flex;gap:10px;margin-bottom:16px}
.conf-btn{flex:1;padding:12px 8px;border-radius:12px;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:#fff}
.conf-btn.conf-bad{border-color:#e24b4a;color:#e24b4a}
.conf-btn.conf-mid{border-color:#f5a623;color:#f5a623}
.conf-btn.conf-good{border-color:#40c085;color:#40c085}
.conf-btn:active{opacity:.75;transform:scale(.96)}

.flash-nav{display:flex;align-items:center;justify-content:space-between;gap:10px}
.fnav{flex:1;padding:12px;border:1.5px solid #e0ded8;border-radius:12px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#2a2a28;transition:all .15s}
.fnav:active{background:#f5f4f0}
.fnav:disabled{opacity:.3;cursor:default}
.flash-progress-bar{height:3px;background:#f0ede8;border-radius:2px;margin-bottom:6px;overflow:hidden}
.flash-progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* filter tabs for flash */
.flash-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;justify-content:center}
.flash-chip{padding:5px 12px;border:1.5px solid #ddd;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;color:#666;background:#fff;transition:all .15s}
.flash-chip.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.flash-chip.chip-bad{border-color:#e24b4a;color:#e24b4a}
.flash-chip.chip-bad.on{background:#e24b4a;color:#fff}
.flash-chip.chip-mid{border-color:#f5a623;color:#f5a623}
.flash-chip.chip-mid.on{background:#f5a623;color:#fff}

/* ── QUIZ ── */
.quiz-wrap{max-width:520px;margin:0 auto}
.quiz-card{background:#fff;border:1.5px solid #e8e6e0;border-radius:16px;padding:20px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.quiz-prog{font-size:12px;color:#888;font-weight:500}
.quiz-prog-bar{height:4px;background:#f0ede8;border-radius:2px;margin-bottom:18px;overflow:hidden}
.quiz-prog-fill{height:100%;border-radius:2px;transition:width .3s}
.quiz-q{font-size:15px;font-weight:600;line-height:1.6;margin-bottom:16px;color:#1a1a18}
.quiz-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.quiz-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.opt{padding:13px 15px;border:1.5px solid #e0ded8;border-radius:12px;cursor:pointer;font-size:14px;color:#2a2a28;background:#fff;text-align:left;transition:all .15s;line-height:1.5;font-weight:500}
.opt:active:not(:disabled){background:#f5f4f0}
.opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.opt.wrong{background:#fcebeb;border-color:#e24b4a;color:#791f1f}
.opt:disabled{cursor:default}
.quiz-explain{background:#f5f4f0;border-radius:12px;padding:13px 14px;font-size:13px;line-height:1.7;color:#2a2a28;margin-bottom:14px}
.quiz-explain strong{color:#1a1a18}
.next-btn{width:100%;padding:14px;background:#1a1a18;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.next-btn:active{opacity:.85}
.score-card{text-align:center;background:#fff;border:1.5px solid #e8e6e0;border-radius:16px;padding:40px 24px}
.score-big{font-size:52px;font-weight:800;margin-bottom:6px}
.score-label{font-size:14px;color:#666;margin-bottom:8px}
.score-breakdown{display:flex;justify-content:center;gap:16px;margin-bottom:24px;font-size:13px}
.restart-btn{padding:13px 32px;background:#1a1a18;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}

/* ── TABLE ── */
.tbl-wrap{overflow:auto;max-height:68vh;margin-bottom:20px;border-radius:12px;border:1px solid #e8e6e0;-webkit-overflow-scrolling:touch;position:relative}
.tbl-wrap table{border-collapse:separate;border-spacing:0;background:#fff;font-size:12px;min-width:560px}
.tbl-wrap th{background:#eef0f4;padding:10px;text-align:left;font-weight:800;border-bottom:2px solid #d8dae0;font-size:11px;color:#444;letter-spacing:.02em;position:sticky;top:0;z-index:2;white-space:nowrap}
.tbl-wrap td{padding:10px;border-bottom:1px solid #f0ede8;vertical-align:top;line-height:1.6;background:#fff;white-space:normal;min-width:90px}
.tbl-wrap tr:last-child td{border-bottom:none}
/* frozen first column */
.tbl-wrap th:first-child,.tbl-wrap td:first-child{position:sticky;left:0;white-space:nowrap;max-width:130px}
.tbl-wrap td:first-child{background:#faf9f6;font-weight:800;color:#1a1a18;box-shadow:1px 0 0 #e2e0da;z-index:1}
.tbl-wrap th:first-child{z-index:4;box-shadow:1px 0 0 #d8dae0}
/* hint */
.tbl-scroll-hint{font-size:10px;color:#aaa;text-align:center;margin:-12px 0 8px}
.tbl-h3{font-size:14px;font-weight:700;margin:20px 0 10px;color:#1a1a18}

/* compare badge */
.cmp-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-bottom:4px}
</style>
</head>

<script>
/* ════════════════════════════════

var STATE = {};
['lipid','cancer','dm','abx','diur','ans','epi','cns','pk','mc','tgt','coag','infx','immu','misc'].forEach(function(s){
  STATE[s]={tab:'browse',drug:null,cat:'all',qi:0,qs:0,qa:false,qd:false,qp:undefined,fi:0,ff:false,fFilter:'all',conf:{}};
});

/* ── localStorage persistence ── */
function lsKey(sec,type){ return 'pharma_'+sec+'_'+type; }

function saveConf(sec){
  try{ localStorage.setItem(lsKey(sec,'conf'), JSON.stringify(STATE[sec].conf)); }catch(e){}
}
function clearConf(sec){
  STATE[sec].conf={};
  saveConf(sec);
  STATE[sec].fi=0;
  renderSection(sec);
}
function loadConf(sec){
  try{
    var raw=localStorage.getItem(lsKey(sec,'conf'));
    if(raw) STATE[sec].conf=JSON.parse(raw);
  }catch(e){}
}
function saveMech(sec){
  try{
    var s=STATE[sec];
    if(!s._mqpool) return;
    var payload={qi:s._mqi,qs:s._mqs,qa:s._mqa,qd:s._mqd,pool:s._mqpool,picked:s._mqp};
    localStorage.setItem(lsKey(sec,'mech'), JSON.stringify(payload));
  }catch(e){}
}
function loadMech(sec){
  try{
    var raw=localStorage.getItem(lsKey(sec,'mech'));
    if(!raw) return;
    var p=JSON.parse(raw);
    var s=STATE[sec];
    s._mqpool=p.pool; s._mqi=p.qi; s._mqs=p.qs;
    s._mqa=p.qa; s._mqd=p.qd; s._mqp=p.picked;
  }catch(e){}
}
function clearProgress(sec){
  try{
    localStorage.removeItem(lsKey(sec,'conf'));
    localStorage.removeItem(lsKey(sec,'mech'));
    STATE[sec].conf={};
    STATE[sec]._mqpool=null;STATE[sec]._mqi=0;STATE[sec]._mqs=0;
    STATE[sec]._mqa=false;STATE[sec]._mqd=false;STATE[sec]._mqp=undefined;
    renderSection(sec);
  }catch(e){}
}

// Load all saved data on startup
['lipid','cancer','dm','abx','diur','ans','epi','cns','pk','mc','tgt','coag','infx','immu','misc'].forEach(function(sec){
  loadConf(sec);
  loadMech(sec);
});

var ALL_SECS=['lipid','cancer','dm','abx','diur','ans','epi','cns','pk','mc','tgt','coag','infx','immu','misc'];

    if(body&&body.classList.contains('open')){
      body.classList.remove('open');
      block.classList.remove('open');

  });
}

var ALL_SECS=['lipid','cancer','dm','abx','diur','ans','epi','cns','pk','mc','tgt','coag','infx','immu','misc'];

function closeAll(except){

function enterFocus(id){

}
function exitFocus(){
  document.body.classList.remove('focus-mode');
  // find which block is open and close it
  ALL_SECS.forEach(function(sid){
    var body=document.getElementById('body-'+sid);
    var block=document.getElementById('block-'+sid);
    var arrow=document.getElementById('arrow-'+sid);

      body.classList.remove('open');
      block.classList.remove('open');
      if(arrow) arrow.style.transform='';

  });

function toggleCat(id){
  var body=document.getElementById('body-'+id);
  var arrow=document.getElementById('arrow-'+id);
  var block=document.getElementById('block-'+id);
  var open=body.classList.contains('open');
  if(!open){
    closeAll(id);
    body.classList.add('open');
    block.classList.add('open');
    if(arrow) arrow.style.transform='rotate(180deg)';
    renderSection(id);
    enterFocus(id);
  } else {
    exitFocus();
  }
}

function scrollToBlock(id){
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});

  if(nb) nb.classList.add('on');

  if(homeBtn) homeBtn.classList.remove('on');
  if(!document.getElementById('body-'+id).classList.contains('open')){
    toggleCat(id);
  } else {
    // already open — just make sure focus mode is on
    enterFocus(id);
    window.scrollTo(0,0);
  }

function goTab(sec, tab){
  var s=STATE[sec];
  s.tab=tab; s.drug=null; s.qi=0; s.qs=0; s.qa=false; s.qd=false; s.qp=undefined; s.fi=0; s.ff=false; s.fFilter='all'; if(tab==='quiz') s._qqpool=null;
  if(tab==='mech'){s._mqi=0;s._mqs=0;s._mqa=false;s._mqd=false;s._mqp=undefined;s._mqpool=null;}
  if(tab==='practice' && !s._psubtab) s._psubtab='flash';

  nav.querySelectorAll('.snav-btn').forEach(function(b,i){var map={'table':0,'browse':1,'mapview':2,'practice':3};b.classList.toggle('on',(map[tab]!==undefined?map[tab]:1)===i);});
  renderSection(sec);
}

function renderSection(sec){
  var el=document.getElementById('main-'+sec);
  if(!el) return;
  var s=STATE[sec];
  var data=SECTIONS[sec];
  if(s.tab==='browse') el.innerHTML=renderBrowse(sec,data);
  else if(s.tab==='flash') el.innerHTML=renderFlash(sec,data);
  else if(s.tab==='quiz') el.innerHTML=renderQuiz(sec,data);
  else if(s.tab==='mech') el.innerHTML=renderMechChallenge(sec,data);
  else if(s.tab==='mapview') el.innerHTML=renderMapView(sec,data);
  else if(s.tab==='practice') el.innerHTML=renderPractice(sec,data);
  else el.innerHTML=renderTable(sec,data);
}

/* ── BROWSE ── */
function renderBrowse(sec,data){
  var s=STATE[sec];
  if(s.drug) return renderDetail(sec,data);
  var q=(s.q||'').toLowerCase();
  var cats=data.cats||[];
  var list=data.drugs.filter(function(d){
    var catOk=(!cats.length||s.cat==='all'||d.cat===s.cat);
    var qOk=!q||(d.name.toLowerCase().indexOf(q)>-1||d.alias.toLowerCase().indexOf(q)>-1||(d.cL&&d.cL.toLowerCase().indexOf(q)>-1));
    return catOk&&qOk;
  });
  var html='';
  if(data.subPriority && s.cat==='all' && !q){
    html+='<div class="prio-banner"><div class="prio-title">📌 本章建議研讀順序（依出題機率，點列跳轉）</div>';
    data.subPriority.forEach(function(p,i){
      html+='<div class="prio-item" onclick="STATE[\''+sec+'\'].cat=\''+p.cat+'\';renderSection(\''+sec+'\')">'
        +'<span class="prio-rank">'+(i+1)+'</span>'
        +'<div class="prio-body"><div class="prio-name">'+p.label+'<span class="prio-freq">'+p.freq+'/份</span></div>'
        +'<div class="prio-note">'+p.note+'</div></div>'
        +'<span class="prio-go">▶</span></div>';
    });
    html+='<div class="prio-foot">鴉片／抗憂鬱／麻醉先讀</div></div>';
  }
  html+='<div class="search-bar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'
    +'<input placeholder="搜尋藥名…" value="'+(s.q||'')+'" oninput="STATE[\''+sec+'\'].q=this.value;renderSection(\''+sec+'\')"></div>';
  if(cats.length){
    html+='<div class="filter-row"><div class="chip'+(s.cat==='all'?' on':'')+'" onclick="STATE[\''+sec+'\'].cat=\'all\';renderSection(\''+sec+'\')">全部</div>';
    cats.forEach(function(c){html+='<div class="chip'+(s.cat===c.id?' on':'')+'" onclick="STATE[\''+sec+'\'].cat=\''+c.id+'\';renderSection(\''+sec+'\')">'+c.label+'</div>';});
    html+='</div>';
  }
  html+='<div class="dcount">共 '+list.length+' 項</div>';
  if(!list.length) return html+'<p style="color:#aaa;text-align:center;padding:2rem">找不到符合的藥物</p>';
  html+='<div class="dgrid">'+list.map(function(d){
    var c=d.color||{bg:'#f5f4f0',tx:'#444',bd:'#ccc'};
    var cardHtml='<div class="dcard" onclick="openDrug(\''+sec+'\',\''+d.id+'\')">'
      +'<div class="dcard-head"><div style="flex:1;min-width:0"><div class="dname">'+d.name+'</div>'
      +(d.alias?'<div class="dalias">'+d.alias+'</div>':'')+'</div>'
      +'<span class="dbadge" style="background:'+c.bg+';color:'+c.tx+';border-color:'+c.bd+'">'+d.cL+'</span></div>'
      +'<div class="mshort">'+d.steps[0].replace(/<[^>]+>/g,'').substring(0,70)+'…</div>';
    if(d.ldl) cardHtml+='<div style="display:flex;gap:5px;flex-wrap:wrap">'
      +'<span class="ctag" style="background:rgba(210,50,50,.08);color:#b03030">LDL '+d.ldl+'</span>'
      +'<span class="ctag" style="background:rgba(210,140,0,.08);color:#a06000">TG '+d.tg+'</span>'
      +'<span class="ctag" style="background:rgba(20,150,80,.08);color:#0f7040">HDL '+d.hdl+'</span></div>';
    else if(d.cycle) cardHtml+='<span class="ctag" style="background:'+c.bg+';color:'+c.tx+'">'+d.cycle+'</span>';
    else if(d.sub) cardHtml+='<span class="ctag" style="background:'+c.bg+';color:'+c.tx+'">'+d.sub+'</span>';
    return cardHtml+'</div>';
  }).join('')+'</div>';
  return html;
}

/* ── scroll helpers: open drug = top; back = restore list position ── */
function _scrollSet(y){
  try{ window.scrollTo(0,y); }catch(e){}
  try{ if(document.scrollingElement) document.scrollingElement.scrollTop=y; }catch(e){}
  try{ document.documentElement.scrollTop=y; document.body.scrollTop=y; }catch(e){}
}
function _scrollGet(){
  return window.scrollY || window.pageYOffset
    || (document.scrollingElement&&document.scrollingElement.scrollTop)
    || document.documentElement.scrollTop || document.body.scrollTop || 0;
}
function openDrug(sec,id){
  STATE[sec]._scrollY = _scrollGet();   // remember where we were in the list
  STATE[sec].drug = id;
  renderSection(sec);
  _scrollSet(0);                        // start drug detail from the top
  requestAnimationFrame(function(){ _scrollSet(0); });
}
function backFromDrug(sec){
  var y = STATE[sec]._scrollY || 0;
  STATE[sec].drug = null;
  renderSection(sec);
  _scrollSet(y);                        // return to previous list position
  requestAnimationFrame(function(){ _scrollSet(y); });
}

function renderDetail(sec,data){
  var s=STATE[sec];

  if(!d) return '';

  var html='<button class="back-btn" onclick="backFromDrug(\''+sec+'\')">'
    +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg> 返回</button>';
  html+='<div class="detail-card">';
  html+='<div class="det-head"><span class="dbadge" style="background:'+c.bg+';color:'+c.tx+';border-color:'+c.bd+';margin-bottom:8px;display:inline-block">'+d.cL+'</span>'
    +'<div class="det-name">'+d.name+'</div>'
    +(d.alias?'<div class="det-alias">'+d.alias+'</div>':'')
    +(d.sub?'<div class="det-sub">'+d.sub+'</div>':'')+'</div>';
  html+='<div class="sec"><div class="sec-label">作用機轉</div><div class="mech-steps">'
    +d.steps.map(function(st,i){return '<div class="mech-step"><span class="mstep-num">'+['①','②','③','④','⑤'][i]+'</span><span>'+st+'</span></div>';}).join('')
    +'</div></div>';
  if(d.ldl){
    html+='<div class="sec"><div class="sec-label">降脂效果</div><div class="effect-grid">'
      +'<div class="effect-card" style="background:rgba(210,50,50,.07)"><span class="effect-val" style="color:#b03030">'+d.ldl+'</span>LDL-C</div>'
      +'<div class="effect-card" style="background:rgba(210,140,0,.07)"><span class="effect-val" style="color:#a06000">'+d.tg+'</span>TG</div>'
      +'<div class="effect-card" style="background:rgba(20,150,80,.07)"><span class="effect-val" style="color:#0f7040">'+d.hdl+'</span>HDL-C</div>'
      +'</div></div>';
  }
  if(d.cycle){
    html+='<div class="sec"><div class="sec-label">細胞週期特異性</div>'
      +'<span class="ctag" style="background:'+c.bg+';color:'+c.tx+';font-size:13px;padding:5px 12px">'+d.cycle+'</span></div>';
  }
  html+='<div class="sec"><div class="sec-label">重要副作用</div><div class="adv-list">'
    +d.adv.map(function(a){return '<div class="adv-item"><div class="adv-dot" style="background:'+c.tx+'"></div><div>'+a+'</div></div>';}).join('')
    +'</div></div>';
  html+='<div class="sec"><div class="sec-label">臨床適應症</div><div class="use-wrap">'
    +d.uses.map(function(u){return '<span class="use-tag">'+u+'</span>';}).join('')+'</div></div>';
  var keyItems=d.key.split(/。(?=\S)/).map(function(s){return s.replace(/。$/,'').trim();}).filter(Boolean);
  var keyHtml=keyItems.length>1
    ?keyItems.map(function(s){return '<div class="key-item"><span class="key-dot">★</span><span>'+s+'</span></div>';}).join('')
    :'<div class="key-item"><span class="key-dot">★</span><span>'+d.key.replace(/。$/,'')+'</span></div>';
  html+='<div class="sec"><div class="sec-label">⭐ 國考重點</div><div class="key-box" style="background:'+c.bg+';color:'+c.tx+'">'+keyHtml+'</div></div>';
  html+='</div>';
  return colourText(html);
}


/* ── Flash answer formatter ── */
function formatFlashAnswer(raw){
  // Split into logical blocks by double newline
  var blocks = raw.split(/\n\n+/);
  var out = '';
  // pre-colour arrows and acid/base keywords
  raw = colourText(raw);
  blocks = raw.split(/\n\n+/);
  blocks.forEach(function(block, bi){
    if(bi > 0) out += '<div class="fa-sep"></div>';
    var lines = block.split('\n');
    // detect if block has a "label:" first line (ends with ：or :)
    var firstLine = lines[0];
    var isLabel = /[：:]$/.test(firstLine.trim());
    var contentLines = isLabel ? lines.slice(1) : lines;
    var labelLine = isLabel ? firstLine.trim().replace(/[：:]$/, '') : null;

    out += '<div class="fa-block">';
    if(labelLine){
      out += '<div class="fa-label">'+labelLine+'</div>';
    }
    contentLines.forEach(function(line){
      var t = line.trim();
      if(!t) return;
      // Warning line starting with ★ or ⚠️ or 陷阱
      if(/^(★|⚠️|！|注意|陷阱|記憶|禁忌)/.test(t)){
        out += '<div class="fa-warn">'+t+'</div>';
      }
      // Numbered step ① ② etc
      else if(/^[①②③④⑤]/.test(t)){
        var num = t[0];
        var rest = t.slice(1).trim();
        out += '<div class="fa-step"><span class="fa-num">'+num+'</span><span>'+rest+'</span></div>';
      }
      // Bullet line starting with · or ・
      else if(/^[·・]/.test(t)){
        var rest = t.slice(1).trim();
        out += '<div class="fa-row"><span class="fa-dot">·</span><span>'+rest+'</span></div>';
      }
      // Regular line
      else {
        out += '<div class="fa-row"><span>'+t+'</span></div>';
      }
    });
    out += '</div>';
  });
  return out;
}

/* ── FLASHCARD ── */
function renderFlash(sec,data){
  var s=STATE[sec];
  var accentColor=data.accentColor||'#1a1a18';
  // build card pool: normal + compare cards
  var allCards=data.flashCards||[];
  // filter by confidence
  var pool;
  if(s.fFilter==='all') pool=allCards;
  else if(s.fFilter==='bad') pool=allCards.filter(function(c){return s.conf[c.id]==='bad';});
  else if(s.fFilter==='mid') pool=allCards.filter(function(c){return s.conf[c.id]==='mid';});
  else pool=allCards;
  if(!pool.length) pool=allCards;
  if(s.fi>=pool.length) s.fi=pool.length-1;
  if(s.fi<0) s.fi=0;
  var card=pool[s.fi];
  var confCounts={bad:0,mid:0,good:0,none:0};
  allCards.forEach(function(c){
    var v=s.conf[c.id]||'none';
    confCounts[v]=(confCounts[v]||0)+1;
  });
  var pct=Math.round((s.fi+1)/pool.length*100);
  var cardBg='#fff';
  var typeLabel='';
  var confVal=s.conf[card.id]||'none';
  var html='<div class="flash-wrap">';
  // stat chips
  html+='<div class="flash-filter">'
    +'<div class="flash-chip'+(s.fFilter==='all'?' on':'')+'" onclick="STATE[\''+sec+'\'].fFilter=\'all\';STATE[\''+sec+'\'].fi=0;renderSection(\''+sec+'\')">全部 '+allCards.length+'</div>'
    +'<div class="flash-chip chip-bad'+(s.fFilter==='bad'?' on':'')+'" onclick="STATE[\''+sec+'\'].fFilter=\'bad\';STATE[\''+sec+'\'].fi=0;renderSection(\''+sec+'\')">✗ 不會 '+confCounts.bad+'</div>'
    +'<div class="flash-chip chip-mid'+(s.fFilter==='mid'?' on':'')+'" onclick="STATE[\''+sec+'\'].fFilter=\'mid\';STATE[\''+sec+'\'].fi=0;renderSection(\''+sec+'\')">△ 模糊 '+confCounts.mid+'</div>'
    +(Object.keys(s.conf).length?'<div class="flash-chip" style="margin-left:auto;border-color:#ddd;color:#aaa;font-size:11px" onclick="clearConf(\''+sec+'\')">重置評分</div>':'')
    +'</div>';
  html+='<div class="flash-progress-bar"><div class="flash-progress-fill" style="width:'+pct+'%;background:'+accentColor+'"></div></div>';
  html+='<div class="flash-top"><span>'+typeLabel+'</span><span style="font-size:13px;color:#888;font-weight:500">'+(s.fi+1)+' / '+pool.length+'</span></div>';
  html+='<div class="flash-scene" onclick="STATE[\''+sec+'\'].ff=!STATE[\''+sec+'\'].ff;renderSection(\''+sec+'\')">'
    +'<div class="flash-inner'+(s.ff?' flipped':'')+'">'
    +'<div class="flash-front" style="background:#fff;border-color:'+accentColor+'">'
    +'<div class="flash-question">'+card.q+'</div>'
    +'<div class="flash-hint">'+(s.ff?'':'點擊查看答案 →')+'</div></div>'
    +'<div class="flash-back"><div class="flash-type-label" style="color:#666;background:#e8e6e0;align-self:flex-start">解析</div><div class="flash-answer">'+formatFlashAnswer(card.a)+'</div></div>'
    +'</div></div>';
  // confidence buttons (show after flip)
  if(s.ff){
    html+='<div class="conf-row">'
      +'<button class="conf-btn conf-bad'+(confVal==='bad'?' on':'')+'" onclick="setConf(\''+sec+'\',\''+card.id+'\',\'bad\')">✗ 不會</button>'
      +'<button class="conf-btn conf-mid'+(confVal==='mid'?' on':'')+'" onclick="setConf(\''+sec+'\',\''+card.id+'\',\'mid\')">△ 模糊</button>'
      +'<button class="conf-btn conf-good'+(confVal==='good'?' on':'')+'" onclick="setConf(\''+sec+'\',\''+card.id+'\',\'good\')">✓ 記住了</button>'
      +'</div>';
  } else {
    html+='<div style="height:54px"></div>';
  }
  html+='<div class="flash-nav">'
    +'<button class="fnav" onclick="STATE[\''+sec+'\'].fi=Math.max(0,STATE[\''+sec+'\'].fi-1);STATE[\''+sec+'\'].ff=false;renderSection(\''+sec+'\')"'+(s.fi===0?' disabled':'')+'>← 上一張</button>'
    +'<button class="fnav" onclick="STATE[\''+sec+'\'].fi=Math.min('+pool.length+'-1,STATE[\''+sec+'\'].fi+1);STATE[\''+sec+'\'].ff=false;renderSection(\''+sec+'\')"'+(s.fi===pool.length-1?' disabled':'')+'>下一張 →</button>'
    +'</div></div>';
  return html;
}

function setConf(sec,cardId,val){
  STATE[sec].conf[cardId]=val;
  saveConf(sec);
  lsSave();
  // auto-advance after rating
  var s=STATE[sec];
  var allCards=SECTIONS[sec].flashCards||[];
  var pool;
  if(s.fFilter==='all') pool=allCards;
  else if(s.fFilter==='bad') pool=allCards.filter(function(c){return s.conf[c.id]==='bad';});
  else if(s.fFilter==='mid') pool=allCards.filter(function(c){return s.conf[c.id]==='mid';});
  else pool=allCards;
  if(!pool.length) pool=allCards;
  if(s.fi<pool.length-1){s.fi++;s.ff=false;}
  renderSection(sec);
}

/* ── QUIZ ── */
function renderQuiz(sec,data){
  var s=STATE[sec];
  var accentColor=data.accentColor||'#1a1a18';
  // Build shuffled pool on first render or after reset
  if(!s._qqpool){
    var orig=data.quiz.slice();
    for(var _i=orig.length-1;_i>0;_i--){
      var _j=Math.floor(Math.random()*(_i+1));
      var _t=orig[_i];orig[_i]=orig[_j];orig[_j]=_t;
    }
    s._qqpool=orig;
  }
  var qq=s._qqpool;
  if(s.qd){
    var pct=Math.round(s.qs/qq.length*100);
    var msg=pct>=80?'🎉 優秀，考試準備充分！':pct>=60?'💪 不錯，繼續加強':'📖 建議重點複習';
    var badCards=qq.filter(function(q,i){return s['_wrong'] && s['_wrong'][i];});
    return '<div class="quiz-wrap"><div class="score-card">'
      +'<div class="score-big" style="color:'+accentColor+'">'+s.qs+'/'+qq.length+'</div>'
      +'<div class="score-label">'+msg+'</div>'
      +'<div class="score-breakdown"><span>正確率 '+pct+'%</span></div>'
      +'<button class="restart-btn" onclick="STATE[\''+sec+'\'].qi=0;STATE[\''+sec+'\'].qs=0;STATE[\''+sec+'\'].qa=false;STATE[\''+sec+'\'].qd=false;STATE[\''+sec+'\'].qp=undefined;STATE[\''+sec+'\'][\'_wrong\']={};renderSection(\''+sec+'\')">重新測驗</button>'
      +'</div></div>';
  }
  var q=qq[s.qi];
  var html='<div class="quiz-wrap">';
  html+='<div class="quiz-meta"><span class="quiz-prog">'+( s.qi+1)+' / '+qq.length+'</span><span class="quiz-prog" style="color:'+accentColor+'">✓ '+s.qs+'</span></div>';
  html+='<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+Math.round(s.qi/qq.length*100)+'%;background:'+accentColor+'"></div></div>';
  if(q.type) html+='<div class="quiz-tag" style="background:'+data.accentBg+';color:'+accentColor+'">'+q.type+'</div>';
  html+='<div class="quiz-card"><div class="quiz-q">'+q.q+'</div><div class="quiz-opts">';
  q.opts.forEach(function(o,i){
    var cls='opt';
    if(s.qa){if(i===q.ans) cls+=' correct'; else if(s.qp===i) cls+=' wrong';}
    html+='<button class="'+cls+'" onclick="qPick(\''+sec+'\','+i+')"'+(s.qa?' disabled':'')+'>'+String.fromCharCode(65+i)+'. '+o+'</button>';
  });
  html+='</div>';
  if(s.qa){
    var isLast=(s.qi===qq.length-1);
    html+='<div class="quiz-explain"><strong>解析：</strong>'+q.exp+'</div>'
      +'<button class="next-btn" onclick="qNext(\''+sec+'\')">'+(isLast?'查看結果':'下一題 →')+'</button>';
  }
  html+='</div></div>';
  return html;
}

function qPick(sec,i){
  var s=STATE[sec]; if(s.qa) return;
  s.qp=i; s.qa=true;
  lsSave();
  var q=(s._qqpool&&s._qqpool[s.qi])||SECTIONS[sec].quiz[s.qi];
  if(i===q.ans) s.qs++;
  else{if(!s['_wrong']) s['_wrong']={}; s['_wrong'][s.qi]=true; if(typeof addWrong==='function') addWrong(sec,q);}
  renderSection(sec);
}
function qNext(sec){
  var s=STATE[sec];
  var qq=s._qqpool||SECTIONS[sec].quiz;
  if(s.qi===qq.length-1){s.qd=true;}
  else{s.qi++;s.qa=false;s.qp=undefined;}
  renderSection(sec);
}

/* ── TABLE ── */
/* Wrap ↑↓ arrows and acid/base keywords with coloured spans */
function colourText(s){
  if(!s) return s;
  return s
    // arrows - bigger and coloured
    .replace(/↑↑↑↑+/g, '<span class="arr-up">↑↑↑↑</span>')
    .replace(/↑↑↑/g,   '<span class="arr-up">↑↑↑</span>')
    .replace(/↑↑/g,    '<span class="arr-up">↑↑</span>')
    .replace(/(?<![↑])↑(?![↑])/g, '<span class="arr-up">↑</span>')
    .replace(/↓↓↓↓+/g, '<span class="arr-dn">↓↓↓↓</span>')
    .replace(/↓↓↓/g,   '<span class="arr-dn">↓↓↓</span>')
    .replace(/↓↓/g,    '<span class="arr-dn">↓↓</span>')
    .replace(/(?<![↓])↓(?![↓])/g, '<span class="arr-dn">↓</span>')
    // acid/base
    .replace(/代謝性酸中毒/g, '<span class="acid-txt">代謝性酸中毒</span>')
    .replace(/代謝性鹼中毒/g, '<span class="base-txt">代謝性鹼中毒</span>');
}

/* Convert ；/ explicit newline in td content to <br> for readable line breaks */
function fmtTd(s){
  if(!s) return s;
  // split on ；（full-width semicolon, common separator in table data）
  // and also on ；（half-width with surrounding spaces）
  return s
    .replace(/；/g, '；<br>')
    .replace(/\n/g, '<br>')
    .replace(/<br><br>/g, '<br>');
}
/* Post-process tableHtml: apply fmtTd to every td text node */
function processTableHtml(raw){
  // Replace td content (not touching style attrs)
  return raw.replace(/<td([^>]*)>([^<]+)<\/td>/g, function(match, attrs, content){
    return '<td'+attrs+'>'+colourText(fmtTd(content))+'</td>';
  });
}
function renderTable(sec,data){
  var raw=data.tableHtml||'<p style="color:#aaa;padding:20px">總表建置中</p>';
  var hint='<div class="tbl-scroll-hint">← 左右／上下滑動查看，頂欄與最左欄會固定 →</div>';
  return hint+processTableHtml(raw);
}

/* ── Generic horizontal pill-chart builder ──
   Used for: lipid, abx, epi (list of targets/sections)
*/
function buildPillChartSVG(items, active, idPrefix) {
  var W = 800, H = 220;
  var n = items.length;
  var colW = Math.floor(W / n);
  var L = [];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:'+W+'px;height:'+H+'px;display:block">');
  L.push('<defs><marker id="arx" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#94a3b8"/></marker>'
    +'<filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');

  items.forEach(function(item, i) {
    var cx = colW * i + colW/2;
    var on = active === item.id;
    var fill = on ? item.color : '#f1f5f9';
    var stroke = item.color;
    var tc = on ? '#fff' : item.darkColor;
    var bw = on ? 3 : 1.5;

    // Box
    var bx = colW*i + 8, by = 30, bw2 = colW-16, bh = 120;
    L.push('<g onclick="mapPickGeneric(\''+idPrefix+'\',\''+item.id+'\')" style="cursor:pointer">');
    L.push('<rect x="'+bx+'" y="'+by+'" width="'+bw2+'" height="'+bh+'" rx="14" '
      +'fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+bw+'"'+(on?' filter="url(#glow2)"':'')+'/> ');

    // Label (split on \n)
    var lines = item.label.split('\n');
    var startY = by + bh/2 - (lines.length-1)*9 - 4;
    lines.forEach(function(line, li) {
      L.push('<text x="'+cx+'" y="'+(startY+li*18)+'" text-anchor="middle" '
        +'font-size="11" font-weight="800" fill="'+tc+'" font-family="sans-serif">'+line+'</text>');
    });

    // Sub-label
    if (item.location || item.labelEn) {
      var sub = (item.location || item.labelEn || '').substring(0,12);
      L.push('<text x="'+cx+'" y="'+(by+bh-12)+'" text-anchor="middle" '
        +'font-size="8" fill="'+(on?'rgba(255,255,255,0.8)':item.darkColor)+'" font-family="sans-serif">'+sub+'</text>');
    }

    // Click hint
    if (!on) {
      L.push('<text x="'+cx+'" y="'+(by+bh+18)+'" text-anchor="middle" '
        +'font-size="9" fill="#94a3b8" font-family="sans-serif">點擊查看</text>');
    }
    L.push('</g>');
  });

  L.push('</svg>');
  return L.join('\n');
}

/* ── Cancer cell cycle SVG ── */
function buildCellCycleSVG(active) {
  var W = 500, H = 500;
  var cx = 250, cy = 250, r = 160, ri = 80;
  var phases = CANCER_MAP_DATA.phases;
  var n = phases.length;
  var L = [];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:'+W+'px;height:'+H+'px;display:block;margin:0 auto">');
  L.push('<defs><marker id="arx2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#94a3b8"/></marker>'
    +'<filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');

  // Draw cycle direction arrow
  L.push('<text x="'+cx+'" y="'+(cy-ri+14)+'" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="sans-serif">細胞週期</text>');
  L.push('<text x="'+cx+'" y="'+(cy-ri+28)+'" text-anchor="middle" font-size="9" fill="#b0bec5" font-family="sans-serif">（順時針）</text>');

  // Each phase as a pie segment
  var angleStart = -Math.PI/2; // start at top
  // Phase proportions (G1 largest, others smaller)
  var weights = [3, 2, 1, 1, 1]; // G1, S, G2, M, G0
  var total = weights.reduce(function(a,b){return a+b;},0);

  var angles = [];
  var cur = angleStart;
  weights.forEach(function(w) {
    angles.push({start: cur, end: cur + 2*Math.PI*w/total});
    cur += 2*Math.PI*w/total;
  });

  phases.forEach(function(phase, i) {
    var a = angles[i];
    var on = active === phase.id;
    var midAngle = (a.start + a.end) / 2;

    // Outer arc path
    var x1 = cx + r * Math.cos(a.start), y1 = cy + r * Math.sin(a.start);
    var x2 = cx + r * Math.cos(a.end),   y2 = cy + r * Math.sin(a.end);
    var xi1 = cx + ri * Math.cos(a.start), yi1 = cy + ri * Math.sin(a.start);
    var xi2 = cx + ri * Math.cos(a.end),   yi2 = cy + ri * Math.sin(a.end);
    var large = (a.end - a.start > Math.PI) ? 1 : 0;

    var path = 'M '+xi1+' '+yi1+' L '+x1+' '+y1
      +' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2
      +' L '+xi2+' '+yi2
      +' A '+ri+' '+ri+' 0 '+large+' 0 '+xi1+' '+yi1+' Z';

    var fill = on ? phase.color : '#f1f5f9';
    var stroke = phase.color;
    L.push('<g onclick="mapPickGeneric(\'cancer\',\''+phase.id+'\')" style="cursor:pointer">');
    L.push('<path d="'+path+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(on?3:1.5)+'"'+(on?' filter="url(#glow2)"':'')+'/> ');

    // Phase label
    var lx = cx + (r+ri)/2 * Math.cos(midAngle);
    var ly = cy + (r+ri)/2 * Math.sin(midAngle);
    var tc = on ? '#fff' : phase.darkColor;
    L.push('<text x="'+lx+'" y="'+(ly-4)+'" text-anchor="middle" font-size="13" font-weight="800" fill="'+tc+'" font-family="sans-serif">'+phase.label+'</text>');
    L.push('<text x="'+lx+'" y="'+(ly+10)+'" text-anchor="middle" font-size="8" fill="'+(on?'rgba(255,255,255,0.85)':phase.darkColor)+'" font-family="sans-serif">'+phase.desc.substring(0,6)+'</text>');
    L.push('</g>');
  });

  // Centre circle
  L.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+(ri-4)+'" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>');
  L.push('<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b" font-family="sans-serif">細胞</text>');
  L.push('<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif">點選各期</text>');
  L.push('<text x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif">查看藥物</text>');

  L.push('</svg>');
  return L.join('\n');
}

  L.push('</svg>');
  return L.join('\n');
}

  if (sec==='immu')   { data=IMMU_MAP_DATA.targets;     item=data.find(function(x){return x.id===active;}); }
  if (sec==='misc')   { data=MISC_MAP_DATA.targets;     item=data.find(function(x){return x.id===active;}); }
  if (!item) return '';

  var h = '<div style="background:'+item.color+'18;border:2px solid '+item.color+';border-radius:16px;padding:16px;margin-top:4px">';

  // Header
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'
    +'<div style="background:'+item.color+';color:#fff;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:800;flex-shrink:0">'
    + (item.label||item.fullLabel||'').replace('\n',' ')+'</div>'
    +(item.labelEn||item.fullLabel||item.location?'<div style="font-size:11px;color:#666;line-height:1.5">'+(item.labelEn||item.fullLabel||item.location||'')+'</div>':'')
    +'</div>';

  // Target (if exists)
  if (item.target) {
    h += '<div style="margin-bottom:10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+item.darkColor+';margin-bottom:4px">🎯 作用靶點</div>'
      +'<div style="font-size:13px;font-weight:600;color:#1a1a18">'+item.target+'</div>'
      +'</div>';
  }

  // Mechanism / description
  var mechText = item.mechanism || item.desc || '';
  if (mechText) {
    h += '<div style="margin-bottom:10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+item.darkColor+';margin-bottom:4px">⚙️ 機轉</div>'
      +'<div style="font-size:12px;color:#2a2a28;line-height:1.7">'
      + mechText.split('\n').map(function(l){return '<div style="padding:1px 0">'+l+'</div>';}).join('')
      +'</div></div>';
  }

  // Effects (cancer: phases; ans: stim/agonist/blocker; lipid: ldl/tg/hdl; dm/abx/epi: drugs)
  if (sec==='ans' && item.stim) {
    h += '<div style="margin-bottom:10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+item.darkColor+';margin-bottom:6px">⚡ 刺激效應</div>'
      +'<div style="font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:8px">'+item.stim+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +'<div><div style="font-size:10px;font-weight:700;color:#059669;margin-bottom:4px">促效劑（↑受體）</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px">'
      +item.agonists.map(function(d){
          var did=findDrugInSection(sec,d);
          var style='background:'+item.color+'22;color:'+item.darkColor+';border:1px solid '+item.color+'66;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;'+(did?'cursor:pointer':'');
          var click=did?'onclick="goToDrugFromMap(\'' + sec + '\',\'' + did + '\')"':'';
          return '<span '+click+' style="'+style+'">'+d+(did?' ↗':'')+'</span>';
        }).join('')
      +'</div></div>'
      +'<div><div style="font-size:10px;font-weight:700;color:#dc2626;margin-bottom:4px">拮抗劑（阻斷受體）</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px">'
      +item.blockers.map(function(d){
          var did=findDrugInSection(sec,d);
          var style='background:#fee2e222;color:#7f1d1d;border:1px solid #fca5a5;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;'+(did?'cursor:pointer':'');
          var click=did?'onclick="goToDrugFromMap(\'' + sec + '\',\'' + did + '\')"':'';
          return '<span '+click+' style="'+style+'">'+d+(did?' ↗':'')+'</span>';
        }).join('')
      +'</div></div>'
      +'</div></div>';
  } else if (sec==='lipid' && item.effect) {
    h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px">'
      +[['LDL-C',item.effect.ldl,'#dc2626'],['TG',item.effect.tg,'#b45309'],['HDL-C',item.effect.hdl,'#059669']].map(function(e){
        return '<div style="background:#fff;border-radius:8px;padding:8px;text-align:center">'
          +'<div style="font-size:10px;color:#888;margin-bottom:3px">'+e[0]+'</div>'
          +'<div style="font-size:16px;font-weight:800;color:'+e[2]+'">'+e[1]+'</div></div>';
      }).join('')+'</div>';
  }

  // Drugs list (all sections except ANS which handled above)
  var drugList = item.drugs;
  if (drugList && drugList.length && sec!=='ans') {
    h += '<div style="margin-bottom:10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+item.darkColor+';margin-bottom:6px">💊 代表藥物（點擊查看詳細介紹）</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px">'
      + drugList.map(function(d){
          var did = findDrugInSection(sec, d);
          var style = 'background:'+item.color+'22;color:'+item.darkColor+';border:1px solid '+item.color+'66;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;'+(did?'cursor:pointer':'');
          var click = did ? 'onclick="goToDrugFromMap(\'' + sec + '\',\'' + did + '\')"' : '';
          return '<span '+click+' style="'+style+'">'+d+(did?' ↗':'')+'</span>';
        }).join('')
      +'</div></div>';
  }

  // Note
  if (item.note) {
    h += '<div style="background:#fff;border-radius:8px;padding:8px 10px;font-size:12px;color:#374151;line-height:1.6">'
      +'<strong>📌 </strong>'+item.note+'</div>';
  }

  h += '</div>';
  return colourText(h);
}

/* Navigate to drug detail page from any map */
function goToDrugFromMap(sec, drugId) {
  STATE[sec]._scrollY = 0;
  STATE[sec].drug = drugId;
  STATE[sec].tab = 'browse';
  var nav = document.getElementById('nav-'+sec);
  if (nav) nav.querySelectorAll('.snav-btn').forEach(function(b,i){
    b.classList.toggle('on', i===1); // browse is index 1
  });
  var el = document.getElementById('main-'+sec);
  if (el) el.innerHTML = renderDetail(sec, SECTIONS[sec]);
  window.scrollTo(0,0);
}

/* ── mapPickGeneric: in-place update for all sections ── */
function mapPickGeneric(sec, id) {
  STATE[sec]._mapActive = id;
  var svgWrap = document.getElementById('nephron-svg-wrap');
  if (svgWrap) svgWrap.innerHTML = buildMapSVG(sec, id);
  var legend = document.getElementById('nephron-legend');
  if (legend) legend.innerHTML = buildMapLegend(sec, id);
  var detail = document.getElementById('nephron-detail');
  if (detail) detail.innerHTML = buildGenericDetailPanel(sec, id);
}

/* ════════ VISUAL MECHANISM DIAGRAMS for cns / pk / mc (mobile-first, vertical) ════════ */
function _mapDefs(){
  return '<defs>'
    +'<marker id="arx3" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#94a3b8"/></marker>'
    +'<marker id="arx3d" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#f59e0b"/></marker>'
    +'<filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>';
}
function _svgOpen(W,H){
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
    +'style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">';
}

/* ── PK: ADME 垂直流程圖 ── */

  L.push('<text x="'+(W/2)+'" y="38" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="sans-serif">點選任一站 → 下方看詳細</text>');

    L.push('</g>');
  });
  // arrow to 排出

  L.push('<text x="180" y="'+(py+24)+'" text-anchor="middle" font-size="13" font-weight="800" fill="'+(onp?'#fff':pd.darkColor)+'" font-family="sans-serif">🎯 藥效學 PD（並行・受體作用）</text>');

/* ── CNS: 突觸截面圖（垂直） ── */

  L.push('<text x="30" y="38" font-size="12" font-weight="800" fill="#4338ca" font-family="sans-serif">突觸前神經元（Presynaptic）</text>');
  [[250,60],[284,72],[312,56],[300,40]].forEach(function(v){

  L.push('<text x="210" y="166" text-anchor="middle" font-size="8" fill="#6366f1" font-family="sans-serif">回收↑</text>');

  [240,270,300,330].forEach(function(x){ L.push('<circle cx="'+x+'" cy="152" r="3.5" fill="#fb923c"/>'); });

  // postsynaptic bar

  L.push('<text x="30" y="208" font-size="12" font-weight="800" fill="#6b21a8" font-family="sans-serif">突觸後神經元（Postsynaptic）受體</text>');

  // 4 postsynaptic receptor boxes in 2x2
  var grid=[['mu',26,244],['gabaa',190,244],['nmda',26,330],['d2',190,330]];
  var gw=144,gh=78;
  grid.forEach(function(g){
    var t=byId[g[0]], on=active===g[0], x=g[1], y=g[2], cx=x+gw/2;
    L.push('<g onclick="mapPickGeneric(\'cns\',\''+g[0]+'\')" style="cursor:pointer">');

    var lines=t.label.split('\n');
    L.push('<text x="'+cx+'" y="'+(y+28)+'" text-anchor="middle" font-size="14" font-weight="800" fill="'+(on?'#fff':t.darkColor)+'" font-family="sans-serif">'+lines[0]+'</text>');

    L.push('<text x="'+cx+'" y="'+(y+gh-10)+'" text-anchor="middle" font-size="8" fill="'+(on?'rgba(255,255,255,.85)':'#94a3b8')+'" font-family="sans-serif">'+(t.drugs?t.drugs.length:0)+' 類藥 · 點擊</text>');
    L.push('</g>');
  });
  L.push('</svg>');
  return L.join('\n');
}

/* ── MC: 視覺記憶卡（垂直堆疊） ── */
function buildMedchemSVG(active){
  var T=MC_MAP_DATA.targets, byId={}; T.forEach(function(t){byId[t.id]=t;});
  var W=360,H=620,L=[];
  L.push(_svgOpen(W,H)); L.push(_mapDefs());
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');
  function on(id){return active===id;}
  function card(id,y,h,bg){
    var t=byId[id];
    return '<rect x="14" y="'+y+'" width="332" height="'+h+'" rx="14" fill="'+(on(id)?bg:'#fff')+'" stroke="'+t.color+'" stroke-width="'+(on(id)?3:2)+'"'+(on(id)?' filter="url(#glow2)"':'')+'/>';
  }

  // 1. acidity ruler
  var acid=byId['acidmap'];
  L.push('<g onclick="mapPickGeneric(\'mc\',\'acidmap\')" style="cursor:pointer">');
  L.push(card('acidmap',14,104,'#fef2f2'));
  L.push('<text x="30" y="36" font-size="12" font-weight="800" fill="'+acid.darkColor+'" font-family="sans-serif">🧪 酸性強弱（pKa 越小越酸）</text>');
  var rx0=44, rx1=326, ry=82;
  L.push('<line x1="'+rx0+'" y1="'+ry+'" x2="'+rx1+'" y2="'+ry+'" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arx3)"/>');
  L.push('<text x="'+rx0+'" y="'+(ry+20)+'" text-anchor="start" font-size="9" font-weight="700" fill="#dc2626" font-family="sans-serif">←強酸</text>');
  L.push('<text x="'+rx1+'" y="'+(ry+20)+'" text-anchor="end" font-size="9" font-weight="700" fill="#475569" font-family="sans-serif">弱酸→</text>');
  function pkaX(p){return rx0+(rx1-rx0-16)*(p/16);}
  [['磺酸',1,'#b91c1c'],['羧酸',4.5,'#dc2626'],['酚',10,'#ea580c'],['醇',16,'#94a3b8']].forEach(function(m){
    var x=pkaX(m[1]);
    L.push('<circle cx="'+x+'" cy="'+ry+'" r="5" fill="'+m[2]+'"/>');
    L.push('<text x="'+x+'" y="'+(ry-8)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+m[2]+'" font-family="sans-serif">'+m[0]+'</text>');
    L.push('<text x="'+x+'" y="'+(ry-20)+'" text-anchor="middle" font-size="7" fill="#94a3b8" font-family="sans-serif">'+m[1]+'</text>');
  });
  L.push('</g>');

  // 2. basicity chain
  var base=byId['basemap'];
  L.push('<g onclick="mapPickGeneric(\'mc\',\'basemap\')" style="cursor:pointer">');
  L.push(card('basemap',128,108,'#fff7ed'));
  L.push('<text x="30" y="150" font-size="12" font-weight="800" fill="'+base.darkColor+'" font-family="sans-serif">🔵 鹼性強弱</text>');
  var bchain=[['guanidine','#9a3412'],['amidine','#c2410c'],['amine','#ea580c'],['amide','#94a3b8']];
  var bx=26, bw=68;
  bchain.forEach(function(c,i){
    L.push('<rect x="'+bx+'" y="166" width="'+bw+'" height="38" rx="9" fill="#fff" stroke="'+c[1]+'" stroke-width="1.5"/>');
    L.push('<text x="'+(bx+bw/2)+'" y="189" text-anchor="middle" font-size="9" font-weight="700" fill="'+c[1]+'" font-family="sans-serif">'+c[0]+'</text>');
    if(i<bchain.length-1) L.push('<text x="'+(bx+bw+2)+'" y="190" text-anchor="middle" font-size="12" fill="#cbd5e1" font-family="sans-serif">'+(i===bchain.length-2?'≫':'>')+'</text>');
    bx+=bw+14;
  });
  L.push('<text x="30" y="224" font-size="9" fill="#9a3412" font-family="sans-serif">amidine 生理pH呈鹼性；amide 中性（陷阱）</text>');
  L.push('</g>');

  // 3. lipophilicity
  var lipo=byId['lipomap'];
  L.push('<g onclick="mapPickGeneric(\'mc\',\'lipomap\')" style="cursor:pointer">');
  L.push(card('lipomap',244,96,'#eff6ff'));
  L.push('<text x="30" y="266" font-size="12" font-weight="800" fill="'+lipo.darkColor+'" font-family="sans-serif">⚖️ 脂溶性修飾（logP）</text>');
  L.push('<rect x="26" y="280" width="308" height="22" rx="7" fill="#dbeafe"/>');

function buildMapSVG(sec, active) {
  if (sec==='diur')   return buildNephronSVG(active);
  if (sec==='lipid')  return buildPillChartSVG(LIPID_MAP_DATA.sections, active, 'lipid');
  if (sec==='cancer') return buildCellCycleSVG(active);
  if (sec==='dm')     return buildDMSVG(active);
  if (sec==='abx')    return buildPillChartSVG(ABX_MAP_DATA.targets, active, 'abx');
  if (sec==='ans')    return buildANSSVG(active);
  if (sec==='epi')    return buildPillChartSVG(EPI_MAP_DATA.targets, active, 'epi');
  if (sec==='cns')    return buildSynapseSVG(active);
  if (sec==='pk')     return buildPKFlowSVG(active);
  if (sec==='mc')     return buildMedchemSVG(active);
  if (sec==='tgt')    return buildPillChartSVG(TGT_MAP_DATA.targets, active, 'tgt');
  if (sec==='coag')   return buildPillChartSVG(COAG_MAP_DATA.targets, active, 'coag');
  if (sec==='infx')   return buildPillChartSVG(INFX_MAP_DATA.targets, active, 'infx');
  if (sec==='immu')   return buildPillChartSVG(IMMU_MAP_DATA.targets, active, 'immu');
  if (sec==='misc')   return buildPillChartSVG(MISC_MAP_DATA.targets, active, 'misc');
  return '';
}

function buildMapLegend(sec, active) {
  var items = getMapItems(sec);
  if (!items) return '';
  return items.map(function(item) {
    var isOn = active === item.id;
    return '<button onclick="mapPickGeneric(\''+sec+'\',\''+item.id+'\')" '
      +'style="padding:5px 11px;border-radius:20px;border:2px solid '+item.color+';'
      +'background:'+(isOn?item.color:'#fff')+';color:'+(isOn?'#fff':item.darkColor)+';'
      +'font-size:11px;font-weight:700;cursor:pointer;transition:all .15s">'
      +(item.label||item.fullLabel||'').replace('\n',' ')+'</button>';
  }).join('');
}

function getMapItems(sec) {
  if (sec==='diur')   return DIUR_MAP_DATA.sections;
  if (sec==='lipid')  return LIPID_MAP_DATA.sections;
  if (sec==='cancer') return CANCER_MAP_DATA.phases;
  if (sec==='dm')     return DM_MAP_DATA.zones;
  if (sec==='abx')    return ABX_MAP_DATA.targets;
  if (sec==='ans')    return ANS_MAP_DATA.receptors;
  if (sec==='epi')    return EPI_MAP_DATA.targets;
  if (sec==='cns')    return CNS_MAP_DATA.targets;
  if (sec==='pk')     return PK_MAP_DATA.targets;
  if (sec==='mc')     return MC_MAP_DATA.targets;
  if (sec==='tgt')    return TGT_MAP_DATA.targets;
  if (sec==='coag')   return COAG_MAP_DATA.targets;
  if (sec==='infx')   return INFX_MAP_DATA.targets;
  if (sec==='immu')   return IMMU_MAP_DATA.targets;
  if (sec==='misc')   return MISC_MAP_DATA.targets;
  return null;
}

   steps:['阻斷神經元 <strong>電壓依賴性 Na⁺ 通道</strong>（細胞內側）→ 阻斷動作電位','兩類：<strong>酯類（procaine 等）</strong>由血漿 esterase 水解、易過敏（PABA）；<strong>醯胺類（lidocaine 等）</strong>由肝代謝、過敏少','發炎組織呈酸性 → 藥物離子化↑ → 局麻效果差','常加 epinephrine 收縮血管 → 延長作用、減少吸收'],
   adv:['CNS：口周麻、耳鳴 → 抽搐（高濃度）','心臟：Bupivacaine 心毒性最強（難復甦）','酯類過敏（PABA）'],
   uses:['Lidocaine：浸潤／表面麻醉、抗心律不整（IB）','Bupivacaine：長效、硬膜外／脊髓麻醉'],
   key:'醯胺類記法：名稱中有「兩個 i」（lidocaine、bupivacaine）→ 肝代謝；酯類一個 i → 血漿水解＋易過敏。Bupivacaine 心毒性最強。發炎／膿瘍處局麻無效（酸性環境）。'},
  {id:'cn11',cat:'anes',cL:'麻醉劑',name:'全身麻醉劑（General Anesthetics）',alias:'Propofol / Ketamine / Etomidate ‖ 吸入性（Sevoflurane / N₂O）',sub:'靜脈 + 吸入',color:CNS_COLORS.anes,
   steps:['<strong>Propofol</strong>：GABA_A 增強 → 誘導快、甦醒快；無止痛、降血壓、注射痛','<strong>Ketamine</strong>：<strong>NMDA 受體拮抗</strong> → 解離麻醉；刺激交感 → 血壓／心跳↑（休克可用）；幻覺','<strong>Etomidate</strong>：心血管穩定，但抑制腎上腺皮質醇合成','吸入性：<strong>血／氣分配係數低 → 誘導與甦醒快</strong>（如 N₂O、desflurane）；MAC 越低效價越高','吸入性可誘發<strong>惡性高熱</strong>（malignant hyperthermia）→ Dantrolene 治療'],
   adv:['Propofol：低血壓、注射痛、丙泊酚輸注症候群','Ketamine：幻覺、顱內壓／眼壓↑、分泌物增加','吸入性：惡性高熱（合併 succinylcholine）'],
   uses:['Propofol：麻醉誘導／維持、ICU 鎮靜','Ketamine：兒童／休克／氣喘麻醉、難治性憂鬱','吸入性：麻醉維持'],
   key:'血／氣分配係數低＝誘導甦醒快（重要概念）。MAC 低＝效價高。Ketamine ＝ NMDA 拮抗＋升血壓（與其他全麻降壓相反）。惡性高熱解藥 ＝ Dantrolene。Propofol 無止痛作用。'},
  {id:'cn12',cat:'aps',cL:'抗精神病',name:'抗精神病藥（Antipsychotics）',alias:'典型 Haloperidol / Chlorpromazine ‖ 非典型 Clozapine / Risperidone / Olanzapine / Quetiapine',sub:'阻斷 D₂ 受體',color:CNS_COLORS.aps,
   steps:['<strong>典型（第一代）</strong>：強力阻斷 <strong>D₂ 受體</strong> → 控制陽性症狀；錐體外症候群（EPS）多','<strong>非典型（第二代）</strong>：阻斷 <strong>D₂ + 5-HT₂A</strong> → EPS 較少、對陰性症狀較好；代謝副作用多','阻斷中腦邊緣 D₂ → 抗精神病；阻斷黑質紋狀體 D₂ → EPS；阻斷結節漏斗 → 泌乳素↑','Clozapine：療效最強（難治型）但有顆粒球缺乏（需監測 CBC）'],
   adv:['EPS：急性肌張力不全、靜坐不能、類巴金森、遲發性運動異常（tardive dyskinesia）','高泌乳素血症（溢乳、月經失調）','惡性症候群（NMS）：高燒、肌僵、CK↑ → Dantrolene／Bromocriptine','非典型：體重增加、糖尿病、血脂異常（Olanzapine／Clozapine 最明顯）','Clozapine：顆粒球缺乏、癲癇、心肌炎；Ziprasidone／Haloperidol：QT 延長'],
   uses:['思覺失調症（陽性＋陰性症狀）','雙相情緒障礙躁期','頑固噁心嘔吐（部分）'],
   key:'典型＝D₂ 阻斷＋EPS 多；非典型＝D₂+5-HT₂A＋代謝副作用多。EPS vs 遲發性運動異常要分清。Clozapine 最有效但需監測白血球。NMS（抗精神病）vs 血清素症候群（血清素藥）要鑑別。'},
  {id:'cn13',cat:'pd',cL:'巴金森/肌鬆',name:'抗巴金森藥（Antiparkinson）',alias:'Levodopa+Carbidopa / Pramipexole / Selegiline / Entacapone / Amantadine',sub:'補多巴胺、抗膽鹼',color:CNS_COLORS.pd,
   steps:['巴金森＝黑質多巴胺神經退化 → DA↓、ACh 相對↑','<strong>Levodopa</strong>：DA 前驅物（DA 不過血腦障壁，L-dopa 可）；加 <strong>Carbidopa</strong>（抑制周邊 dopa decarboxylase，不過 BBB）→ 減少周邊副作用、增加進腦量','<strong>多巴胺致效劑</strong>（Pramipexole／Ropinirole）：直接刺激 D₂','<strong>MAO-B 抑制劑</strong>（Selegiline）、<strong>COMT 抑制劑</strong>（Entacapone）：減少 DA 降解','<strong>抗膽鹼</strong>（Benztropine）：改善震顫；<strong>Amantadine</strong>：促 DA 釋放'],
   adv:['Levodopa：噁心、姿勢性低血壓、異動症（dyskinesia）、開關現象（on-off）、長期療效減退','多巴胺致效劑：衝動控制障礙（賭博／購物）、幻覺、嗜睡','Selegiline 高劑量失去 MAO-B 選擇性 → tyramine 反應'],
   uses:['巴金森氏症（Levodopa／Carbidopa 為核心）','早期可先用多巴胺致效劑（年輕者延後 levodopa）'],
   key:'Carbidopa 抑制「周邊」decarboxylase（不入腦）→ 讓更多 L-dopa 進腦、減少周邊噁心／低血壓。維生素 B6 會加速周邊 L-dopa 代謝（合 carbidopa 則不受影響）。長期 levodopa → 異動症與開關現象。'},
  {id:'cn14',cat:'pd',cL:'巴金森/肌鬆',name:'骨骼肌鬆弛劑（Muscle Relaxants）',alias:'Dantrolene / Baclofen / Tizanidine / Cyclobenzaprine',sub:'中樞 vs 周邊作用',color:CNS_COLORS.pd,
   steps:['<strong>Dantrolene</strong>：唯一<strong>直接作用骨骼肌</strong>者 → 抑制肌漿網 <strong>ryanodine 受體</strong>、Ca²⁺ 釋放↓','<strong>Baclofen</strong>：GABA_B 致效劑（脊髓）→ 緩解痙攣','<strong>Tizanidine</strong>：α₂ 致效（中樞）→ 抗痙攣','<strong>Cyclobenzaprine</strong>：結構似 TCA，抗膽鹼，急性肌肉痙攣短期用'],
   adv:['Dantrolene：肝毒性、肌無力','Baclofen：鎮靜、突停 → 戒斷（幻覺、抽搐）','Tizanidine：低血壓、嗜睡'],
   uses:['Dantrolene：<strong>惡性高熱（首選）</strong>、抗精神病惡性症候群、痙攣','Baclofen／Tizanidine：脊髓損傷／多發性硬化痙攣','Cyclobenzaprine：急性肌肉骨骼痛'],
   key:'Dantrolene 是唯一作用在肌肉（ryanodine 受體／Ca²⁺ 釋放）者 → 惡性高熱與 NMS 的解藥。Baclofen ＝ GABA_B（脊髓），突然停藥危險。'}
];
var CNS_FLASH=[
  {id:'cnf1',type:'compare',q:'⚖️ SSRI vs TCA\n安全性與副作用差異？',a:'SSRI：\n· 只抑制 SERT（5-HT↑）\n· 過量「不致命」（安全）\n· 主要副作用：性功能障礙\n\nTCA：\n· 抑制 SERT+NET，並阻斷 M/H₁/α₁\n· 過量「致命」3C：抽搐/昏迷/心毒性\n· 抗膽鹼、姿勢性低血壓、鎮靜\n\n→ 第一線選 SSRI；TCA 多用於神經痛'},
  {id:'cnf2',type:'mech',q:'血清素症候群有哪些常見誘發藥物組合？',a:'機轉：5-HT 過量\n\n危險組合：\n· SSRI/SNRI + MAOI（最典型）\n· + Tramadol、Meperidine\n· + Linezolid（具MAOI活性）\n· + 聖約翰草、止吐劑\n\n三聯徵：\n① 神經肌肉（陣攣、反射亢進）\n② 自主神經（高燒、出汗、心跳快）\n③ 精神狀態改變\n\n與 NMS 鑑別：SS 起病快、有陣攣/反射亢進'},
  {id:'cnf3',type:'mech',q:'非典型抗憂鬱劑各自的記憶點？\n（Bupropion / Mirtazapine / Trazodone）',a:'Bupropion（NE/DA）：\n· 無性功能障礙、可戒菸\n· 降癲癇閾值 → 癲癇/暴食症禁用\n\nMirtazapine（阻α₂/5-HT₂/5-HT₃）：\n· 助眠、增食慾、增重\n· 用於消瘦+失眠的憂鬱\n\nTrazodone（阻5-HT₂）：\n· 助眠\n· 副作用：priapism（陰莖異常勃起）'},
  {id:'cnf4',type:'compare',q:'⚖️ BZD vs 巴比妥\n在 GABA_A 的差異？',a:'BZD（Diazepam）：\n· Cl⁻ 通道「開放頻率↑」\n· 需 GABA 才作用 → 安全性較高\n· 解毒劑 Flumazenil\n\n巴比妥（Phenobarbital）：\n· Cl⁻ 通道「開放時間↑」\n· 高劑量可不需 GABA 直接開通道\n· 過量更易致死\n\n記憶：BZD=頻率、Barb=時間'},
  {id:'cnf5',type:'compare',q:'⚖️ Zolpidem vs Buspirone\n各自特性？',a:'Zolpidem（Z-drug）：\n· 選擇作用 GABA_A 的 α₁\n· 主要助眠、依賴性較BZD低\n· 副作用：睡眠相關複雜行為（夢遊）\n· 仍可被 Flumazenil 拮抗\n\nBuspirone：\n· 5-HT₁A 部分致效\n· 抗焦慮，無鎮靜/無依賴/無肌鬆\n· 起效慢（1-2週）\n· 適合慢性廣泛性焦慮'},
  {id:'cnf6',type:'mech',q:'嗎啡中毒的三大徵象與解毒劑？\n哪些副作用不會耐受？',a:'三大中毒徵象：\n① 呼吸抑制（致死主因）\n② 昏迷/嗜睡\n③ 針點瞳孔（pinpoint pupil）\n\n解毒劑：Naloxone（IV，半衰期短\n→ 須監測再中毒、可能需重複給）\n\n不會產生耐受的副作用：\n· 便秘（縮瞳也不會）\n\n→ 其他（鎮痛、欣快、呼吸抑制）會耐受'},
  {id:'cnf7',type:'mech',q:'Codeine 為什麼療效因人而異？\nFentanyl / Methadone / Tramadol 各記什麼？',a:'Codeine：\n· 是前驅藥，須 CYP2D6 → 轉成嗎啡\n· 超快代謝者 → 呼吸抑制；\n  弱代謝者 → 無效\n\nFentanyl：脂溶性高、效價最強（~100×）\nMethadone：長效、QT 延長、戒癮維持\nTramadol：弱μ+抑5-HT/NE回收\n→ 血清素症候群、降癲癇閾值'},
  {id:'cnf8',type:'mech',q:'Acetaminophen 過量的肝毒機轉與解毒劑？',a:'機轉：\n常規劑量 → 大多 glucuronide/sulfate 結合\n少量經 CYP2E1 → NAPQI（毒性代謝物）\n→ 正常被 glutathione 中和\n\n過量時：\nglutathione 耗盡 → NAPQI 蓄積\n→ 肝細胞壞死\n\n解毒劑：N-acetylcysteine（NAC）\n（補充 glutathione 前驅物）\n★ 不是維生素C（常見陷阱）'},
  {id:'cnf9',type:'compare',q:'⚖️ 局麻：酯類 vs 醯胺類\n如何區分與代謝？',a:'醯胺類（Amide）：\n· 名稱有「兩個 i」：lidocaine、\n  bupivacaine、ropivacaine\n· 肝臟代謝、過敏少\n· Bupivacaine 心毒性最強\n\n酯類（Ester）：\n· 名稱一個 i：procaine、benzocaine\n· 血漿 esterase 水解\n· 代謝物 PABA → 較易過敏\n\n發炎/膿瘍（酸性）→ 局麻效果差'},
  {id:'cnf10',type:'mech',q:'吸入麻醉劑：血/氣分配係數與 MAC 的意義？',a:'血/氣分配係數（溶解度）：\n· 低 → 血中達平衡快\n→ 誘導與甦醒「快」（如 N₂O、desflurane）\n· 高 → 誘導甦醒慢\n\nMAC（最低肺泡濃度）：\n· 反映「效價」\n· MAC 越低 → 效價越高\n\n惡性高熱：\n吸入麻醉+succinylcholine 誘發\n→ 解藥 Dantrolene'},
  {id:'cnf11',type:'mech',q:'Ketamine 與其他全麻有何關鍵差異？',a:'Ketamine：\n· 機轉：NMDA 受體「拮抗」\n· 解離性麻醉（保留部分反射）\n· 刺激交感 → 血壓/心跳「上升」\n  （其他全麻多降壓 → 休克可用）\n· 支氣管擴張（氣喘可用）\n· 副作用：幻覺、顱內壓/眼壓↑\n  分泌物增加'},
  {id:'cnf12',type:'compare',q:'⚖️ 典型 vs 非典型抗精神病\n機轉與副作用差異？',a:'典型（Haloperidol）：\n· 強阻斷 D₂\n· 錐體外症候群（EPS）多\n· 高泌乳素\n\n非典型（Risperidone/Olanzapine/\nClozapine）：\n· 阻斷 D₂ + 5-HT₂A\n· EPS 較少、對陰性症狀較好\n· 代謝副作用多（增重、糖尿病）\n\nClozapine：最有效但顆粒球缺乏\n（需監測白血球）'},
  {id:'cnf13',type:'compare',q:'⚖️ 惡性症候群(NMS) vs 血清素症候群\n如何鑑別？',a:'NMS（抗精神病/停 levodopa）：\n· D₂ 阻斷過度\n· 高燒、肌「鉛管樣僵直」、CK↑\n· 起病慢（數天）、反射「正常或↓」\n· 治療：Dantrolene、Bromocriptine\n\n血清素症候群（5-HT藥）：\n· 5-HT 過量\n· 高燒、「陣攣、反射亢進」\n· 起病「快」（數小時）\n· 治療：停藥、Cyproheptadine'},
  {id:'cnf14',type:'mech',q:'Levodopa 為何要加 Carbidopa？\nVitamin B6 的影響？',a:'Levodopa：DA 前驅物（DA 不過BBB）\n但周邊就被 dopa decarboxylase\n轉成 DA → 噁心、姿勢性低血壓\n\nCarbidopa：\n· 抑制「周邊」decarboxylase\n· 本身不過 BBB\n→ 更多 L-dopa 進腦、周邊副作用↓\n\nVitamin B6：\n· 是 decarboxylase 輔酶\n· 單用 levodopa 時 → 加速周邊代謝、療效↓\n· 但合用 carbidopa 後不受影響'},
  {id:'cnf15',type:'mech',q:'Dantrolene 的特殊地位？',a:'唯一「直接作用骨骼肌」的肌鬆劑\n\n機轉：\n抑制肌漿網 ryanodine 受體\n→ Ca²⁺ 釋放↓ → 肌肉收縮↓\n\n關鍵用途（必背）：\n① 惡性高熱（首選解藥）\n② 抗精神病惡性症候群(NMS)\n③ 痙攣\n\n副作用：肝毒性、肌無力'}
];
var CNS_QUIZ=[
  {type:'機轉',q:'SSRI 類抗憂鬱劑的主要作用機轉為何？',opts:['同時抑制 SERT 與 NET','選擇性抑制 SERT（血清素轉運體）','阻斷突觸後 5-HT₂ 受體','抑制單胺氧化酶 MAO'],ans:1,exp:'SSRI（如 fluoxetine）選擇性抑制突觸前血清素轉運體 SERT，使突觸間隙 5-HT 上升，對 NE/DA/組織胺/膽鹼受體幾乎無作用，故副作用比 TCA 少、過量較安全。'},
  {type:'交互作用',q:'下列何種組合最容易引起血清素症候群（serotonin syndrome）？',opts:['SSRI + 制酸劑','TCA + 抗組織胺','SSRI + MAOI','SSRI + 鐵劑'],ans:2,exp:'SSRI 與 MAOI 併用會使 5-HT 大量累積，引發血清素症候群（高燒、陣攣、反射亢進、自主神經不穩）。兩者須間隔至少 14 天（fluoxetine 因半衰期長須隔約 5 週）。Tramadol、meperidine、linezolid 也是危險組合。'},
  {type:'副作用',q:'關於三環抗憂鬱劑（TCA）過量，下列何者正確？',opts:['過量幾乎不致命','主要毒性為心臟毒性，可用碳酸氫鈉處理','僅引起輕微腸胃不適','解毒劑為 Flumazenil'],ans:1,exp:'TCA 阻斷心臟 Na⁺ 通道，過量導致 QRS 增寬與致命性心律不整（3C：抽搐 Convulsions、昏迷 Coma、心毒性 Cardiotoxicity）。處理以碳酸氫鈉（NaHCO₃）穩定心肌。這也是 TCA 不再是第一線、避免用於自殺風險者的原因。'},
  {type:'選藥',q:'憂鬱症病人擔心性功能障礙且想戒菸，下列何種抗憂鬱劑最適合？',opts:['Paroxetine','Bupropion','Sertraline','Venlafaxine'],ans:1,exp:'Bupropion 作用於 NE/DA 回收抑制，不引起性功能障礙，且可用於戒菸。但會降低癲癇閾值，癲癇病史或暴食症/厭食症病人禁用。'},
  {type:'機轉',q:'Benzodiazepines 與巴比妥類在 GABA_A 受體的作用差異為何？',opts:['BZD 增加 Cl⁻ 開放時間；巴比妥增加開放頻率','BZD 增加 Cl⁻ 開放頻率；巴比妥增加開放時間','兩者皆直接開啟通道','兩者皆作用於 5-HT₁A'],ans:1,exp:'BZD 增加 Cl⁻ 通道「開放頻率」（需有 GABA 存在）；巴比妥增加「開放時間」（高劑量可不需 GABA 直接開通道）。因 BZD 需 GABA 才作用，過量較少致死，安全性較高。解毒劑為 Flumazenil。'},

var PK_FLASH=[
  {id:'pkf1',type:'compare',q:'⚖️ 競爭性 vs 非競爭性拮抗\n對劑量反應曲線的影響？',a:'競爭性拮抗（可逆）：\n· 與致效劑搶「同一位點」\n· 曲線「平行右移」\n· Emax「不變」、EC50↑\n· 可被「增加致效劑劑量」克服\n\n非競爭性/不可逆拮抗：\n· Emax「下降」\n· 「無法」被增加劑量克服\n· 例：phenoxybenzamine(不可逆α)\n\n圖判讀必考！'},
  {id:'pkf2',type:'mech',q:'部分致效劑（partial agonist）特性？\n為何在完全致效劑存在時像拮抗劑？',a:'部分致效劑：\n· 即使佔滿受體，Emax 仍較低\n· 單獨給：產生部分反應\n\n在完全致效劑存在時：\n· 競爭受體但只給「部分」反應\n· 把完全致效劑擠掉\n→ 總反應「下降」→ 表現如拮抗\n\n例：buprenorphine(部分μ致效)\n   varenicline(部分尼古丁致效)'},
  {id:'pkf3',type:'mech',q:'治療指數 TI 公式？\n哪些是窄治療指數藥？',a:'TI = LD50 / ED50\n（分母是有效劑量，分子是致死劑量）\n→ TI 越大越安全\n\n★陷阱：別寫反了\n\n窄治療指數藥（需TDM）：\n· Warfarin、Digoxin、Lithium\n· Phenytoin、Theophylline\n· Aminoglycosides\n\n→ 安全範圍窄，須監測血中濃度'},
  {id:'pkf4',type:'mech',q:'生體可用率F與首渡效應？\n哪些途徑可繞過？',a:'生體可用率 F：\n進入全身循環的比例\n· IV → F = 100%(基準)\n· 口服 → 經腸壁+肝臟代謝↓\n\n首渡效應大的藥：\nPropranolol、Lidocaine、\nNitroglycerin、Morphine\n→ 口服效果差\n\n繞過首渡的途徑：\n舌下、經皮、直腸(部分)、靜脈\n(例：硝化甘油用舌下)'},
  {id:'pkf5',type:'mech',q:'分布體積 Vd 大小的意義？\n與負荷劑量、透析的關係？',a:'Vd = 體內總藥量 / 血漿濃度\n（表觀體積）\n\nVd 大：\n· 組織分布多(脂溶性高)\n· 透析「難」移除(如digoxin)\n\nVd 小：\n· 留血漿(水溶性、高蛋白結合)\n\n負荷劑量 = Vd × 目標濃度 / F\n→ 由 Vd 決定(與腎功能無關)\n\n只有「游離型」藥物有活性'},
  {id:'pkf6',type:'compare',q:'⚖️ CYP 誘導劑 vs 抑制劑\n各舉例與後果？',a:'誘導劑(加速代謝→降效)：\n· Rifampin\n· Carbamazepine/Phenytoin/\n  Phenobarbital\n· 聖約翰草、慢性酒精、吸菸\n→ 使warfarin、避孕藥失效\n\n抑制劑(升濃度→增毒)：\n· Azole抗黴菌\n· Macrolide(erythromycin等)\n· Grapefruit juice、Cimetidine\n· Amiodarone、Ritonavir\n→ 使statin、warfarin中毒\n\n前驅藥(codeine)方向相反'},
  {id:'pkf7',type:'compare',q:'⚖️ 一級 vs 零級消除動力學\n哪些藥是零級？',a:'一級(first-order)：\n· 消除速率 ∝ 濃度\n· t½「固定」\n· 多數藥物\n\n零級(zero-order)：\n· 固定「量」/時間被代謝(酶飽和)\n· t½「隨濃度變」\n· 小幅加量→濃度暴增\n\n零級藥(必背)：\nPhenytoin、乙醇(酒精)、\n高劑量Aspirin、Theophylline'},
  {id:'pkf8',type:'mech',q:'半衰期公式？\n維持劑量與負荷劑量分別由什麼決定？',a:'t½ = 0.693 × Vd / CL\n→ Vd 與 CL 共同決定\n\n負荷劑量(Loading)：\n= Vd × 目標濃度 / F\n→ 由「Vd」決定\n→ 腎肝差「不需」調整\n\n維持劑量(Maintenance)：\n= CL × 目標濃度 / F\n→ 由「CL」決定\n→ 腎肝差「需減量」\n\n約4-5個t½達穩態'},
  {id:'pkf9',type:'mech',q:'中毒時尿液pH調整(離子捕捉)原則？',a:'原理：離子化(帶電)的藥\n不易被腎小管再吸收→留尿排出\n\n弱酸性藥中毒(aspirin、\nphenobarbital)：\n→「鹼化尿液」(給NaHCO₃)\n→ 酸藥在鹼性尿中離子化↑→排出\n\n弱鹼性藥中毒(amphetamine)：\n→「酸化尿液」\n\n記法：酸藥鹼化尿、鹼藥酸化尿\n(讓藥變離子型卡在尿中)'},
  {id:'pkf10',type:'mech',q:'臨床試驗各期目的與受試對象？',a:'第一期(Phase I)：\n· 20-100名「健康自願者」\n· 測安全性、劑量範圍\n· (抗癌藥例外：用病人)\n\n第二期(Phase II)：\n· ~100-300名「病人」\n· 測初步療效\n\n第三期(Phase III)：\n· 大規模、雙盲隨機對照\n· 確立療效與安全→上市申請\n\n第四期(Phase IV)：\n· 上市後監測\n· 偵測罕見/長期副作用'}
];
var PK_QUIZ=[
  {type:'藥效學',q:'某藥為受體的競爭性（可逆）拮抗劑，對致效劑劑量反應曲線的影響為何？',opts:['Emax 下降，無法被增加致效劑劑量克服','曲線平行右移，Emax 不變，可被增加致效劑劑量克服','曲線左移，效價增加','對曲線無影響'],ans:1,exp:'競爭性可逆拮抗劑與致效劑搶同一結合位點，使曲線平行右移、EC50 增加，但 Emax 不變，且可被增加致效劑劑量克服。非競爭性/不可逆拮抗則使 Emax 下降且無法被克服。'},
  {type:'藥效學',q:'治療指數（therapeutic index, TI）的正確定義為何？',opts:['TI = ED50 / LD50','TI = LD50 / ED50','TI = 每日劑量 / ED50','TI = ED50 / 每日劑量'],ans:1,exp:'治療指數 TI = LD50 / ED50（致死劑量除以有效劑量），TI 越大代表安全範圍越廣。把分子分母寫反是最常見的陷阱。Warfarin、digoxin、lithium、phenytoin 等屬窄治療指數藥，需監測血中濃度。'},
  {type:'藥動學',q:'關於分布體積（Vd）的敘述，下列何者正確？',opts:['血漿蛋白結合比例越高，Vd 越大','Vd 大代表藥物多分布到組織，脂溶性通常較高','Vd 是真實的解剖體積','Vd 大的藥物容易用血液透析移除'],ans:1,exp:'Vd = 體內總藥量 / 血漿濃度，是「表觀」體積。Vd 大代表藥物大量分布到組織（脂溶性高），這類藥（如 digoxin）透析難以移除。血漿蛋白結合高的藥多留在血漿，Vd 反而小。'},
  {type:'交互作用',q:'下列何者為 CYP450 酵素「誘導劑」，會加速併用藥物代謝而降低其療效？',opts:['Erythromycin','Ketoconazole','Rifampin','Grapefruit juice'],ans:2,exp:'Rifampin 是強效 CYP 誘導劑，加速併用藥（如 warfarin、口服避孕藥）代謝而降低療效。Erythromycin、ketoconazole（azole）、grapefruit juice 則是 CYP 抑制劑，會升高併用藥濃度而增加毒性。'},
  {type:'藥動學',q:'Phenytoin、乙醇、高劑量 aspirin 共同的藥動學特性為何？',opts:['一級動力學，半衰期固定','零級動力學，代謝酶飽和，半衰期隨濃度改變','不經肝臟代謝','分布體積極大'],ans:1,exp:'這些藥呈零級（zero-order）動力學：代謝酶飽和，固定量/時間被代謝，半衰期隨濃度變化。因此 phenytoin 小幅加量可使血中濃度暴增而中毒，治療窗窄需監測。'},
  {type:'計算',q:'負荷劑量（loading dose）主要由下列何者決定，且腎功能不全時通常不需調整？',opts:['清除率 CL','分布體積 Vd','半衰期','血漿蛋白結合率'],ans:1,exp:'負荷劑量 = Vd × 目標濃度 / F，由分布體積決定，目的是快速達到目標血中濃度，與腎功能無直接關係（通常不需調整）。維持劑量則由清除率 CL 決定，腎/肝功能差時需減量。'},
  {type:'藥動學',q:'半衰期（t½）的正確關係式為何？',opts:['t½ = 0.693 × CL / Vd','t½ = 0.693 × Vd / CL','t½ = CL × Vd','t½ = Vd / 0.693'],ans:1,exp:'t½ = 0.693 × Vd / CL，半衰期由分布體積與清除率共同決定。Vd 增加或 CL 下降都會延長半衰期。約需 4-5 個半衰期達到穩定狀態，也約需 4-5 個半衰期完成排除。'},
  {type:'吸收',q:'下列何種給藥途徑的生體可用率（F）為 100%，可作為計算基準？',opts:['口服','舌下','靜脈注射','經皮'],ans:2,exp:'靜脈注射（IV）藥物直接進入全身循環，生體可用率 F = 100%，是計算其他途徑 F 的基準。口服藥因首渡效應 F 通常較低；首渡效應大的藥（如 nitroglycerin）改用舌下給藥可繞過肝臟。'},
  {type:'中毒',q:'Aspirin（弱酸性藥）過量中毒時，加速其腎臟排除的方法為何？',opts:['酸化尿液','鹼化尿液（給碳酸氫鈉）','限制水分','給維生素 C'],ans:1,exp:'弱酸性藥（aspirin、phenobarbital）在鹼性尿中離子化增加，不易被腎小管再吸收而隨尿排出，因此以碳酸氫鈉鹼化尿液可加速排除（離子捕捉）。弱鹼性藥中毒則酸化尿液。'},
  {type:'臨床試驗',q:'關於新藥臨床試驗的敘述，下列何者正確？',opts:['第一期主要在大量病人測試療效','第二期招募健康自願者測安全劑量','第三期通常以雙盲隨機對照在大量病人確立療效與安全','第四期在上市前進行'],ans:2,exp:'第一期以 20-100 名健康自願者測安全與劑量範圍（抗癌藥例外用病人）；第二期約 100-300 名病人測初步療效；第三期大規模雙盲隨機對照確立療效與安全，作為上市依據；第四期是上市後監測罕見/長期副作用。'}

/* ════════ 分類配對遊戲 (tap-to-pair matching game) ════════ */
/* modes: target(藥→標的) · cancer(藥→癌症) · klass(藥→分類) */
function _shuffle(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}

function buildMatchRound(mode){
  var key = mode; // 'target' | 'cancer' | 'klass'
  // pick entries with DISTINCT values in the chosen dimension (avoid ambiguity)
  var pool=_shuffle(TGT_MATCH);
  var seen={}, picked=[];
  for(var i=0;i<pool.length && picked.length<5;i++){
    var v=pool[i][key];
    if(seen[v]) continue;
    seen[v]=1; picked.push(pool[i]);
  }
  // left = drugs (in given order), right = values shuffled
  var left = picked.map(function(p,idx){return {id:idx, drug:p.drug, val:p[key]};});
  var right = _shuffle(picked.map(function(p,idx){return {id:idx, val:p[key]};}));
  return {mode:mode, left:left, right:right, sel:null, matched:{}, wrong:null, done:false};
}

function ensureMatch(sec){
  var s=STATE[sec];
  if(!s._match){ s._match=buildMatchRound('target'); }
  return s._match;
}

function matchPickLeft(sec, lid){
  var m=ensureMatch(sec);
  if(m.matched[lid]!==undefined) return;
  m.sel = (m.sel===lid? null : lid);
  m.wrong=null;
  renderSection(sec);
}
function matchPickRight(sec, val){
  var m=ensureMatch(sec);
  if(m.sel===null){ return; }
  var left=m.left[m.sel];
  if(left.val===val){
    m.matched[m.sel]=val;
    m.sel=null; m.wrong=null;
    // done?
    if(Object.keys(m.matched).length===m.left.length){ m.done=true; }
  } else {
    m.wrong={lid:m.sel, val:val};
    // brief flash then clear selection
    m.sel=null;
  }
  renderSection(sec);
}
function matchNewRound(sec, mode){
  STATE[sec]._match=buildMatchRound(mode||STATE[sec]._match.mode);
  renderSection(sec);
}

function renderMatchGame(sec, data){
  var s=STATE[sec];
  var m=ensureMatch(sec);
  var ac=data.accentColor||'#1a1a18', ab=data.accentBg||'#f5f4f0';
  var modes=[{id:'target',label:'藥 → 標的'},{id:'cancer',label:'藥 → 癌症'},{id:'klass',label:'藥 → 分類'}];

  var html='<div style="margin-bottom:10px">';
  // mode selector
  html+='<div style="display:flex;gap:6px;margin-bottom:12px">';
  modes.forEach(function(md){
    var on=m.mode===md.id;
    html+='<button onclick="matchNewRound(\''+sec+'\',\''+md.id+'\')" '
      +'style="flex:1;padding:9px 4px;border-radius:10px;border:2px solid '+(on?ac:'#e0ded8')+';'
      +'background:'+(on?ab:'#fff')+';color:'+(on?ac:'#888')+';font-size:12px;font-weight:700;cursor:pointer">'
      +md.label+'</button>';
  });
  html+='</div>';

  var total=m.left.length, done=Object.keys(m.matched).length;

  if(m.done){
    html+='<div style="text-align:center;padding:24px 12px;background:'+ab+';border-radius:16px">'
      +'<div style="font-size:40px">🎉</div>'
      +'<div style="font-size:18px;font-weight:800;color:'+ac+';margin:8px 0">全部配對完成！</div>'
      +'<div style="font-size:13px;color:#666;margin-bottom:16px">'+total+' / '+total+' 正確</div>'
      +'<button onclick="matchNewRound(\''+sec+'\')" style="padding:11px 22px;border-radius:12px;border:none;background:'+ac+';color:#fff;font-size:14px;font-weight:700;cursor:pointer">🔀 下一輪</button>'
      +'</div></div>';
    return html;
  }

  // instructions + progress
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:12px;color:#888">點左邊藥物，再點右邊對應'+(m.mode==='target'?'標的':m.mode==='cancer'?'癌症':'分類')+'</span>'
    +'<span style="font-size:12px;font-weight:700;color:'+ac+'">'+done+' / '+total+'</span></div>';

  // two-column board
  html+='<div style="display:flex;gap:10px;align-items:stretch">';
  // LEFT column (drugs)
  html+='<div style="flex:1;display:flex;flex-direction:column;gap:8px">';
  m.left.forEach(function(l){
    var isMatched=m.matched[l.id]!==undefined;
    var isSel=m.sel===l.id;
    var isWrong=m.wrong&&m.wrong.lid===l.id;
    var bg=isMatched?'#dcfce7':(isSel?ab:(isWrong?'#fee2e2':'#fff'));
    var bd=isMatched?'#4ade80':(isSel?ac:(isWrong?'#f87171':'#e0ded8'));
    var col=isMatched?'#166534':(isSel?ac:'#333');
    html+='<button onclick="matchPickLeft(\''+sec+'\','+l.id+')" '+(isMatched?'disabled ':'')
      +'style="padding:13px 10px;border-radius:12px;border:2px solid '+bd+';background:'+bg+';color:'+col+';'
      +'font-size:13px;font-weight:700;cursor:'+(isMatched?'default':'pointer')+';text-align:left;min-height:48px;display:flex;align-items:center;gap:6px">'
      +(isMatched?'<span>✓</span>':'')+'<span>'+l.drug+'</span></button>';
  });
  html+='</div>';
  // RIGHT column (values)
  html+='<div style="flex:1.1;display:flex;flex-direction:column;gap:8px">';
  m.right.forEach(function(r){
    // is this value already matched (locked)?
    var lockedLid=null;
    Object.keys(m.matched).forEach(function(k){ if(m.matched[k]===r.val) lockedLid=k; });
    var isLocked=lockedLid!==null;
    var bg=isLocked?'#dcfce7':'#fff';
    var bd=isLocked?'#4ade80':'#e0ded8';
    var col=isLocked?'#166534':'#333';
    html+='<button onclick="matchPickRight(\''+sec+'\',\''+r.val.replace(/'/g,"\\'")+'\')" '+(isLocked?'disabled ':'')
      +'style="padding:13px 10px;border-radius:12px;border:2px solid '+bd+';background:'+bg+';color:'+col+';'
      +'font-size:12px;font-weight:600;cursor:'+(isLocked?'default':'pointer')+';text-align:left;min-height:48px;display:flex;align-items:center;gap:6px;line-height:1.3">'
      +(isLocked?'<span>✓</span>':'')+'<span>'+r.val+'</span></button>';
  });
  html+='</div>';
  html+='</div>';

  if(m.wrong){
    html+='<div style="text-align:center;font-size:12px;color:#dc2626;margin-top:10px;font-weight:700">✗ 配對錯誤，再試一次</div>';
  }
  html+='<button onclick="matchNewRound(\''+sec+'\')" style="width:100%;margin-top:14px;padding:10px;border-radius:10px;border:1.5px dashed '+ac+';background:#fff;color:'+ac+';font-size:12px;font-weight:700;cursor:pointer">🔀 換一組題目</button>';
  html+='</div>';
  return html;
}

/* Build a question pool from a section's drugs */
function buildMechPool(sec, data){
  var drugs = data.drugs.filter(function(d){
    // skip the "special" catch-all entry like pregnancy drug guide
    return d.steps && d.steps.length && d.steps[0].length > 10 &&
           d.name.indexOf('孕婦') === -1 && d.name.indexOf('孕期') === -1;
  });

  var questions = [];
  drugs.forEach(function(drug){
    // Q-type 1: "這個藥的作用機轉是？" — answer is steps[0] keyword
    var correctMech = drug.steps[0].replace(/<[^>]+>/g,'').trim();
    // Generate 3 distractors from other drugs in same section
    var others = drugs.filter(function(x){ return x.id !== drug.id; });
    // shuffle
    for(var i=others.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=others[i];others[i]=others[j];others[j]=t;}
    var distractors = others.slice(0,3).map(function(x){
      return x.steps[0].replace(/<[^>]+>/g,'').trim();
    });
    // trim to reasonable length
    var maxLen = 55;
    function trim(s){ return s.length>maxLen ? s.substring(0,maxLen)+'…' : s; }
    var opts = [trim(correctMech)].concat(distractors.map(trim));
    // shuffle opts
    for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=opts[i];opts[i]=opts[j];opts[j]=t;}
    var ans = opts.indexOf(trim(correctMech));

    questions.push({
      type:'mech',
      drug: drug.name,
      alias: drug.alias || '',
      cL: drug.cL,
      color: drug.color,
      q: drug.name + ' 的主要作用機轉是？',
      opts: opts,
      ans: ans,
      fullMech: correctMech,
      exp: drug.steps.map(function(s,i){
        return ['①','②','③','④','⑤'][i] + ' ' + s.replace(/<[^>]+>/g,'');
      }).join('\n')
    });

    // Q-type 2: "這個機轉對應的是哪個藥？" (reverse)
    // Use first meaningful step as clue
    var mechClue = trim(correctMech);
    var drugOpts = [drug.name].concat(others.slice(0,3).map(function(x){return x.name;}));
    for(var i=drugOpts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=drugOpts[i];drugOpts[i]=drugOpts[j];drugOpts[j]=t;}
    var drugAns = drugOpts.indexOf(drug.name);

    questions.push({
      type:'reverse',
      drug: drug.name,
      alias: drug.alias || '',
      cL: drug.cL,
      color: drug.color,
      q: '「' + mechClue + '」\n\n↑ 這是哪個藥物的作用機轉？',
      opts: drugOpts,
      ans: drugAns,
      fullMech: correctMech,
      exp: drug.steps.map(function(s,i){
        return ['①','②','③','④','⑤'][i] + ' ' + s.replace(/<[^>]+>/g,'');
      }).join('\n')
    });
  });

  // Shuffle the whole pool
  for(var i=questions.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=questions[i]; questions[i]=questions[j]; questions[j]=t;
  }
  return questions;
}

function renderMechChallenge(sec, data){
  var s = STATE[sec];
  var accentColor = data.accentColor || '#1a1a18';
  var accentBg = data.accentBg || '#f5f4f0';

  // Build pool on first render
  if(!s._mqpool || s._mqpool.length === 0){
    s._mqpool = buildMechPool(sec, data);
    s._mqi = 0; s._mqs = 0; s._mqa = false; s._mqd = false; s._mqp = undefined;
  }
  var pool = s._mqpool;

  // Difficulty selector + mode selector at top
  var html = '';

  // Done screen
  if(s._mqd){
    var pct = Math.round(s._mqs / pool.length * 100);
    var msg = pct>=85 ? '🎉 機轉全部掌握！' : pct>=65 ? '💪 不錯，繼續練習' : '📖 多練幾次加強記憶';
    return '<div class="quiz-wrap">'
      +'<div class="score-card">'
      +'<div class="score-big" style="color:'+accentColor+'">'+s._mqs+'/'+pool.length+'</div>'
      +'<div class="score-label">'+msg+'</div>'
      +'<div class="score-breakdown" style="font-size:13px;color:#888;margin-bottom:20px">正確率 '+pct+'%</div>'
      +'<div style="display:flex;gap:10px;justify-content:center">'
      +'<button class="restart-btn" onclick="STATE[\''+sec+'\']._mqpool=null;STATE[\''+sec+'\']._mqi=0;STATE[\''+sec+'\']._mqs=0;STATE[\''+sec+'\']._mqa=false;STATE[\''+sec+'\']._mqd=false;STATE[\''+sec+'\']._mqp=undefined;saveMech(\''+sec+'\');renderSection(\''+sec+'\')">🔀 重新出題</button>'
      +'</div>'
      +'</div></div>';
  }

  var q = pool[s._mqi];
  var typeLabel = q.type === 'mech'
    ? '<span style="background:'+accentBg+';color:'+accentColor+';font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em">藥 → 機轉</span>'
    : '<span style="background:#fef3c7;color:#78350f;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em">機轉 → 藥</span>';

  html += '<div class="quiz-wrap">';

  // Progress
  html += '<div class="quiz-meta">'
    +'<span class="quiz-prog">'+(s._mqi+1)+' / '+pool.length+'</span>'
    +'<span class="quiz-prog" style="color:'+accentColor+'">✓ '+s._mqs+'</span>'
    +'</div>'
    +'<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+Math.round(s._mqi/pool.length*100)+'%;background:'+accentColor+'"></div></div>';

  html += '<div class="quiz-card">';

  // Drug / type badge
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
    + typeLabel;
  if(q.type === 'mech'){
    html += '<span style="background:'+q.color.bg+';color:'+q.color.tx+';border:1px solid '+q.color.bd+';font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">'+q.cL+'</span>';
  }
  html += '</div>';

  // Question
  var qLines = q.q.split('\n');
  html += '<div class="quiz-q">';
  if(q.type === 'mech'){
    // Show drug name prominently
    html += '<span style="font-size:17px;font-weight:800;color:'+accentColor+'">'+qLines[0].replace(' 的主要作用機轉是？','')+'</span>'
         + '<div style="font-size:14px;color:#555;margin-top:4px;font-weight:500">的主要作用機轉是？</div>';
    if(q.alias) html += '<div style="font-size:12px;color:#aaa;margin-top:2px">'+q.alias+'</div>';
  } else {
    // Show mechanism clue
    html += '<div style="background:#f5f4f0;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#1a1a18;line-height:1.6;font-weight:500">'+qLines[0]+'</div>';
    html += '<div style="font-size:14px;font-weight:600;color:#1a1a18">↑ 這是哪個藥物的作用機轉？</div>';
  }
  html += '</div>';

  // Options
  html += '<div class="quiz-opts">';
  q.opts.forEach(function(o, i){
    var cls = 'opt';
    if(s._mqa){
      if(i === q.ans) cls += ' correct';
      else if(s._mqp === i) cls += ' wrong';
    }
    html += '<button class="'+cls+'" onclick="mechPick(\''+sec+'\','+i+')"'+(s._mqa?' disabled':'')+'>'+String.fromCharCode(65+i)+'. '+o+'</button>';
  });
  html += '</div>';

  // Explanation after answer
  if(s._mqa){
    var isLast = (s._mqi === pool.length - 1);
    var expHtml = formatFlashAnswer(q.exp);
    html += '<div class="quiz-explain">'
      +'<div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px">完整機轉</div>'
      + expHtml
      +'</div>'
      +'<button class="next-btn" style="background:'+accentColor+'" onclick="mechNext(\''+sec+'\')">'+(isLast?'查看結果':'下一題 →')+'</button>';
  }

  html += '</div></div>';
  return html;
}

function mechPick(sec, i){
  var s = STATE[sec];
  if(s._mqa) return;
  s._mqp = i; s._mqa = true;
  if(i === s._mqpool[s._mqi].ans) s._mqs++;
  saveMech(sec);
  renderSection(sec);
}
function mechNext(sec){
  var s = STATE[sec];
  if(s._mqi === s._mqpool.length - 1){ s._mqd = true; }
  else { s._mqi++; s._mqa = false; s._mqp = undefined; }
  saveMech(sec);
  renderSection(sec);
}

/* Find drug id within any section by matching name */
function findDrugInSection(sec, label) {
  var drugs = SECTIONS[sec] && SECTIONS[sec].drugs;
  if (!drugs) return null;
  // Strip parenthetical explanations for matching
  var key = label.split('（')[0]  // full-width (
              .split('（')[0]
              .split('）')[0]
              .split('（')[0]
              .split('/')[0]
              .split('（')[0]
              .trim();
  var found = drugs.find(function(dr) {
    var drKey = dr.name.split('/')[0].trim();
    var drAlias = (dr.alias||'').split('/')[0].trim();
    var drCL = (dr.cL||'').trim();
    return dr.name.indexOf(key) > -1 || key.indexOf(drKey) > -1 || drKey.indexOf(key) > -1
      || drAlias.indexOf(key) > -1 || key.indexOf(drAlias) > -1
      || drCL.indexOf(key) > -1 || key.indexOf(drCL) > -1;
  });
  return found ? found.id : null;
}

/* Find drug in any section by name fragment */
function findDrugInSection(sec, label) {
  var key = label.split('（')[0].split('（')[0].split('/')[0].split('（')[0].trim();
  if(!key || key.length < 2) return null;
  var drugs = SECTIONS[sec] ? SECTIONS[sec].drugs : [];
  var found = null;
  for(var i=0;i<drugs.length;i++){
    var dr = drugs[i];
    if(!dr) continue;
    if(dr.name.indexOf(key)>-1 || key.indexOf(dr.name.split('/')[0].trim())>-1 ||
       (dr.alias && dr.alias.indexOf(key)>-1)){
      found = dr.id; break;
    }
  }
  return found;
}
