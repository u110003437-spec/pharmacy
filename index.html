/* ── Flash answer formatter ── */
function formatFlashAnswer(raw){
  // Split into logical blocks by double newline
  var blocks = raw.split(/\n\n+/);
  var out = '';
  // pre-colour arrows and acid/base keywords
  raw = colourText(raw);
  blocks = raw.split(/\n\n+/);
  blocks.forEach(function(block, bi){
    if(bi > 0) out += '<div class="fa-sep"></div>';
    var lines = block.split('\n');
    // detect if block has a "label:" first line (ends with ：or :)
    var firstLine = lines[0];
    var isLabel = /[：:]$/.test(firstLine.trim());
    var contentLines = isLabel ? lines.slice(1) : lines;
    var labelLine = isLabel ? firstLine.trim().replace(/[：:]$/, '') : null;

    out += '<div class="fa-block">';
    if(labelLine){
      out += '<div class="fa-label">'+labelLine+'</div>';
    }
    contentLines.forEach(function(line){
      var t = line.trim();
      if(!t) return;
      // Warning line starting with ★ or ⚠️ or 陷阱
      if(/^(★|⚠️|！|注意|陷阱|記憶|禁忌)/.test(t)){
        out += '<div class="fa-warn">'+t+'</div>';
      }
      // Numbered step ① ② etc
      else if(/^[①②③④⑤]/.test(t)){
        var num = t[0];
        var rest = t.slice(1).trim();
        out += '<div class="fa-step"><span class="fa-num">'+num+'</span><span>'+rest+'</span></div>';
      }
      // Bullet line starting with · or ・
      else if(/^[·・]/.test(t)){
        var rest = t.slice(1).trim();
        out += '<div class="fa-row"><span class="fa-dot">·</span><span>'+rest+'</span></div>';
      }
      // Regular line
      else {
        out += '<div class="fa-row"><span>'+t+'</span></div>';
      }
    });
    out += '</div>';
  });
  return out;
}

.flash-question{font-size:15px;font-weight:600;line-height:1.6;color:#1a1a18}
.flash-hint{font-size:12px;color:#bbb;margin-top:14px}
.flash-answer{font-size:13px;color:#2a2a28;text-align:left;width:100%}
.flash-back .flash-type-label{color:#666;background:#e8e6e0}
.fa-block{margin-bottom:9px}
.fa-block:last-child{margin-bottom:0}
.fa-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:3px}
.fa-row{display:flex;gap:6px;align-items:baseline;line-height:1.55;padding:1px 0}
.fa-dot{flex-shrink:0;font-size:12px;color:#aaa}
.fa-sep{height:1px;background:rgba(0,0,0,.08);margin:7px 0}

/* ── Global arrow & acid/base colours ── */
.arr-up{color:#059669;font-size:1.15em;font-weight:800}
.arr-dn{color:#dc2626;font-size:1.15em;font-weight:800}
.arr-neu{color:#6b7280;font-size:1.15em;font-weight:700}
.acid-txt{color:#dc2626;font-weight:700}
.base-txt{color:#2563eb;font-weight:700}
.fa-step{display:flex;gap:7px;align-items:baseline;line-height:1.55;padding:1px 0}
.fa-num{flex-shrink:0;font-weight:700;color:#a855f7;font-size:12px}
.fa-warn{background:#fef9c3;border-radius:6px;padding:4px 8px;font-size:12px;color:#713f12;margin-top:4px;line-height:1.5}

/* confidence buttons */
.conf-row{display:flex;gap:10px;margin-bottom:16px}
.conf-btn{flex:1;padding:12px 8px;border-radius:12px;border:2px solid;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:#fff}
.conf-btn.conf-bad{border-color:#e24b4a;color:#e24b4a}
.conf-btn.conf-mid{border-color:#f5a623;color:#f5a623}
.conf-btn.conf-good{border-color:#40c085;color:#40c085}
.conf-btn:active{opacity:.75;transform:scale(.96)}

.flash-nav{display:flex;align-items:center;justify-content:space-between;gap:10px}
.fnav{flex:1;padding:12px;border:1.5px solid #e0ded8;border-radius:12px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#2a2a28;transition:all .15s}
.fnav:active{background:#f5f4f0}
.fnav:disabled{opacity:.3;cursor:default}
.flash-progress-bar{height:3px;background:#f0ede8;border-radius:2px;margin-bottom:6px;overflow:hidden}
.flash-progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* filter tabs for flash */
.flash-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;justify-content:center}
.flash-chip{padding:5px 12px;border:1.5px solid #ddd;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;color:#666;background:#fff;transition:all .15s}
.flash-chip.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.flash-chip.chip-bad{border-color:#e24b4a;color:#e24b4a}
.flash-chip.chip-bad.on{background:#e24b4a;color:#fff}
.flash-chip.chip-mid{border-color:#f5a623;color:#f5a623}
.flash-chip.chip-mid.on{background:#f5a623;color:#fff}

/* ── QUIZ ── */
.quiz-wrap{max-width:520px;margin:0 auto}
.quiz-card{background:#fff;border:1.5px solid #e8e6e0;border-radius:16px;padding:20px}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.quiz-prog{font-size:12px;color:#888;font-weight:500}
.quiz-prog-bar{height:4px;background:#f0ede8;border-radius:2px;margin-bottom:18px;overflow:hidden}
.quiz-prog-fill{height:100%;border-radius:2px;transition:width .3s}
.quiz-q{font-size:15px;font-weight:600;line-height:1.6;margin-bottom:16px;color:#1a1a18}
.quiz-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.quiz-opts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.opt{padding:13px 15px;border:1.5px solid #e0ded8;border-radius:12px;cursor:pointer;font-size:14px;color:#2a2a28;background:#fff;text-align:left;transition:all .15s;line-height:1.5;font-weight:500}
.opt:active:not(:disabled){background:#f5f4f0}
.opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.opt.wrong{background:#fcebeb;border-color:#e24b4a;color:#791f1f}
.opt:disabled{cursor:default}
.quiz-explain,.quiz-exp{background:#f5f4f0;border-radius:12px;padding:13px 14px;font-size:13px;line-height:1.7;color:#2a2a28;margin-bottom:14px;margin-top:14px}
.quiz-explain strong,.quiz-exp strong{color:#1a1a18}
/* mock-exam options reuse .opt styling */
.quiz-opt{display:block;width:100%;padding:13px 15px;margin-bottom:9px;border:1.5px solid #e0ded8;border-radius:12px;cursor:pointer;font-size:14px;color:#2a2a28;background:#fff;text-align:left;transition:all .15s;line-height:1.5;font-weight:500}
.quiz-opt:active:not(:disabled){background:#f5f4f0}
.quiz-opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.quiz-opt.wrong{background:#fcebeb;border-color:#e24b4a;color:#791f1f}
.quiz-opt:disabled{cursor:default}
.next-btn{width:100%;padding:14px;background:#1a1a18;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.next-btn:active{opacity:.85}
.score-card{text-align:center;background:#fff;border:1.5px solid #e8e6e0;border-radius:16px;padding:40px 24px}
.score-big{font-size:52px;font-weight:800;margin-bottom:6px}
.score-label{font-size:14px;color:#666;margin-bottom:8px}
.score-breakdown{display:flex;justify-content:center;gap:16px;margin-bottom:24px;font-size:13px}
.restart-btn{padding:13px 32px;background:#1a1a18;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}

/* ── TABLE ── */
.tbl-wrap{overflow:auto;max-height:68vh;margin-bottom:20px;border-radius:12px;border:1px solid #e8e6e0;-webkit-overflow-scrolling:touch;position:relative}
.tbl-wrap table{border-collapse:separate;border-spacing:0;background:#fff;font-size:12px;min-width:560px}
.tbl-wrap th{background:#eef0f4;padding:10px;text-align:left;font-weight:800;border-bottom:2px solid #d8dae0;font-size:11px;color:#444;letter-spacing:.02em;position:sticky;top:0;z-index:2;white-space:nowrap}
.tbl-wrap td{padding:10px;border-bottom:1px solid #f0ede8;vertical-align:top;line-height:1.6;background:#fff;white-space:normal;min-width:90px}
.tbl-wrap tr:last-child td{border-bottom:none}
/* frozen first column */
.tbl-wrap th:first-child,.tbl-wrap td:first-child{position:sticky;left:0;white-space:nowrap;max-width:130px}
.tbl-wrap td:first-child{background:#faf9f6;font-weight:800;color:#1a1a18;box-shadow:1px 0 0 #e2e0da;z-index:1}
.tbl-wrap th:first-child{z-index:4;box-shadow:1px 0 0 #d8dae0}
/* 分組標題列 */
.tbl-wrap tr.tbl-group td{background:linear-gradient(90deg,#eef2fb,#f6f8fc);color:#33415a;font-weight:800;font-size:11.5px;padding:0;border-bottom:1.5px solid #d8dae0;border-top:1.5px solid #d8dae0;letter-spacing:.02em;white-space:nowrap;max-width:none;box-shadow:none;z-index:1}
.tbl-wrap tr.tbl-group td .tg-label{position:sticky;left:0;display:inline-block;padding:7px 11px}
.tbl-wrap tr.tbl-group td .tg-count{font-weight:600;color:#8a94a6;font-size:10px;margin-left:6px}
/* hint */
.tbl-scroll-hint{font-size:10px;color:#aaa;text-align:center;margin:-12px 0 8px}
.tbl-h3{font-size:14px;font-weight:700;margin:20px 0 10px;color:#1a1a18}

/* compare badge */
.cmp-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-bottom:4px}

/* ── map A/B mode toggle ── */
.mapmode-wrap{display:flex;gap:6px;justify-content:center;margin:0 auto 14px;max-width:340px}
.mapmode-btn{flex:1;padding:8px 6px;border:1.5px solid #e0ded8;border-radius:12px;background:#fff;font-size:12px;font-weight:700;color:#777;cursor:pointer;transition:all .15s;line-height:1.3;text-align:center}
.mapmode-btn .mm-sub{display:block;font-size:9px;font-weight:500;color:#aaa;margin-top:2px}
.mapmode-btn.on{color:#fff;border-color:transparent}
.mapmode-btn.on .mm-sub{color:rgba(255,255,255,.85)}

/* ── classification tree (B 分類樹) ── */
.ctree{font-family:inherit;padding:4px 2px 8px}
.ctree-root{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.ctree-rootbox{background:#d9d4c0;color:#3a3527;font-weight:800;font-size:14px;padding:9px 16px;border-radius:10px;border:1.5px solid #c2bca3;white-space:nowrap}
.ctree-l1{margin-left:6px;border-left:2px solid #e2ddd2;padding-left:14px}
.ctree-branch{margin:9px 0}
.ctree-node{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.ctree-cat{font-weight:700;font-size:13px;padding:7px 13px;border-radius:9px;border:1.5px solid;cursor:default;white-space:nowrap}
.ctree-cat.tappable{cursor:pointer}
.ctree-cat.tappable:active{filter:brightness(.96)}
.ctree-arrow{color:#cbbfa8;font-size:13px;align-self:center;flex:0 0 auto}
.ctree-leafs{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.ctree-leaf{background:#f3f4ed;border:1px solid #e3e6d8;border-radius:8px;padding:6px 11px;font-size:12.5px;color:#33402a;line-height:1.45}
.ctree-leaf .lf-suffix{font-weight:800;color:#1a1a18}
.ctree-leaf .lf-note{display:block;font-size:10.5px;color:#8a9579;margin-top:1px}
.ctree-sub{margin:5px 0 5px 4px;border-left:1.5px dashed #d9e0cc;padding-left:10px;display:flex;flex-direction:column;gap:5px}
.ctree-sub-row{display:flex;align-items:flex-start;gap:7px;flex-wrap:wrap}
.ctree-sub-label{font-size:11.5px;font-weight:700;color:#5a6b48;background:#eef2e4;border:1px solid #dde4cd;border-radius:7px;padding:4px 9px;white-space:nowrap}
.ctree-hint{font-size:11px;color:#b7ac95;text-align:center;margin:2px 0 12px}
.ctree-mnemonic{background:#fffbe8;border:1px solid #f3e6a8;border-radius:8px;padding:7px 11px;font-size:11.5px;color:#7a6a1e;margin-top:7px;line-height:1.5}
/* section-level 口訣 box */
.ctree-mn-box{background:linear-gradient(180deg,#fffdf3,#fff8e0);border:1.5px solid #f0e3a0;border-radius:12px;padding:11px 13px;margin:4px 0 14px}
.ctree-mn-title{font-size:12.5px;font-weight:800;color:#8a6d12;margin-bottom:7px}
/* 可折疊分類樹 */
.ctree-cat.ct-toggle{cursor:pointer;display:flex;align-items:center;gap:6px}
.ctree-cat.ct-toggle:active{filter:brightness(.96)}
.ct-caret{font-size:10px;opacity:.7}
.ctree-expand{margin:6px 0 4px 10px;padding-left:10px;border-left:2px solid #ece7da}
/* 完整藥物清單（PDF 心智圖） */
.ctree-pdf-wrap{margin:16px 0 4px;border-top:1px dashed #ddd;padding-top:12px}
.ctree-pdf-head{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;color:#5b3d9e;background:#f5f1fc;border:1.5px solid #d6c9f0;border-radius:10px;padding:9px 13px;cursor:pointer}
.ctree-pdf-head .ctree-pdf-sub{margin-left:auto;font-size:10px;font-weight:600;color:#9b8bc4}
.ctree-pdf-body{margin-top:8px}
.pdftree-row{display:flex;align-items:center;gap:7px;padding:7px 8px;margin:3px 0;border-radius:8px;cursor:pointer;background:#fcfbff}
.pdftree-row:active{background:#f1ecfb}
.pdftree-row.leaf{cursor:default;background:none;opacity:.85}
.pdftree-caret{font-size:10px;color:#a99fc4;width:11px;flex:0 0 auto}
.pdftree-label{font-size:13px;font-weight:700;line-height:1.4}
.pdftree-count{margin-left:auto;font-size:10px;font-weight:700;color:#9b8bc4;background:#efeafb;border-radius:10px;padding:1px 8px;flex:0 0 auto}
.pdftree-drugs{display:flex;flex-wrap:wrap;gap:6px;padding:3px 0 8px}
.pdftree-drug{font-size:12px;color:#3a3450;background:#fff;border:1px solid #e6e0f2;border-radius:7px;padding:4px 9px;font-weight:600}
.pdftree-drug.tappable{cursor:pointer;border-color:#c4b4ec;color:#5b3d9e}
.pdftree-drug.tappable:active{background:#f5f1fc}
/* ===== 歷屆考古題 ===== */
.home-exam-btn{display:flex;flex-direction:column;align-items:flex-start;width:100%;gap:1px;background:linear-gradient(135deg,#0e7490,#0891b2);color:#fff;border:none;border-radius:14px;padding:13px 16px;margin:0 2px 18px;cursor:pointer;box-shadow:0 2px 8px rgba(14,116,144,.25)}
.home-exam-btn .home-tool-ic{font-size:18px}
.home-exam-btn .hex-main{font-size:15px;font-weight:800}
.home-exam-btn .home-tool-sub{font-size:11px;color:rgba(255,255,255,.85)}
.exam-menu{padding:4px 2px 24px}
.exam-intro{font-size:13px;color:#555;line-height:1.6;background:#f0f9fb;border:1px solid #cfe9ef;border-radius:10px;padding:11px 13px;margin-bottom:16px}
.exam-core-btn{display:block;width:100%;text-align:left;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;border:none;border-radius:14px;padding:14px 16px;margin-bottom:18px;cursor:pointer;box-shadow:0 2px 10px rgba(217,119,6,.28)}
.exam-core-btn:active{filter:brightness(.97)}
.ecore-top{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px}
.ecore-n{font-size:11px;font-weight:700;background:rgba(255,255,255,.25);padding:2px 9px;border-radius:10px}
.ecore-sub{font-size:11.5px;color:rgba(255,255,255,.9);margin-top:4px;line-height:1.5}
.exam-sec-title{font-size:13px;font-weight:800;color:#334155;margin:16px 0 9px}
.exam-year-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.exam-year-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:#fff;border:1.5px solid #cfe2e7;border-radius:11px;padding:10px 12px;cursor:pointer;text-align:left}
.exam-year-btn:active{background:#f0f9fb}
.exam-year-btn .ey-year{font-size:13px;font-weight:800;color:#0e7490}
.exam-year-btn .ey-meta{font-size:10.5px;color:#94a3b8}
.exam-chap-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.exam-chap-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:#fff;border:1.5px solid #e0ded8;border-radius:10px;padding:9px 11px;cursor:pointer;text-align:left}
.exam-chap-btn:active{background:#f7f6f3}
.exam-chap-btn .ec-name{font-size:12.5px;font-weight:700;color:#3a3a38}
.exam-chap-btn .ec-meta{font-size:10px;color:#94a3b8}
.exam-all-btn{width:100%;margin-top:18px;background:#0e7490;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}
.exam-run{padding:2px 0 24px}
.exam-runbar{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#0e7490;margin-bottom:7px}
.exam-progress{height:4px;background:#e8eef0;border-radius:2px;overflow:hidden;margin-bottom:14px}
.exam-progress-fill{height:100%;background:#0e7490;border-radius:2px;transition:width .3s}
.exam-qtag{font-size:10.5px;color:#94a3b8;font-weight:700;margin-bottom:7px}
.exam-stem{font-size:15px;line-height:1.7;color:#1a1a18;font-weight:600;margin-bottom:15px}
.exam-opts{display:flex;flex-direction:column;gap:9px}
.exam-opt{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;padding:12px 14px;border:1.5px solid #e0ded8;border-radius:12px;background:#fff;font-size:14px;line-height:1.55;color:#2a2a28;cursor:pointer;transition:all .12s}
.exam-opt:active:not(:disabled){background:#f5f4f0}
.exam-opt .eo-letter{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#f0ede8;color:#888;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
.exam-opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.exam-opt.correct .eo-letter{background:#639922;color:#fff}
.exam-opt.wrong{background:#fcebeb;border-color:#e24b4a;color:#791f1f}
.exam-opt.wrong .eo-letter{background:#e24b4a;color:#fff}
.exam-opt:disabled{cursor:default}
.exam-feedback{margin-top:14px;padding:11px 13px;border-radius:10px;font-size:13px;font-weight:700}
.exam-feedback.ok{background:#eaf3de;color:#27500a}
.exam-feedback.no{background:#fcebeb;color:#791f1f}
.exam-dunno{color:#888;font-style:normal;border-style:dashed!important}
.exam-explain{margin-top:10px;padding:13px 14px;border-radius:10px;background:#f5f4f0;font-size:13px;line-height:1.8;color:#2a2a28}
.exp-head{font-weight:700;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid #e2e0da;color:#444}
.exp-body{}
.exp-p{margin:0 0 9px 0;line-height:1.85}
.exp-p:last-child{margin-bottom:0}
.exam-explain b{color:#0e7490}
.exam-next{display:block;width:100%;margin-top:12px;background:#0e7490;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}
.exam-done{text-align:center;padding:30px 16px}
.exam-done-emoji{font-size:48px;margin-bottom:8px}
.exam-done-score{font-size:46px;font-weight:900;line-height:1}
.exam-done-pass{font-size:14px;font-weight:700;margin:8px 0 4px}
.exam-done-detail{font-size:12.5px;color:#888;margin-bottom:20px}
.exam-done .exam-next{max-width:260px;margin:10px auto 0}
/* ===== 弱點儀表板 ===== */
.dash-box{background:#fff;border:1.5px solid #ece9e2;border-radius:14px;padding:14px 14px 12px;margin:0 2px 20px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dash-title{font-size:14px;font-weight:800;color:#2a2a28}
.dash-overall{font-size:15px;font-weight:900}
.dash-empty{font-size:12.5px;color:#777;line-height:1.6;background:#f7f6f3;border-radius:10px;padding:11px 12px;margin-bottom:10px}
.dash-cta{width:100%;background:#0e7490;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:800;cursor:pointer}
.dash-weak{font-size:12px;color:#9a3412;background:#fef3e8;border:1px solid #f5d6b0;border-radius:9px;padding:8px 11px;margin-bottom:11px;line-height:1.5}
.dash-bars{display:flex;flex-direction:column;gap:7px}
.dash-row{display:flex;align-items:center;gap:9px;cursor:pointer;padding:1px 0}
.dash-row:active{opacity:.7}
.dash-name{flex:0 0 64px;font-size:12px;font-weight:700;color:#444}
.dash-track{flex:1;height:9px;background:#f0ede8;border-radius:5px;overflow:hidden}
.dash-fill{display:block;height:100%;border-radius:5px;transition:width .4s}
.dash-pct{flex:0 0 38px;text-align:right;font-size:12px;font-weight:800}
.dash-foot{font-size:10px;color:#b7b1a4;text-align:center;margin-top:10px;line-height:1.5}
.ctree-mn-row{display:flex;gap:9px;align-items:flex-start;padding:4px 0;border-top:1px dashed #f0e3a8}
.ctree-mn-row:first-of-type{border-top:none}
.ctree-mn-key{flex:0 0 auto;min-width:74px;font-size:11.5px;font-weight:800;color:#9a3412;background:#fdecd9;border-radius:6px;padding:2px 8px;line-height:1.5}
.ctree-mn-val{flex:1;font-size:11.5px;color:#5c4a18;line-height:1.6}

/* ░░ DX 鑑別速記 ░░ */
.dx-wrap{padding:2px 0 20px}
.dx-intro{font-size:12.5px;color:#555;background:#f3eefc;border:1px solid #e3d5f7;border-radius:10px;padding:9px 11px;margin:4px 0 14px;line-height:1.6}
.dx-grp{margin:0 0 18px}
.dx-h{font-size:14.5px;font-weight:800;color:#5b21b6;margin:0 0 7px;padding-left:3px}
.dx-tb{width:100%;border-collapse:collapse;font-size:11.8px;line-height:1.5;background:#fff;border:1px solid #e6ddf3;border-radius:10px;overflow:hidden}
.dx-tb thead th{background:#7c3aed;color:#fff;font-weight:700;padding:7px 8px;text-align:left;font-size:11.5px}
.dx-tb td{padding:7px 8px;border-top:1px solid #efe9f7;vertical-align:top}
.dx-tb tbody tr:nth-child(even){background:#faf7ff}
.dx-tb td:first-child{font-weight:700;color:#4c1d95;white-space:nowrap}
.dx-tb b{color:#b91c1c}

/* kp = 必考點分行區塊 */
.dx-tb td .kp{display:block;position:relative;padding-left:11px;margin:2px 0;line-height:1.5}
.dx-tb td .kp:before{content:"";position:absolute;left:0;top:8px;width:4px;height:4px;border-radius:50%;background:#a78bdf}
.dx-tb td .kp:first-child{margin-top:0}
.dx-sub{font-size:12px;font-weight:700;color:#6d28d9;margin:10px 0 5px;padding-left:3px}

/* ── FOCUS HEADER 合併標題 + 章節選單 ── */
.focus-header{flex-wrap:nowrap}
.focus-home{border:none;background:#f5f4f0;cursor:pointer;font-size:17px;width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.focus-home:active{background:#ebe9e3}
.focus-titlebtn{flex:1;min-width:0;display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:10px;text-align:left}
.focus-titlebtn:active{background:#f5f4f0}
.focus-titletext{flex:1;min-width:0;display:flex;flex-direction:column;line-height:1.2}
.focus-chev{font-size:15px;color:#999;flex-shrink:0;transition:transform .2s;display:inline-block}
.focus-header.menu-open .focus-chev{transform:rotate(180deg)}
.secmenu-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:300}
.secmenu{position:fixed;top:58px;left:8px;right:8px;max-width:624px;margin:0 auto;background:#fff;border:1px solid #e8e6e0;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.16);z-index:320;overflow:hidden;max-height:72vh;overflow-y:auto}

.secmenu-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:11px 4px;border:none;background:none;cursor:pointer;font-size:11px;color:#555;border-radius:12px;transition:background .12s;min-height:60px}
.secmenu-btn:active{background:#f0ede8}
.secmenu-btn.on{background:#f3eefc;color:#5b21b6;font-weight:700}

function _scrollSet(y){
  try{ window.scrollTo(0,y); }catch(e){}
  try{ if(document.scrollingElement) document.scrollingElement.scrollTop=y; }catch(e){}
  try{ document.documentElement.scrollTop=y; document.body.scrollTop=y; }catch(e){}
}
function _scrollGet(){
  return window.scrollY || window.pageYOffset
    || (document.scrollingElement&&document.scrollingElement.scrollTop)
    || document.documentElement.scrollTop || document.body.scrollTop || 0;
}
function openDrug(sec,id){

  STATE[sec]._scrollY = _scrollGet();   // remember where we were in the list
  STATE[sec].drug = id;

  requestAnimationFrame(function(){ _scrollSet(0); });
}
function backFromDrug(sec){

/* ── Flash answer formatter ── */
function formatFlashAnswer(raw){
  // Split into logical blocks by double newline
  var blocks = raw.split(/\n\n+/);
  var out = '';
  // pre-colour arrows and acid/base keywords
  raw = colourText(raw);
  blocks = raw.split(/\n\n+/);
  blocks.forEach(function(block, bi){
    if(bi > 0) out += '<div class="fa-sep"></div>';
    var lines = block.split('\n');
    // detect if block has a "label:" first line (ends with ：or :)
    var firstLine = lines[0];
    var isLabel = /[：:]$/.test(firstLine.trim());
    var contentLines = isLabel ? lines.slice(1) : lines;
    var labelLine = isLabel ? firstLine.trim().replace(/[：:]$/, '') : null;

    out += '<div class="fa-block">';
    if(labelLine){
      out += '<div class="fa-label">'+labelLine+'</div>';
    }
    contentLines.forEach(function(line){
      var t = line.trim();
      if(!t) return;
      // Warning line starting with ★ or ⚠️ or 陷阱
      if(/^(★|⚠️|！|注意|陷阱|記憶|禁忌)/.test(t)){
        out += '<div class="fa-warn">'+t+'</div>';
      }
      // Numbered step ① ② etc
      else if(/^[①②③④⑤]/.test(t)){
        var num = t[0];
        var rest = t.slice(1).trim();
        out += '<div class="fa-step"><span class="fa-num">'+num+'</span><span>'+rest+'</span></div>';
      }
      // Bullet line starting with · or ・
      else if(/^[·・]/.test(t)){
        var rest = t.slice(1).trim();
        out += '<div class="fa-row"><span class="fa-dot">·</span><span>'+rest+'</span></div>';
      }
      // Regular line
      else {
        out += '<div class="fa-row"><span>'+t+'</span></div>';
      }
    });
    out += '</div>';
  });
  return out;
}

/* ── FLASHCARD ── */
function renderFlash(sec,data){
  var s=STATE[sec];
  var accentColor=data.accentColor||'#1a1a18';
  // build card pool: normal + compare cards
  var allCards=data.flashCards||[];
  // filter by confidence
  var pool;
  if(s.fFilter==='all') pool=allCards;
  else if(s.fFilter==='bad') pool=allCards.filter(function(c){return s.conf[c.id]==='bad';});
  else if(s.fFilter==='mid') pool=allCards.filter(function(c){return s.conf[c.id]==='mid';});
  else pool=allCards;
  if(!pool.length) pool=allCards;
  if(s.fi>=pool.length) s.fi=pool.length-1;
  if(s.fi<0) s.fi=0;
  var card=pool[s.fi];
  var confCounts={bad:0,mid:0,good:0,none:0};
  allCards.forEach(function(c){
    var v=s.conf[c.id]||'none';
    confCounts[v]=(confCounts[v]||0)+1;
  });
  var pct=Math.round((s.fi+1)/pool.length*100);
  var cardBg='#fff';
  var typeLabel='';
  var confVal=s.conf[card.id]||'none';
  var html='<div class="flash-wrap">';
  // stat chips
  html+='<div class="flash-filter">'
    +'<div class="flash-chip'+(s.fFilter==='all'?' on':'')+'" onclick="STATE[\''+sec+'\'].fFilter=\'all\';STATE[\''+sec+'\'].fi=0;renderSection(\''+sec+'\')">全部 '+allCards.length+'</div>'

    +'<div class="flash-chip chip-mid'+(s.fFilter==='mid'?' on':'')+'" onclick="STATE[\''+sec+'\'].fFilter=\'mid\';STATE[\''+sec+'\'].fi=0;renderSection(\''+sec+'\')">△ 模糊 '+confCounts.mid+'</div>'
    +(Object.keys(s.conf).length?'<div class="flash-chip" style="margin-left:auto;border-color:#ddd;color:#aaa;font-size:11px" onclick="clearConf(\''+sec+'\')">重置評分</div>':'')
    +'</div>';
  html+='<div class="flash-progress-bar"><div class="flash-progress-fill" style="width:'+pct+'%;background:'+accentColor+'"></div></div>';
  html+='<div class="flash-top"><span>'+typeLabel+'</span><span style="font-size:13px;color:#888;font-weight:500">'+(s.fi+1)+' / '+pool.length+'</span></div>';
  html+='<div class="flash-scene" onclick="STATE[\''+sec+'\'].ff=!STATE[\''+sec+'\'].ff;renderSection(\''+sec+'\')">'

function setConf(sec,cardId,val){
  STATE[sec].conf[cardId]=val;
  saveConf(sec);
  lsSave();
  // auto-advance after rating
  var s=STATE[sec];
  var allCards=SECTIONS[sec].flashCards||[];
  var pool;
  if(s.fFilter==='all') pool=allCards;
  else if(s.fFilter==='bad') pool=allCards.filter(function(c){return s.conf[c.id]==='bad';});
  else if(s.fFilter==='mid') pool=allCards.filter(function(c){return s.conf[c.id]==='mid';});
  else pool=allCards;
  if(!pool.length) pool=allCards;
  if(s.fi<pool.length-1){s.fi++;s.ff=false;}
  renderSection(sec);
}

/* ── QUIZ ── */
function renderQuiz(sec,data){
  var s=STATE[sec];
  var accentColor=data.accentColor||'#1a1a18';
  // Build shuffled pool on first render or after reset
  if(!s._qqpool){
    var orig=data.quiz.slice();
    for(var _i=orig.length-1;_i>0;_i--){
      var _j=Math.floor(Math.random()*(_i+1));
      var _t=orig[_i];orig[_i]=orig[_j];orig[_j]=_t;
    }
    s._qqpool=orig;
  }
  var qq=s._qqpool;
  if(s.qd){
    var pct=Math.round(s.qs/qq.length*100);
    var msg=pct>=80?'🎉 優秀，考試準備充分！':pct>=60?'💪 不錯，繼續加強':'📖 建議重點複習';
    var badCards=qq.filter(function(q,i){return s['_wrong'] && s['_wrong'][i];});
    return '<div class="quiz-wrap"><div class="score-card">'
      +'<div class="score-big" style="color:'+accentColor+'">'+s.qs+'/'+qq.length+'</div>'
      +'<div class="score-label">'+msg+'</div>'
      +'<div class="score-breakdown"><span>正確率 '+pct+'%</span></div>'
      +'<button class="restart-btn" onclick="STATE[\''+sec+'\'].qi=0;STATE[\''+sec+'\'].qs=0;STATE[\''+sec+'\'].qa=false;STATE[\''+sec+'\'].qd=false;STATE[\''+sec+'\'].qp=undefined;STATE[\''+sec+'\'][\'_wrong\']={};renderSection(\''+sec+'\')">重新測驗</button>'
      +'</div></div>';
  }
  var q=qq[s.qi];
  var html='<div class="quiz-wrap">';
  html+='<div class="quiz-meta"><span class="quiz-prog">'+( s.qi+1)+' / '+qq.length+'</span><span class="quiz-prog" style="color:'+accentColor+'">✓ '+s.qs+'</span></div>';
  html+='<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+Math.round(s.qi/qq.length*100)+'%;background:'+accentColor+'"></div></div>';
  if(q.type) html+='<div class="quiz-tag" style="background:'+data.accentBg+';color:'+accentColor+'">'+q.type+'</div>';
  html+='<div class="quiz-card"><div class="quiz-q">'+q.q+'</div><div class="quiz-opts">';
  q.opts.forEach(function(o,i){
    var cls='opt';
    if(s.qa){if(i===q.ans) cls+=' correct'; else if(s.qp===i) cls+=' wrong';}
    html+='<button class="'+cls+'" onclick="qPick(\''+sec+'\','+i+')"'+(s.qa?' disabled':'')+'>'+String.fromCharCode(65+i)+'. '+o+'</button>';
  });
  html+='</div>';
  if(s.qa){
    var isLast=(s.qi===qq.length-1);
    html+='<div class="quiz-explain"><strong>解析：</strong>'+q.exp+'</div>'
      +'<button class="next-btn" onclick="qNext(\''+sec+'\')">'+(isLast?'查看結果':'下一題 →')+'</button>';
  }
  html+='</div></div>';
  return html;
}

function qPick(sec,i){
  var s=STATE[sec]; if(s.qa) return;
  s.qp=i; s.qa=true;
  lsSave();
  var q=(s._qqpool&&s._qqpool[s.qi])||SECTIONS[sec].quiz[s.qi];
  if(i===q.ans) s.qs++;
  else{if(!s['_wrong']) s['_wrong']={}; s['_wrong'][s.qi]=true; if(typeof addWrong==='function') addWrong(sec,q);}
  renderSection(sec);
}
function qNext(sec){
  var s=STATE[sec];
  var qq=s._qqpool||SECTIONS[sec].quiz;
  if(s.qi===qq.length-1){s.qd=true;}
  else{s.qi++;s.qa=false;s.qp=undefined;}
  renderSection(sec);
}

/* Wrap ↑↓ arrows and acid/base keywords with coloured spans */
function colourText(s){
  if(!s) return s;
  return s
    // arrows - bigger and coloured
    .replace(/↑↑↑↑+/g, '<span class="arr-up">↑↑↑↑</span>')
    .replace(/↑↑↑/g,   '<span class="arr-up">↑↑↑</span>')
    .replace(/↑↑/g,    '<span class="arr-up">↑↑</span>')
    .replace(/(?<![↑])↑(?![↑])/g, '<span class="arr-up">↑</span>')
    .replace(/↓↓↓↓+/g, '<span class="arr-dn">↓↓↓↓</span>')
    .replace(/↓↓↓/g,   '<span class="arr-dn">↓↓↓</span>')
    .replace(/↓↓/g,    '<span class="arr-dn">↓↓</span>')
    .replace(/(?<![↓])↓(?![↓])/g, '<span class="arr-dn">↓</span>')
    // acid/base
    .replace(/代謝性酸中毒/g, '<span class="acid-txt">代謝性酸中毒</span>')
    .replace(/代謝性鹼中毒/g, '<span class="base-txt">代謝性鹼中毒</span>');
}

/* Convert ；/ explicit newline in td content to <br> for readable line breaks */
function fmtTd(s){
  if(!s) return s;
  // split on ；（full-width semicolon, common separator in table data）
  // and also on ；（half-width with surrounding spaces）
  return s
    .replace(/；/g, '；<br>')
    .replace(/\n/g, '<br>')
    .replace(/<br><br>/g, '<br>');
}
/* Post-process tableHtml: apply fmtTd to every td text node */
function processTableHtml(raw){
  // Replace td content (not touching style attrs)
  return raw.replace(/<td([^>]*)>([^<]+)<\/td>/g, function(match, attrs, content){
    return '<td'+attrs+'>'+colourText(fmtTd(content))+'</td>';
  });
}

/* 每章節分組定義：依「第一欄關鍵字」把同類藥聚在一起並加分組標題列。

  ]
};

/* 依分組重排 tbody 並插入分組標題列；找不到定義就原樣返回 */
function groupTableHtml(sec, raw){
  var groups = TABLE_GROUPS[sec];
  if(!groups) return raw;
  // 抓 thead 欄數
  var headMatch = raw.match(/<thead[\s\S]*?<\/thead>/);
  var colCount = headMatch ? (headMatch[0].match(/<th/g)||[]).length : 4;
  // 抓 tbody 內所有 <tr>...</tr>
  var bodyMatch = raw.match(/<tbody>([\s\S]*?)<\/tbody>/);
  if(!bodyMatch) return raw;
  var rows = bodyMatch[1].match(/<tr[\s\S]*?<\/tr>/g) || [];
  // 取每列第一個 td 的純文字當比對 key
  function firstCellText(tr){
    var m = tr.match(/<td[^>]*>([\s\S]*?)<\/td>/);
    return m ? m[1].replace(/<[^>]+>/g,'').trim() : '';
  }
  var used = new Array(rows.length).fill(false);
  var out = [];
  groups.forEach(function(g){
    var title = g[0], keys = g[1];
    var bucket = [];
    rows.forEach(function(tr, i){
      if(used[i]) return;
      var cell = firstCellText(tr);
      for(var k=0;k<keys.length;k++){
        if(cell.toLowerCase().indexOf(keys[k].toLowerCase())>-1){ bucket.push(tr); used[i]=true; break; }
      }
    });
    if(bucket.length){
      out.push('<tr class="tbl-group"><td colspan="'+colCount+'"><span class="tg-label">'+title+'<span class="tg-count">'+bucket.length+'</span></span></td></tr>');
      out = out.concat(bucket);
    }
  });
  // 未命中的列 → 其他
  var rest = [];
  rows.forEach(function(tr,i){ if(!used[i]) rest.push(tr); });
  if(rest.length){
    out.push('<tr class="tbl-group"><td colspan="'+colCount+'"><span class="tg-label">其他<span class="tg-count">'+rest.length+'</span></span></td></tr>');
    out = out.concat(rest);
  }
  return raw.replace(/<tbody>[\s\S]*?<\/tbody>/, '<tbody>'+out.join('')+'</tbody>');
}

function renderTable(sec,data){
  var raw=data.tableHtml||'<p style="color:#aaa;padding:20px">總表建置中</p>';
  var hint='<div class="tbl-scroll-hint">← 左右／上下滑動查看，頂欄與最左欄會固定 →</div>';
  return hint+processTableHtml(groupTableHtml(sec, raw));
}

/* ── 降血脂 三區解剖機轉圖（仿利尿劑腎元風格 + 使用者上傳的肝/腸/血三區圖）──
   三個解剖區：肝臟｜腸道｜血液/脂肪。各藥作用點為可點節點。
   6 個 id 對應 LIPID_MAP_DATA.sections：statin/ppara/pcsk9/npc1l1/bas/gpr109a
   預設中性灰，點選才上色。 */
function buildLipidAnatomySVG(active){
  var W=720, H=470;
  var COL={
    statin:{c:'#f97316',d:'#9a3412'},   // 肝 HMG-CoA
    ppara:{c:'#a855f7',d:'#6b21a8'},     // 肝核 PPAR-α (fibrate)
    pcsk9:{c:'#3b82f6',d:'#1e40af'},     // 血液 PCSK9
    npc1l1:{c:'#f59e0b',d:'#b45309'},    // 腸道 NPC1L1 (ezetimibe)
    bas:{c:'#22c55e',d:'#15803d'},       // 腸道 膽酸螯合
    gpr109a:{c:'#ec4899',d:'#9d174d'}    // 脂肪 GPR109A (niacin)
  };
  var GREY='#cbd5e1', GTX='#94a3b8';
  function on(z){return active===z;}
  function lc(z){return on(z)?COL[z].d:GREY;}
  function lw(z){return on(z)?3.2:1.6;}
  function tc(z){return on(z)?COL[z].d:GTX;}

  var L=[];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">');
  L.push('<defs><marker id="lpArr" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#94a3b8"/></marker>'
    +'<marker id="lpInh" markerWidth="4" markerHeight="10" refX="2" refY="5" orient="auto"><rect width="2" height="10" fill="#ef4444"/></marker>'
    +'<filter id="lpGlow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fcfcfb"/>');
  L.push('<text x="20" y="26" font-size="15" font-weight="800" fill="#334155" font-family="sans-serif">降血脂 — 三區作用機轉</text>');
  L.push('<text x="20" y="44" font-size="10.5" fill="#94a3b8" font-family="sans-serif">點各作用點看藥物；⊣ = 抑制</text>');

  // ── 三大解剖區底框 ──
  // 肝臟 (左上)
  L.push('<rect x="20" y="62" width="300" height="220" rx="16" fill="#fff5ec" stroke="#f3d9c0" stroke-width="1.5"/>');
  L.push('<text x="36" y="84" font-size="13" font-weight="800" fill="#b45309" font-family="sans-serif">🫀 肝臟</text>');
  // 腸道 (左下)
  L.push('<rect x="20" y="298" width="300" height="150" rx="16" fill="#fef9e7" stroke="#f0e3a8" stroke-width="1.5"/>');
  L.push('<text x="36" y="320" font-size="13" font-weight="800" fill="#a16207" font-family="sans-serif">🟡 腸道</text>');
  // 血液/脂肪 (右)
  L.push('<rect x="340" y="62" width="360" height="386" rx="16" fill="#eef4fc" stroke="#c9ddf5" stroke-width="1.5"/>');
  L.push('<text x="356" y="84" font-size="13" font-weight="800" fill="#1e40af" font-family="sans-serif">🩸 血液 / 脂肪組織</text>');

  // node helper
  function node(x,y,w,h,title,sub,z){
    var s='<g onclick="mapPickGeneric(\'lipid\',\''+z+'\')" style="cursor:pointer">';
    s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="10" fill="'+(on(z)?COL[z].c:'#fff')+'" stroke="'+lc(z)+'" stroke-width="'+lw(z)+'"'+(on(z)?' filter="url(#lpGlow)"':'')+'/>';
    s+='<text x="'+(x+w/2)+'" y="'+(y+h/2-2)+'" text-anchor="middle" font-size="11.5" font-weight="800" fill="'+(on(z)?'#fff':tc(z))+'" font-family="sans-serif">'+title+'</text>';
    if(sub)s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+12)+'" text-anchor="middle" font-size="8.5" fill="'+(on(z)?'rgba(255,255,255,.85)':GTX)+'" font-family="sans-serif">'+sub+'</text>';
    s+='</g>';
    return s;
  }
  // neutral grey label
  function gl(x,y,txt,fs){return '<text x="'+x+'" y="'+y+'" font-size="'+(fs||9.5)+'" fill="#94a3b8" font-family="sans-serif">'+txt+'</text>';}
  function inhLine(x1,y1,x2,y2,z){
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+lc(z)+'" stroke-width="'+lw(z)+'" marker-end="url(#lpInh)"/>';
  }

  // ── 肝臟內：膽固醇合成路徑 ──
  L.push(gl(40,112,'Acetyl-CoA'));
  L.push('<line x1="40" y1="118" x2="40" y2="140" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#lpArr)"/>');
  L.push(gl(36,154,'HMG-CoA'));
  // HMG-CoA reductase node (statin)
  L.push(node(150,128,150,40,'HMG-CoA還原酶','合成速率決定步驟',(function(){return 'statin';})()));
  L.push(inhLine(126,148,150,148,'statin'));
  L.push(gl(40,196,'→ 膽固醇 ↓'));
  L.push('<line x1="40" y1="160" x2="40" y2="186" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#lpArr)"/>');
  // LDL receptor up-regulation
  L.push(gl(40,224,'肝內膽固醇↓'));
  L.push(gl(40,238,'→ LDL受體↑(代償)'));
  L.push('<line x1="120" y1="232" x2="350" y2="232" stroke="#cbd5e1" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#lpArr)"/>');
  // PPAR-α node (fibrate) in liver nucleus
  L.push(node(150,176,150,38,'PPAR-α 核受體','Fibrate→TG↓ VLDL↓','ppara'));
  L.push(gl(40,266,'VLDL/TG 分泌'));

  // ── 血液區：LDL 與 LDL受體再循環、PCSK9 ──
  L.push(gl(360,116,'血中 LDL-C'));
  // LDL particles
  L.push('<circle cx="430" cy="140" r="13" fill="#fde68a" stroke="#f59e0b" stroke-width="1.4"/><text x="430" y="144" text-anchor="middle" font-size="8" fill="#92400e">LDL</text>');
  L.push('<circle cx="480" cy="160" r="11" fill="#fde68a" stroke="#f59e0b" stroke-width="1.2"/>');
  // LDL receptor on hepatocyte edge
  L.push('<text x="360" y="200" font-size="10" font-weight="700" fill="#64748b" font-family="sans-serif">LDL 受體 (肝)</text>');
  L.push('<path d="M360 210 q12 12 24 0" fill="none" stroke="#94a3b8" stroke-width="2"/>');
  // PCSK9 node
  L.push(node(500,180,170,40,'PCSK9 蛋白','降解LDL受體','pcsk9'));
  L.push(gl(420,236,'PCSK9 抑制 → 受體保留 → 清除LDL↑',9));
  L.push(inhLine(498,200,470,210,'pcsk9'));
  // arrow LDL -> receptor
  L.push('<line x1="455" y1="150" x2="392" y2="206" stroke="#cbd5e1" stroke-width="1.6" marker-end="url(#lpArr)"/>');

  // 脂肪組織 (右下) GPR109A / Niacin
  L.push('<text x="360" y="300" font-size="11" font-weight="700" fill="#64748b" font-family="sans-serif">脂肪細胞</text>');
  L.push(gl(360,320,'HSL → FFA → 肝VLDL原料'));
  L.push(node(360,332,200,40,'GPR109A','Niacin抑HSL→FFA↓→VLDL↓','gpr109a'));
  L.push(inhLine(460,326,460,332,'gpr109a'));
  L.push(gl(360,392,'Niacin：升HDL最強；Flushing→PGD₂→事前Aspirin',9));

  // ── 腸道：NPC1L1 (ezetimibe) + 膽酸螯合 (BAS) ──
  L.push(gl(40,346,'食物/膽汁 膽固醇'));
  L.push(node(150,332,150,38,'NPC1L1','Ezetimibe抑吸收','npc1l1'));
  L.push(inhLine(126,351,150,351,'npc1l1'));
  L.push(gl(40,392,'膽酸腸肝循環'));
  L.push(node(150,378,150,38,'膽酸螯合 BAS','阻回收→肝代償合成','bas'));
  L.push(inhLine(126,397,150,397,'bas'));
  L.push(gl(40,432,'阻吸收↓→ LDL↓（可能TG↑）',9));

  L.push('</svg>');
  return L.join('\n');
}

/* ── 抗生素 細菌細胞解剖機轉圖（仿利尿劑解剖風格）──
   把抗生素掛到細菌各構造上：細胞壁 / 細胞膜 / 30S / 50S / DNA(gyrase) / 厭氧DNA。

   葉酸路徑 + RNA pol 以參考標註呈現（高頻但無獨立卡）。
   預設中性灰，點選才上色。 */
function buildAbxCellSVG(active){
  var W=720, H=560;
  var COL={
    wall:{c:'#ef4444',d:'#b91c1c'},
    membrane:{c:'#6366f1',d:'#4338ca'},
    rib30:{c:'#f59e0b',d:'#b45309'},
    rib50:{c:'#8b5cf6',d:'#6d28d9'},
    dna:{c:'#10b981',d:'#047857'},
    anaerobe:{c:'#64748b',d:'#334155'}
  };
  var GREY='#cbd5e1', GTX='#94a3b8';
  function on(z){return active===z;}
  function lc(z){return on(z)?COL[z].d:GREY;}
  function lw(z){return on(z)?3.2:1.6;}
  function tc(z){return on(z)?COL[z].d:GTX;}
  function fill(z){return on(z)?COL[z].c:'#f8fafc';}
  function ftx(z){return on(z)?'#fff':tc(z);}

  var L=[];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">');
  L.push('<defs>'
    +'<marker id="abxArr" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#94a3b8"/></marker>'
    +'<marker id="abxInh" markerWidth="4" markerHeight="11" refX="2" refY="5.5" orient="auto"><rect width="2.4" height="11" fill="#ef4444"/></marker>'
    +'<filter id="abxGlow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fcfcfb"/>');
  L.push('<text x="20" y="26" font-size="15" font-weight="800" fill="#334155" font-family="sans-serif">抗生素 — 細菌細胞作用位置</text>');
  L.push('<text x="20" y="44" font-size="10.5" fill="#94a3b8" font-family="sans-serif">點各構造看對應抗生素；⊣＝抑制／殺菌位置</text>');

  // ── 細菌本體：細胞壁(外環) + 細胞膜(內環) + 細胞質 ──
  var bcx=300, bcy=320, rw=200, rwy=170;   // outer wall ellipse radii
  // clickable cell wall (outer ring)
  L.push('<g onclick="mapPickGeneric(\'abx\',\'wall\')" style="cursor:pointer">');
  L.push('<ellipse cx="'+bcx+'" cy="'+bcy+'" rx="'+rw+'" ry="'+rwy+'" fill="'+(on('wall')?'#fef2f2':'#fafafa')+'" stroke="'+lc('wall')+'" stroke-width="'+(on('wall')?7:4)+'"'+(on('wall')?' filter="url(#abxGlow)"':'')+'/>');
  L.push('<text x="'+bcx+'" y="'+(bcy-rwy+22)+'" text-anchor="middle" font-size="12" font-weight="800" fill="'+lc('wall')+'" font-family="sans-serif">細胞壁</text>');
  L.push('</g>');
  // clickable cell membrane (inner ring)
  var mrx=rw-22, mry=rwy-20;
  L.push('<g onclick="mapPickGeneric(\'abx\',\'membrane\')" style="cursor:pointer">');
  L.push('<ellipse cx="'+bcx+'" cy="'+bcy+'" rx="'+mrx+'" ry="'+mry+'" fill="'+(on('membrane')?'#eef0fe':'#ffffff')+'" stroke="'+lc('membrane')+'" stroke-width="'+(on('membrane')?5:3)+'" stroke-dasharray="'+(on('membrane')?'0':'2,3')+'"'+(on('membrane')?' filter="url(#abxGlow)"':'')+'/>');
  L.push('<text x="'+bcx+'" y="'+(bcy-mry+18)+'" text-anchor="middle" font-size="10.5" font-weight="700" fill="'+tc('membrane')+'" font-family="sans-serif">細胞膜</text>');
  L.push('</g>');

  // node helper (rounded rect inside / outside)
  function node(x,y,w,h,title,sub,z,fs){
    fs=fs||11;
    var s='<g onclick="mapPickGeneric(\'abx\',\''+z+'\')" style="cursor:pointer">';
    s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="9" fill="'+fill(z)+'" stroke="'+lc(z)+'" stroke-width="'+lw(z)+'"'+(on(z)?' filter="url(#abxGlow)"':'')+'/>';
    s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+(sub?-3:4))+'" text-anchor="middle" font-size="'+fs+'" font-weight="800" fill="'+ftx(z)+'" font-family="sans-serif">'+title+'</text>';
    if(sub)s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+11)+'" text-anchor="middle" font-size="8" fill="'+(on(z)?'rgba(255,255,255,.85)':GTX)+'" font-family="sans-serif">'+sub+'</text>';
    s+='</g>';
    return s;
  }
  function gl(x,y,txt,fs,anchor){return '<text x="'+x+'" y="'+y+'" text-anchor="'+(anchor||'start')+'" font-size="'+(fs||9)+'" fill="#94a3b8" font-family="sans-serif">'+txt+'</text>';}
  function inh(x1,y1,x2,y2,z){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+lc(z)+'" stroke-width="'+lw(z)+'" marker-end="url(#abxInh)"/>';}
  function arrow(x1,y1,x2,y2,z){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+lc(z)+'" stroke-width="'+lw(z)+'" stroke-dasharray="'+(on(z)?'0':'5,4')+'" marker-end="url(#abxArr)"/>';}

  L.push('<text x="'+bcx+'" y="'+(bcy-26)+'" text-anchor="middle" font-size="11" font-weight="800" fill="'+ftx('rib50')+'" font-family="sans-serif">50S</text>');
  L.push('</g>');
  // 30S (bottom half) clickable
  L.push('<g onclick="mapPickGeneric(\'abx\',\'rib30\')" style="cursor:pointer">');
  L.push('<path d="M'+(bcx-46)+' '+(bcy-20)+' a46 22 0 0 0 92 0 Z" fill="'+fill('rib30')+'" stroke="'+lc('rib30')+'" stroke-width="'+lw('rib30')+'"/>');
  L.push('<text x="'+bcx+'" y="'+(bcy+0)+'" text-anchor="middle" font-size="11" font-weight="800" fill="'+ftx('rib30')+'" font-family="sans-serif">30S</text>');
  L.push('</g>');

  // ── DNA(核區) clickable ──
  L.push('<g onclick="mapPickGeneric(\'abx\',\'dna\')" style="cursor:pointer">');
  L.push('<path d="M'+(bcx-40)+' '+(bcy+44)+' q20 -16 40 0 q20 16 40 0" fill="none" stroke="'+lc('dna')+'" stroke-width="'+(on('dna')?4:2.4)+'"/>');
  L.push('<path d="M'+(bcx-40)+' '+(bcy+56)+' q20 16 40 0 q20 -16 40 0" fill="none" stroke="'+lc('dna')+'" stroke-width="'+(on('dna')?4:2.4)+'"/>');
  L.push('<text x="'+bcx+'" y="'+(bcy+82)+'" text-anchor="middle" font-size="10.5" font-weight="800" fill="'+tc('dna')+'" font-family="sans-serif">DNA gyrase / Topo IV</text>');
  L.push('</g>');

  // ── 厭氧 DNA損傷（Metronidazole）——細胞質角落 ──
  L.push('<g onclick="mapPickGeneric(\'abx\',\'anaerobe\')" style="cursor:pointer">');
  L.push('<rect x="'+(bcx-44)+'" y="'+(bcy+96)+'" width="88" height="30" rx="8" fill="'+fill('anaerobe')+'" stroke="'+lc('anaerobe')+'" stroke-width="'+lw('anaerobe')+'"/>');
  L.push('<text x="'+bcx+'" y="'+(bcy+115)+'" text-anchor="middle" font-size="9.5" font-weight="800" fill="'+ftx('anaerobe')+'" font-family="sans-serif">厭氧DNA損傷</text>');
  L.push('</g>');

  // ════════ 外圍藥物標籤（指向各構造）════════
  // 細胞壁藥（左上外）
  L.push(node(20,70,180,52,'抑細胞壁','β-lactam→PBP；Vanco→D-Ala-D-Ala','wall',11));
  L.push(inh(120,122,bcx-rw+30,bcy-rwy+50,'wall'));
  L.push(gl(22,138,'殺菌：-cillin/cepha-/-penem、Vancomycin',8.5));

  // 細胞膜藥（左下外）
  L.push(node(20,440,180,50,'抑細胞膜','Daptomycin(G⁺)、Polymyxin(G⁻)','membrane',11));
  L.push(inh(150,440,bcx-mrx+20,bcy+mry-30,'membrane'));

  // 30S 藥（右上外）
  L.push(node(520,150,180,56,'抑 30S','胺醣(殺菌)/四環(抑菌)','rib30',11));
  L.push(gl(522,222,'-micin/-mycin、-cycline',8.5));
  L.push(inh(520,180,bcx+40,bcy-8,'rib30'));

  // 50S 藥（右上更上）
  L.push(node(520,66,180,58,'抑 50S','巨環/Linezolid/Clinda/Chloram','rib50',11));
  L.push(gl(522,140,'-thromycin、-zolid',8.5));
  L.push(inh(520,96,bcx+44,bcy-30,'rib50'));

  // DNA 藥（右下外）
  L.push(node(520,300,180,52,'抑 DNA gyrase','Fluoroquinolone -floxacin','dna',11));
  L.push(inh(520,326,bcx+44,bcy+50,'dna'));

  // 厭氧藥（右下更下）
  L.push(node(520,400,180,50,'厭氧活化','Metronidazole(厭氧/原蟲)','anaerobe',11));
  L.push(inh(520,425,bcx+44,bcy+111,'anaerobe'));

  // ── 參考標註：葉酸路徑 + RNA pol（高頻但無獨立卡，灰色非互動）──
  L.push('<rect x="20" y="172" width="180" height="74" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.4" stroke-dasharray="4,3"/>');
  L.push(gl(30,190,'葉酸合成（參考）',10));
  L.push(gl(30,206,'Sulfa → 抑 synthetase',8.5));
  L.push(gl(30,220,'TMP → 抑 DHFR（序貫阻斷）',8.5));
  L.push(gl(30,236,'抑菌；用於 UTI/PCP',8.5));

  L.push('<rect x="20" y="300" width="180" height="60" rx="9" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.4" stroke-dasharray="4,3"/>');
  L.push(gl(30,318,'RNA 聚合酶（參考）',10));
  L.push(gl(30,334,'Rifampin → 抑 RNA pol',8.5));
  L.push(gl(30,350,'尿液變橘紅；誘導CYP',8.5));

  L.push('</svg>');
  return L.join('\n');
}

function buildCoagCascadeSVG(openMap){
  // ── 止血三幕互動機轉圖（mobile 單欄；多選：各 zone 可獨立開/關、可同時多開）──
  // 5 個可點 zone：plt / vkor / at3 / direct / lysis
  openMap = openMap || {};
  var W=360;
  var COL={
    vkor:{c:'#3b82f6',d:'#1e40af',bg:'#eff6ff'},
    at3:{c:'#ef4444',d:'#991b1b',bg:'#fef2f2'},
    direct:{c:'#14b8a6',d:'#0f766e',bg:'#f0fdfa'},
    plt:{c:'#ec4899',d:'#9d174d',bg:'#fdf2f8'},
    lysis:{c:'#f97316',d:'#9a3412',bg:'#fff7ed'}
  };
  var GREY='#cbd5e1', GREYTX='#94a3b8';
  function on(z){ return !!openMap[z]; }
  function lc(z){ return on(z)?COL[z].d:GREY; }
  function tx(z){ return on(z)?COL[z].d:GREYTX; }
  function fillSoft(z){ return on(z)?COL[z].bg:'#ffffff'; }

  var POP={
    plt:['Aspirin → 不可逆抑 COX-1 → TXA₂↓','Clopidogrel/Ticagrelor → 擋 P2Y12(ADP)','Dipyridamole/Cilostazol → PDE↓→cAMP↑','Abciximab/-fiban → 擋 GPIIb/IIIa（最強）','動脈血栓首選；詳見下方面板'],
    vkor:['Warfarin：抑 VKOR → Vit K 再生↓','→ II VII IX X 無法羧化活化','口服；監測 PT/INR；孕婦禁用','解毒：Vitamin K（FFP 急救）'],
    at3:['間接抗凝（需 ATIII）','UFH → 抑 IIa(主)+Xa；監測 aPTT','LMWH → 偏抑 Xa；Fondaparinux → 純 Xa','protamine 解毒；孕婦可用；副作用 HIT'],
    direct:['不需 ATIII，直接咬因子','Dabigatran → 抑 IIa（口服）','-xaban（rivaroxaban…）→ 抑 Xa','反轉：idarucizumab / andexanet'],
    lysis:['Alteplase(tPA) → 活化 plasminogen','對 fibrin 有選擇性 → 出血較少','Streptokinase → 無選擇性 → 出血↑','對立面：Tranexamic → 抑纖溶止血']
  };

  var L=[];
  var BX=120;
  var DRUGX=232;
  var DRUGW=116;
  var y=58;

  function spineBox(cy,label,sub){
    var w=150;
    var s='<rect x="'+(BX-w/2)+'" y="'+(cy-16)+'" width="'+w+'" height="32" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.4"/>';
    s+='<text x="'+BX+'" y="'+(cy+(sub?-2:5))+'" text-anchor="middle" font-size="11.5" font-weight="800" fill="#475569" font-family="sans-serif">'+label+'</text>';
    if(sub) s+='<text x="'+BX+'" y="'+(cy+11)+'" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="sans-serif">'+sub+'</text>';
    return s;
  }
  function spineArrow(y1,y2){
    return '<line x1="'+BX+'" y1="'+y1+'" x2="'+BX+'" y2="'+y2+'" stroke="#94a3b8" stroke-width="2" marker-end="url(#cgA)"/>';
  }
  function drugTab(z,cy,title,linkY,promote){
    var h=34;
    var s='<g onclick="coagToggle(\''+z+'\')" style="cursor:pointer">';
    s+='<line x1="'+DRUGX+'" y1="'+cy+'" x2="'+(BX+76)+'" y2="'+linkY+'" stroke="'+lc(z)+'" stroke-width="'+(on(z)?2.2:1.1)+'" stroke-dasharray="4 3"/>';
    if(promote){
      s+='<polyline points="'+(BX+82)+','+(linkY-5)+' '+(BX+90)+','+linkY+' '+(BX+82)+','+(linkY+5)+'" fill="none" stroke="'+lc(z)+'" stroke-width="'+(on(z)?2.2:1.3)+'"/>';
    } else {
      s+='<circle cx="'+(BX+88)+'" cy="'+linkY+'" r="7.5" fill="#fff" stroke="'+lc(z)+'" stroke-width="'+(on(z)?2.2:1.3)+'"/>';
      s+='<line x1="'+(BX+84)+'" y1="'+linkY+'" x2="'+(BX+92)+'" y2="'+linkY+'" stroke="'+lc(z)+'" stroke-width="'+(on(z)?2.2:1.3)+'"/>';
    }
    s+='<rect x="'+DRUGX+'" y="'+(cy-h/2)+'" width="'+DRUGW+'" height="'+h+'" rx="9" fill="'+fillSoft(z)+'" stroke="'+lc(z)+'" stroke-width="'+(on(z)?2.4:1.4)+'"/>';
    s+='<text x="'+(DRUGX+DRUGW/2)+'" y="'+(cy-2)+'" text-anchor="middle" font-size="10.5" font-weight="800" fill="'+tx(z)+'" font-family="sans-serif">'+title+'</text>';
    s+='<text x="'+(DRUGX+DRUGW/2)+'" y="'+(cy+11)+'" text-anchor="middle" font-size="7.5" fill="'+tx(z)+'" font-family="sans-serif">'+(on(z)?'▼ 點此關閉':'點此展開')+'</text>';
    s+='</g>';
    return s;
  }
  // 就地彈出說明框（可點標題關閉）
  function popup(z, topY){
    if(!on(z)) return {svg:'',h:0};
    var lines=POP[z]||[];
    var padX=14, lineH=15, headH=20, h=headH+lines.length*lineH+12;
    var x=14, w=W-28;
    var s='<g onclick="coagToggle(\''+z+'\')" style="cursor:pointer">';
    s+='<rect x="'+x+'" y="'+topY+'" width="'+w+'" height="'+h+'" rx="10" fill="'+COL[z].bg+'" stroke="'+COL[z].d+'" stroke-width="2"/>';
    s+='<rect x="'+x+'" y="'+topY+'" width="4" height="'+h+'" rx="2" fill="'+COL[z].d+'"/>';
    s+='<text x="'+(x+w-12)+'" y="'+(topY+15)+'" text-anchor="end" font-size="9" fill="'+COL[z].d+'" font-family="sans-serif">✕ 關閉</text>';
    for(var i=0;i<lines.length;i++){
      s+='<text x="'+(x+padX)+'" y="'+(topY+headH+i*lineH)+'" font-size="10.5" fill="'+COL[z].d+'" font-family="sans-serif">'+lines[i]+'</text>';
    }
    s+='</g>';
    return {svg:s, h:h};
  }

  var body=[];
  function band(txt,sub){
    var s='<rect x="14" y="'+(y-16)+'" width="'+(W-28)+'" height="24" rx="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>';
    s+='<text x="22" y="'+y+'" font-size="11.5" font-weight="800" fill="#64748b" font-family="sans-serif">'+txt+'</text>';
    s+='<text x="'+(W-22)+'" y="'+y+'" text-anchor="end" font-size="8" fill="#a8b3c2" font-family="sans-serif">'+sub+'</text>';
    body.push(s); y+=30;
  }

  // ════ 第一幕：血小板 ════
  band('第一幕　血小板','黏附→活化→聚集（白色血栓）');
  var a1=y; body.push(spineBox(a1,'血管受傷→膠原','GPIb+vWF 黏附')); y+=44;
  body.push(spineArrow(a1+16,y-16));
  var a2=y; body.push(spineBox(a2,'血小板活化','釋 ADP/TXA₂ 放大'));
  body.push(drugTab('plt',a2,'抗血小板',a2,false));
  y+=44;
  body.push(spineArrow(a2+16,y-16));
  var a3=y; body.push(spineBox(a3,'GPIIb/IIIa 聚集','fibrinogen 橋接')); y+=30;
  (function(){ var p=popup('plt',y); if(p.h){ body.push(p.svg); y+=p.h+10; } })();

  // ════ 第二幕：凝血瀑布 ════
  y+=6; band('第二幕　凝血瀑布','產生 fibrin 焊死（紅色血栓）');
  var b1=y; body.push(spineBox(b1,'內在＋外在路徑','XII/XI/IX＋TF/VII'));
  body.push(drugTab('vkor',b1,'Vit K 拮抗',b1,false)); y+=44;
  body.push(spineArrow(b1+16,y-16));
  var b2=y; body.push(spineBox(b2,'X → Xa','兩路匯流'));
  body.push(drugTab('at3',b2,'間接抗凝',b2,false)); y+=44;
  body.push(spineArrow(b2+16,y-16));
  var b3=y; body.push(spineBox(b3,'II → IIa 凝血酶',''));
  body.push(drugTab('direct',b3,'直接抗凝',b3,false)); y+=44;
  body.push(spineArrow(b3+16,y-16));
  var b4=y; body.push(spineBox(b4,'Fibrinogen→Fibrin','血栓穩固')); y+=30;
  (function(){
    ['vkor','at3','direct'].forEach(function(z){ var p=popup(z,y); if(p.h){ body.push(p.svg); y+=p.h+8; } });
  })();

  // ════ 第三幕：纖溶 ════
  y+=6; band('第三幕　纖維蛋白溶解','plasmin 剪碎 fibrin（拆栓）');
  var c1=y; body.push(spineBox(c1,'plasminogen','待活化'));
  body.push(drugTab('lysis',c1,'溶栓/抗纖溶',c1,true)); y+=44;
  body.push(spineArrow(c1+16,y-16));
  var c2=y; body.push(spineBox(c2,'plasmin→溶 fibrin','血栓清除')); y+=30;
  (function(){ var p=popup('lysis',y); if(p.h){ body.push(p.svg); y+=p.h+10; } })();

  // ════ 底部：應用直覺 ════
  y+=8;
  var bh=80;
  body.push('<rect x="14" y="'+y+'" width="'+(W-28)+'" height="'+bh+'" rx="10" fill="#fafaf9" stroke="#e7e5e4" stroke-width="1"/>');
  body.push('<text x="24" y="'+(y+20)+'" font-size="10.5" font-weight="800" fill="#57534e" font-family="sans-serif">應用直覺</text>');
  body.push('<text x="24" y="'+(y+38)+'" font-size="9" fill="#78716c" font-family="sans-serif">動脈血栓（白·血小板）→ 抗血小板</text>');
  body.push('<text x="24" y="'+(y+54)+'" font-size="9" fill="#78716c" font-family="sans-serif">靜脈/房顫（紅·fibrin）→ 抗凝血</text>');
  body.push('<text x="24" y="'+(y+70)+'" font-size="9" fill="#78716c" font-family="sans-serif">監測：UFH→aPTT　warfarin→PT/INR　DOAC→免</text>');
  y+=bh+14;

  var H=y;
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">');
  L.push('<defs><marker id="cgA" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0,9 4,0 8" fill="#94a3b8"/></marker></defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fcfcfb"/>');
  L.push('<text x="16" y="24" font-size="14" font-weight="800" fill="#334155" font-family="sans-serif">止血三幕 — 抗血栓藥攻擊點</text>');
  L.push('<text x="16" y="40" font-size="9" fill="#94a3b8" font-family="sans-serif">點藥物標籤展開／再點關閉，可同時開多個（灰=生理流程）</text>');
  L.push(body.join('\n'));
  L.push('</svg>');
  return L.join('\n');
}

/* ── Generic horizontal pill-chart builder ──
   Used for: lipid, abx, epi (list of targets/sections)
*/
/* ── 抗癲癇 機轉心智圖（仿 image 10：Drug機轉 → 抑Glu / 增GABA）──
   5 個可點區塊對應 EPI_MAP_DATA.targets：na_ch / tca / gaba / sv2a / ugt
   預設中性灰，點選才上色。 */
function buildEpiMindMap(active){
  var W=720, H=560;
  var COL={
    na_ch:{c:'#ef4444',d:'#b91c1c'},
    tca:{c:'#f59e0b',d:'#b45309'},
    gaba:{c:'#10b981',d:'#047857'},
    sv2a:{c:'#8b5cf6',d:'#6d28d9'},
    ugt:{c:'#6366f1',d:'#4338ca'}
  };
  var GREY='#cbd5e1', GTX='#94a3b8';
  function on(z){return active===z;}
  function lc(z){return on(z)?COL[z].d:GREY;}
  function lw(z){return on(z)?3.2:1.6;}
  function tc(z){return on(z)?COL[z].d:GTX;}
  function bg(z){return on(z)?COL[z].c:'#f8fafc';}
  function btx(z){return on(z)?'#fff':GTX;}

  var L=[];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">');
  L.push('<defs><marker id="epiArr" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,8 3.5,0 7" fill="#94a3b8"/></marker>'
    +'<filter id="epiGlow"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fcfcfb"/>');

  // central root
  var rx=80, ry=270;
  L.push('<rect x="20" y="244" width="150" height="52" rx="12" fill="#1e293b"/>');
  L.push('<text x="95" y="268" text-anchor="middle" font-size="14" font-weight="800" fill="#fff" font-family="sans-serif">Drug 機轉</text>');
  L.push('<text x="95" y="286" text-anchor="middle" font-size="9" fill="#cbd5e1" font-family="sans-serif">抗癲癇＝壓制過度放電</text>');
  L.push('<text x="20" y="320" font-size="10" fill="#b7ac95" font-family="sans-serif">①Glu↓ ②GABA↑</text>');

  // helper: rounded label box
  function box(x,y,w,h,label,z,fs,sub){
    fs=fs||12;
    var s='<g onclick="mapPickGeneric(\'epi\',\''+z+'\')" style="cursor:pointer">';
    s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="10" fill="'+bg(z)+'" stroke="'+lc(z)+'" stroke-width="'+lw(z)+'"'+(on(z)?' filter="url(#epiGlow)"':'')+'/>';
    s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+(sub?-3:4))+'" text-anchor="middle" font-size="'+fs+'" font-weight="800" fill="'+btx(z)+'" font-family="sans-serif">'+label+'</text>';
    if(sub) s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+12)+'" text-anchor="middle" font-size="8.5" fill="'+(on(z)?'rgba(255,255,255,.85)':GTX)+'" font-family="sans-serif">'+sub+'</text>';
    s+='</g>';
    return s;
  }
  // neutral (non-clickable) hub box
  function hub(x,y,w,h,label,sub,col){
    var s='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="10" fill="#fff" stroke="'+(col||'#94a3b8')+'" stroke-width="1.8"/>';
    s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+(sub?-3:4))+'" text-anchor="middle" font-size="12" font-weight="800" fill="'+(col||'#475569')+'" font-family="sans-serif">'+label+'</text>';
    if(sub) s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+12)+'" text-anchor="middle" font-size="8.5" fill="#94a3b8" font-family="sans-serif">'+sub+'</text>';
    return s;
  }
  function conn(x1,y1,x2,y2,col,w){
    return '<path d="M'+x1+' '+y1+' C'+((x1+x2)/2)+' '+y1+','+((x1+x2)/2)+' '+y2+','+x2+' '+y2+'" fill="none" stroke="'+(col||'#cbd5e1')+'" stroke-width="'+(w||1.6)+'"/>';
  }

  // ── Arm 1: glutamate 突觸 (興奮性) ─ upper ──

function buildPillChartSVG(items, active, idPrefix) {

  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');

        +'font-size="11" font-weight="800" fill="'+tc+'" font-family="sans-serif">'+line+'</text>');

/* ── Cancer cell cycle SVG ── */
function buildCellCycleSVG(active) {
  var W = 500, H = 500;
  var cx = 250, cy = 250, r = 160, ri = 80;
  var phases = CANCER_MAP_DATA.phases;
  var n = phases.length;
  var L = [];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;max-width:'+W+'px;display:block;margin:0 auto">');
  L.push('<defs><marker id="arx2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#94a3b8"/></marker>'
    +'<filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>');
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');

  // Draw cycle direction arrow
  L.push('<text x="'+cx+'" y="'+(cy-ri+14)+'" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="sans-serif">細胞週期</text>');
  L.push('<text x="'+cx+'" y="'+(cy-ri+28)+'" text-anchor="middle" font-size="9" fill="#b0bec5" font-family="sans-serif">（順時針）</text>');

  // Each phase as a pie segment
  var angleStart = -Math.PI/2; // start at top
  // Phase proportions (G1 largest, others smaller)
  var weights = [3, 2, 1, 1, 1]; // G1, S, G2, M, G0
  var total = weights.reduce(function(a,b){return a+b;},0);

  var angles = [];
  var cur = angleStart;
  weights.forEach(function(w) {
    angles.push({start: cur, end: cur + 2*Math.PI*w/total});
    cur += 2*Math.PI*w/total;
  });

  phases.forEach(function(phase, i) {
    var a = angles[i];
    var on = active === phase.id;
    var midAngle = (a.start + a.end) / 2;

    // Outer arc path
    var x1 = cx + r * Math.cos(a.start), y1 = cy + r * Math.sin(a.start);
    var x2 = cx + r * Math.cos(a.end),   y2 = cy + r * Math.sin(a.end);
    var xi1 = cx + ri * Math.cos(a.start), yi1 = cy + ri * Math.sin(a.start);
    var xi2 = cx + ri * Math.cos(a.end),   yi2 = cy + ri * Math.sin(a.end);
    var large = (a.end - a.start > Math.PI) ? 1 : 0;

    var path = 'M '+xi1+' '+yi1+' L '+x1+' '+y1
      +' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2
      +' L '+xi2+' '+yi2
      +' A '+ri+' '+ri+' 0 '+large+' 0 '+xi1+' '+yi1+' Z';

    var fill = on ? phase.color : '#f1f5f9';
    var stroke = phase.color;
    L.push('<g onclick="mapPickGeneric(\'cancer\',\''+phase.id+'\')" style="cursor:pointer">');
    L.push('<path d="'+path+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(on?3:1.5)+'"'+(on?' filter="url(#glow2)"':'')+'/> ');

    // Phase label
    var lx = cx + (r+ri)/2 * Math.cos(midAngle);
    var ly = cy + (r+ri)/2 * Math.sin(midAngle);
    var tc = on ? '#fff' : phase.darkColor;
    L.push('<text x="'+lx+'" y="'+(ly-4)+'" text-anchor="middle" font-size="13" font-weight="800" fill="'+tc+'" font-family="sans-serif">'+phase.label+'</text>');
    L.push('<text x="'+lx+'" y="'+(ly+10)+'" text-anchor="middle" font-size="8" fill="'+(on?'rgba(255,255,255,0.85)':phase.darkColor)+'" font-family="sans-serif">'+phase.desc.substring(0,6)+'</text>');
    L.push('</g>');
  });

  // Centre circle
  L.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+(ri-4)+'" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>');
  L.push('<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b" font-family="sans-serif">細胞</text>');
  L.push('<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif">點選各期</text>');
  L.push('<text x="'+cx+'" y="'+(cy+20)+'" text-anchor="middle" font-size="9" fill="#94a3b8" font-family="sans-serif">查看藥物</text>');

  L.push('</svg>');
  return L.join('\n');
}

      +'<div style="font-size:12px;color:#2a2a28;line-height:1.7">'
      + mechText.split('\n').map(function(l){return '<div style="padding:1px 0">'+l+'</div>';}).join('')
      +'</div></div>';
  }

  // Effects (cancer: phases; ans: stim/agonist/blocker; lipid: ldl/tg/hdl; dm/abx/epi: drugs)
  if (sec==='ans' && item.stim) {
    h += '<div style="margin-bottom:10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+item.darkColor+';margin-bottom:6px">⚡ 刺激效應</div>'
      +'<div style="font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:8px">'+item.stim+'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      +'<div><div style="font-size:10px;font-weight:700;color:#059669;margin-bottom:4px">促效劑（↑受體）</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px">'
      +item.agonists.map(function(d){
          var did=findDrugInSection(sec,d);
          var style='background:'+item.color+'22;color:'+item.darkColor+';border:1px solid '+item.color+'66;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;'+(did?'cursor:pointer':'');
          var click=did?'onclick="goToDrugFromMap(\'' + sec + '\',\'' + did + '\')"':'';
          return '<span '+click+' style="'+style+'">'+d+(did?' ↗':'')+'</span>';
        }).join('')
      +'</div></div>'
      +'<div><div style="font-size:10px;font-weight:700;color:#dc2626;margin-bottom:4px">拮抗劑（阻斷受體）</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:4px">'
      +item.blockers.map(function(d){
          var did=findDrugInSection(sec,d);
          var style='background:#fee2e222;color:#7f1d1d;border:1px solid #fca5a5;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;'+(did?'cursor:pointer':'');
          var click=did?'onclick="goToDrugFromMap(\'' + sec + '\',\'' + did + '\')"':'';
          return '<span '+click+' style="'+style+'">'+d+(did?' ↗':'')+'</span>';
        }).join('')
      +'</div></div>'
      +'</div></div>';
  } else if (sec==='lipid' && item.effect) {
    h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px">'
      +[['LDL-C',item.effect.ldl,'#dc2626'],['TG',item.effect.tg,'#b45309'],['HDL-C',item.effect.hdl,'#059669']].map(function(e){
        return '<div style="background:#fff;border-radius:8px;padding:8px;text-align:center">'
          +'<div style="font-size:10px;color:#888;margin-bottom:3px">'+e[0]+'</div>'
          +'<div style="font-size:16px;font-weight:800;color:'+e[2]+'">'+e[1]+'</div></div>';
      }).join('')+'</div>';
  }

  // Drugs list (all sections except ANS which handled above)
  var drugList = item.drugs;
  if (drugList && drugList.length && sec!=='ans') {
    h += '<div style="margin-bottom:10px">'
      +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:'+item.darkColor+';margin-bottom:6px">💊 代表藥物（點擊查看詳細介紹）</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px">'
      + drugList.map(function(d){
          var did = findDrugInSection(sec, d);
          var style = 'background:'+item.color+'22;color:'+item.darkColor+';border:1px solid '+item.color+'66;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;'+(did?'cursor:pointer':'');
          var click = did ? 'onclick="goToDrugFromMap(\'' + sec + '\',\'' + did + '\')"' : '';
          return '<span '+click+' style="'+style+'">'+d+(did?' ↗':'')+'</span>';
        }).join('')
      +'</div></div>';
  }

  // Note
  if (item.note) {
    h += '<div style="background:#fff;border-radius:8px;padding:8px 10px;font-size:12px;color:#374151;line-height:1.6">'
      +'<strong>📌 </strong>'+item.note+'</div>';
  }

  h += '</div>';
  return colourText(h);
}

/* Navigate to drug detail page from any map */
function goToDrugFromMap(sec, drugId) {
  var s = STATE[sec];
  // remember where we came from so 返回 goes back to the same place
  s._returnTab = s.tab;            // 'mapview' when jumping from a map/tree
  s._returnMapMode = s._mapMode;   // 'a' or 'b'
  s._scrollY = 0;
  s.drug = drugId;
  s.tab = 'browse';
  var nav = document.getElementById('nav-'+sec);
  if (nav) nav.querySelectorAll('.snav-btn').forEach(function(b,i){
    b.classList.toggle('on', i===1); // browse is index 1
  });
  var el = document.getElementById('main-'+sec);
  if (el) el.innerHTML = renderDetail(sec, SECTIONS[sec]);
  window.scrollTo(0,0);
}

/* ── mapPickGeneric: in-place update for all sections ── */
function mapPickGeneric(sec, id) {
  STATE[sec]._mapActive = id;
  var svgWrap = document.getElementById('nephron-svg-wrap');
  if (svgWrap) svgWrap.innerHTML = buildMapSVG(sec, id);
  var legend = document.getElementById('nephron-legend');
  if (legend) legend.innerHTML = buildMapLegend(sec, id);
  var detail = document.getElementById('nephron-detail');
  if (detail) detail.innerHTML = buildGenericDetailPanel(sec, id);
}

/* 抗凝血機轉圖：多選切換（各 zone 可獨立開/關、可同時開多個） */
function coagToggle(id){
  var st=STATE.coag;
  if(!st._open) st._open={};
  st._open[id] = !st._open[id];          // 再點一次關閉
  var svgWrap = document.getElementById('nephron-svg-wrap');
  if (svgWrap) svgWrap.innerHTML = buildCoagCascadeSVG(st._open);
  var legend = document.getElementById('nephron-legend');
  if (legend) legend.innerHTML = buildMapLegend('coag', null);
  var detail = document.getElementById('nephron-detail');
  if (detail) detail.innerHTML = buildCoagMultiDetail(st._open);
}
/* 下方詳細面板：把所有已開啟的 zone 依序堆疊 */
function buildCoagMultiDetail(openMap){
  openMap = openMap || {};
  var ids=['plt','vkor','at3','direct','lysis'].filter(function(z){return openMap[z];});
  if(!ids.length) return '<div style="text-align:center;padding:20px;color:#bbb;font-size:13px">點擊上方攻擊點查看詳細說明（可同時展開多個）</div>';
  return ids.map(function(z){ return buildGenericDetailPanel('coag', z); }).join('<div style="height:10px"></div>');
}

/* ════════ VISUAL MECHANISM DIAGRAMS for cns / pk / mc (mobile-first, vertical) ════════ */

function buildMapSVG(sec, active) {
  if (sec==='diur')   return buildNephronSVG(active);
  if (sec==='lipid')  return buildLipidAnatomySVG(active);
  if (sec==='cancer') return buildCellCycleSVG(active);
  if (sec==='dm')     return buildDMSVG(active);
  if (sec==='abx')    return buildAbxCellSVG(active);
  if (sec==='ans')    return buildANSSVG(active);
  if (sec==='epi')    return buildEpiMindMap(active);
  if (sec==='cns')    return buildSynapseSVG(active);
  if (sec==='pk')     return buildPKFlowSVG(active);
  if (sec==='mc')     return buildMedchemSVG(active);
  if (sec==='tgt')    return buildPillChartSVG(TGT_MAP_DATA.targets, active, 'tgt');
  if (sec==='coag')   return buildCoagCascadeSVG((STATE.coag&&STATE.coag._open)||{});
  if (sec==='cardio') return buildCardioSVG((STATE.cardio&&STATE.cardio._open)||{});
  if (sec==='immu')   return buildImmuSVG((STATE.immu&&STATE.immu._open)||{});
  if (sec==='misc')   return buildMiscSVG((STATE.misc&&STATE.misc._open)||{});
  if (sec==='infx')   return buildPillChartSVG(INFX_MAP_DATA.targets, active, 'infx');
  if (sec==='immu')   return buildPillChartSVG(IMMU_MAP_DATA.targets, active, 'immu');
  if (sec==='misc')   return buildPillChartSVG(MISC_MAP_DATA.targets, active, 'misc');
  return '';
}

function buildMapLegend(sec, active) {
  var items = getMapItems(sec);
  if (!items) return '';
  var multiSec = (sec==='coag'||sec==='cardio'||sec==='immu'||sec==='misc');
  var openMap = (multiSec && STATE[sec] && STATE[sec]._open) ? STATE[sec]._open : null;
  return items.map(function(item) {
    var isOn = openMap ? !!openMap[item.id] : (active === item.id);
    var click = multiSec ? ((sec==='coag'?'coagToggle':sec==='cardio'?'cardioToggle':sec==='immu'?'immuToggle':'miscToggle')+'(\''+item.id+'\')') : ('mapPickGeneric(\''+sec+'\',\''+item.id+'\')');
    return '<button onclick="'+click+'" '
      +'style="padding:5px 11px;border-radius:20px;border:2px solid '+item.color+';'
      +'background:'+(isOn?item.color:'#fff')+';color:'+(isOn?'#fff':item.darkColor)+';'
      +'font-size:11px;font-weight:700;cursor:pointer;transition:all .15s">'
      +(item.label||item.fullLabel||'').replace('\n',' ')+'</button>';
  }).join('');
}

function getMapItems(sec) {
  if (sec==='diur')   return DIUR_MAP_DATA.sections;
  if (sec==='lipid')  return LIPID_MAP_DATA.sections;
  if (sec==='cancer') return CANCER_MAP_DATA.phases;
  if (sec==='dm')     return DM_MAP_DATA.zones;
  if (sec==='abx')    return ABX_MAP_DATA.targets;
  if (sec==='ans')    return ANS_MAP_DATA.receptors;
  if (sec==='epi')    return EPI_MAP_DATA.targets;
  if (sec==='cns')    return CNS_MAP_DATA.targets;
  if (sec==='pk')     return PK_MAP_DATA.targets;
  if (sec==='mc')     return MC_MAP_DATA.targets;
  if (sec==='tgt')    return TGT_MAP_DATA.targets;
  if (sec==='coag')   return COAG_MAP_DATA.targets;
  if (sec==='cardio') return CARDIO_MAP_DATA.targets;
  if (sec==='infx')   return INFX_MAP_DATA.targets;
  if (sec==='immu')   return IMMU_MAP_DATA.targets;
  if (sec==='misc')   return MISC_MAP_DATA.targets;
  return null;
}
