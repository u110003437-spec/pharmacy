function buildNephronSVG(active) {
  var cols = {};
  DIUR_MAP_DATA.sections.forEach(function(s){ cols[s.id] = s; });

  function isOn(id)       { return active === id; }
  function strokeCol(id)  { return isOn(id) ? cols[id].darkColor : '#cbd5e1'; }
  function strokeW(id)    { return isOn(id) ? 9 : 5; }
  function labelCol(id)   { return isOn(id) ? cols[id].darkColor : '#94a3b8'; }
  function pillBg(id)     { return isOn(id) ? cols[id].color     : '#f1f5f9'; }
  function pillTx(id)     { return isOn(id) ? '#fff'             : '#475569'; }
  function pillBd(id)     { return isOn(id) ? cols[id].darkColor : '#cbd5e1'; }

  function click(id) {
    return 'onclick="mapPick(\'' + id + '\')" style="cursor:pointer"';
  }

  // Pill label: centred at (cx, cy)
  function pill(cx, cy, txt, id, bold) {
    var pw = txt.length * 6.8 + 18;
    var ph = bold ? 22 : 20;
    return '<rect x="'+(cx-pw/2)+'" y="'+(cy-ph/2)+'" width="'+pw+'" height="'+ph+'" rx="'+(ph/2)+'" '
      +'fill="'+pillBg(id)+'" stroke="'+pillBd(id)+'" stroke-width="1.5"/>'
      +'<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" font-size="'+(bold?11:9)+'" '
      +'font-weight="'+(bold?800:600)+'" fill="'+pillTx(id)+'" font-family="sans-serif">'+txt+'</text>';
  }

  // Dashed connector line
  function dash(x1,y1,x2,y2,id) {
    return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+labelCol(id)+'" stroke-width="1" stroke-dasharray="4,3"/>';
  }

  // ── Layout constants ──────────────────────────────────────
  // Horizontal nephron: left→right
  // Sections x-centres:
  //  Glomerulus  : 60
  //  PCT (wavy)  : 60→160
  //  TAL (up)    : 200→200→270 (loop bottom 230)
  //  DCT (wavy)  : 270→370
  //  CD (down)   : 410
  //  Mannitol    : floats top

  var W = 800, H = 280;
  var midY = 140;  // centre rail y

  var L = [];
  L.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" '
    +'style="width:'+W+'px;height:'+H+'px;display:block">');

  // Defs
  L.push('<defs>'
    +'<marker id="arr2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">'
    +'<polygon points="0 0,6 2.5,0 5" fill="#94a3b8"/></marker>'
    +'<filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/>'
    +'<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
    +'</defs>');

  // Background
  L.push('<rect width="'+W+'" height="'+H+'" fill="#fafbfc"/>');

  // ── Glomerulus ──────────────────────────────────────────
  var gx=60, gy=midY;
  L.push('<ellipse cx="'+gx+'" cy="'+gy+'" rx="34" ry="26" fill="none" stroke="#94a3b8" stroke-width="2"/>');
  L.push('<ellipse cx="'+gx+'" cy="'+gy+'" rx="18" ry="13" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>');
  L.push('<text x="'+gx+'" y="'+(gy-4)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b" font-family="sans-serif">腎絲球</text>');
  L.push('<text x="'+gx+'" y="'+(gy+8)+'" text-anchor="middle" font-size="7" fill="#94a3b8" font-family="sans-serif">Glomerulus</text>');

  // ── PCT: wavy tube going right, then down then right ────
  // Path: from right of glomerulus, wave up-down twice, exit at right ~x=220
  var pctPath = 'M '+(gx+34)+' '+gy
    +' C 120 '+(gy-45)+', 130 '+(gy-45)+', 150 '+gy
    +' C 170 '+(gy+45)+', 180 '+(gy+45)+', 200 '+gy;
  L.push('<g '+click('pct')+'>');
  L.push('<path d="'+pctPath+'" fill="none" stroke="'+strokeCol('pct')+'" stroke-width="'+strokeW('pct')+'" stroke-linecap="round"'+(isOn('pct')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('pct')) L.push('<path d="'+pctPath+'" fill="none" stroke="'+cols['pct'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  // Label above wave
  L.push('<text x="150" y="'+(gy-55)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+labelCol('pct')+'" font-family="sans-serif">近曲小管</text>');
  L.push(pill(150, gy-38, 'CA 抑制劑', 'pct', true));
  L.push(dash(150, gy-27, 150, gy-18, 'pct'));
  L.push('</g>');

  // ── Descending limb: horizontal then curves down ─────────
  // goes right from PCT exit (x=200) then curves down to loop bottom
  var loopBottomY = midY + 80;
  var loopX = 280;
  // descending: right from x=200 to x=loopX, then down to loopBottomY
  L.push('<path d="M 200 '+gy+' L '+(loopX-30)+' '+gy+' Q '+loopX+' '+gy+' '+loopX+' '+(gy+30)+' L '+loopX+' '+loopBottomY+'"'
    +' fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>');
  L.push('<text x="'+(loopX+8)+'" y="'+(gy+55)+'" font-size="8" fill="#c0ccd8" font-family="sans-serif">降支</text>');

  // Loop bend
  L.push('<path d="M '+loopX+' '+loopBottomY+' Q '+loopX+' '+(loopBottomY+28)+' '+(loopX+28)+' '+(loopBottomY+28)
    +' Q '+(loopX+56)+' '+(loopBottomY+28)+' '+(loopX+56)+' '+loopBottomY+'"'
    +' fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>');
  L.push('<text x="'+(loopX+28)+'" y="'+(loopBottomY+46)+'" text-anchor="middle" font-size="8" fill="#b0bec5" font-family="sans-serif">亨氏套底端</text>');

  // ── TAL: ascending ──────────────────────────────────────
  // from loop bottom right side (x=loopX+56) ascends back up to midY
  var talX = loopX+56;
  L.push('<g '+click('tal')+'>');
  L.push('<path d="M '+talX+' '+loopBottomY+' L '+talX+' '+(gy+30)+' Q '+talX+' '+gy+' '+(talX+30)+' '+gy+'"'
    +' fill="none" stroke="'+strokeCol('tal')+'" stroke-width="'+strokeW('tal')+'" stroke-linecap="round"'+(isOn('tal')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('tal')) {
    L.push('<path d="M '+talX+' '+loopBottomY+' L '+talX+' '+(gy+30)+' Q '+talX+' '+gy+' '+(talX+30)+' '+gy+'"'
      +' fill="none" stroke="'+cols['tal'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  }
  // Label below the tube (going down side)
  L.push('<text x="'+(talX-10)+'" y="'+(midY+55)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+labelCol('tal')+'" font-family="sans-serif">升支粗段（TAL）</text>');
  L.push(pill(talX-10, midY+72, 'Loop 利尿劑', 'tal', true));
  L.push(dash(talX-10, midY+61, talX-10, midY+50, 'tal'));
  L.push('</g>');

  // ── DCT: wavy again heading right ──────────────────────
  var dctStartX = talX+30, dctEndX = dctStartX+150;
  var dctPath = 'M '+dctStartX+' '+gy
    +' C '+(dctStartX+40)+' '+(gy-42)+', '+(dctStartX+60)+' '+(gy-42)+', '+(dctStartX+80)+' '+gy
    +' C '+(dctStartX+100)+' '+(gy+42)+', '+(dctStartX+120)+' '+(gy+42)+', '+dctEndX+' '+gy;
  L.push('<g '+click('dct')+'>');
  L.push('<path d="'+dctPath+'" fill="none" stroke="'+strokeCol('dct')+'" stroke-width="'+strokeW('dct')+'" stroke-linecap="round"'+(isOn('dct')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('dct')) L.push('<path d="'+dctPath+'" fill="none" stroke="'+cols['dct'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  L.push('<text x="'+(dctStartX+75)+'" y="'+(gy-55)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+labelCol('dct')+'" font-family="sans-serif">遠曲小管（DCT）</text>');
  L.push(pill(dctStartX+75, gy-38, 'Thiazide', 'dct', true));
  L.push(dash(dctStartX+75, gy-27, dctStartX+75, gy-18, 'dct'));
  L.push('</g>');

  // ── CD: straight going down ─────────────────────────────
  var cdX = dctEndX + 20;
  var cdTopY = gy, cdBotY = gy + 100;
  // connector
  L.push('<line x1="'+dctEndX+'" y1="'+gy+'" x2="'+cdX+'" y2="'+gy+'" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>');
  L.push('<g '+click('cd')+'>');
  L.push('<line x1="'+cdX+'" y1="'+cdTopY+'" x2="'+cdX+'" y2="'+cdBotY+'" stroke="'+strokeCol('cd')+'" stroke-width="'+strokeW('cd')+'" stroke-linecap="round"'+(isOn('cd')?' filter="url(#glow2)"':'')+'/> ');
  if(isOn('cd')) L.push('<line x1="'+cdX+'" y1="'+cdTopY+'" x2="'+cdX+'" y2="'+cdBotY+'" stroke="'+cols['cd'].color+'" stroke-width="5" stroke-linecap="round" opacity="0.65"/>');
  L.push('<text x="'+(cdX+12)+'" y="'+(cdTopY+35)+'" font-size="10" font-weight="800" fill="'+labelCol('cd')+'" font-family="sans-serif">集尿管</text>');
  L.push(pill(cdX+50, cdTopY+50, '保鉀利尿劑', 'cd', true));
  L.push(dash(cdX+12, cdTopY+44, cdX+22, cdTopY+49, 'cd'));
  L.push('</g>');

  // urine arrow
  L.push('<line x1="'+cdX+'" y1="'+cdBotY+'" x2="'+cdX+'" y2="'+(cdBotY+22)+'" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr2)"/>');
  L.push('<text x="'+cdX+'" y="'+(cdBotY+40)+'" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="sans-serif">尿液</text>');

  // ── Mannitol: floating pill at top-right ───────────────
  var mox = 730, moy = 38;
  L.push('<g '+click('osmotic')+'>');
  L.push('<rect x="'+(mox-46)+'" y="'+(moy-16)+'" width="92" height="32" rx="10" '
    +'fill="'+pillBg('osmotic')+'" stroke="'+pillBd('osmotic')+'" stroke-width="1.5"/>');
  L.push('<text x="'+mox+'" y="'+(moy-2)+'" text-anchor="middle" font-size="10" font-weight="800" fill="'+pillTx('osmotic')+'" font-family="sans-serif">Mannitol</text>');
  L.push('<text x="'+mox+'" y="'+(moy+11)+'" text-anchor="middle" font-size="8" fill="'+pillTx('osmotic')+'" font-family="sans-serif">（滲透性，全段）</text>');
  L.push('</g>');

  // ── Flow direction arrow ───────────────────────────────
  L.push('<text x="12" y="22" font-size="8" fill="#94a3b8" font-family="sans-serif">腎小管流向 →</text>');

  L.push('</svg>');
  return L.join('\n');
}

  var subtabs = [
    {id:'flash',  icon:'🃏', label:'閃卡'},
    {id:'mech',   icon:'🎯', label:'機轉配對'},
    {id:'quiz',   icon:'✏️', label:'測驗'}
  ];
  if(data.hasMatch){ subtabs.splice(1,0,{id:'match', icon:'🔗', label:'分類配對'}); }

  var html = '<div style="margin-bottom:14px">';
  // Sub-tab selector
  html += '<div style="display:flex;gap:8px;padding:2px 0">';
  subtabs.forEach(function(t) {
    var on = sub === t.id;
    html += '<button onclick="STATE[\''+sec+'\']._psubtab=\''+t.id+'\';renderSection(\''+sec+'\')" '
      + 'style="flex:1;padding:10px 6px;border-radius:12px;border:2px solid '+(on?accentColor:'#e0ded8')+';'
      + 'background:'+(on?accentBg:'#fff')+';color:'+(on?accentColor:'#888')+';'
      + 'font-size:13px;font-weight:700;cursor:pointer;transition:all .15s">'
      + t.icon+' '+t.label+'</button>';
  });
  html += '</div></div>';

  // Render the chosen sub-tab content
  if (sub === 'flash')  html += renderFlash(sec, data);
  else if (sub === 'match') html += renderMatchGame(sec, data);
  else if (sub === 'mech')  html += renderMechChallenge(sec, data);
  else if (sub === 'quiz')  html += renderQuiz(sec, data);

  return html;
}

/* ════════ 綜合模擬考 + 錯題本 ════════ */
/* ---- 錯題本 持久化 ---- */
function wbKey(){return 'pharma_wrongbook';}
var WRONGBOOK=[];
function loadWrongBook(){ try{var r=localStorage.getItem(wbKey()); WRONGBOOK = r?JSON.parse(r):[];}catch(e){WRONGBOOK=[];} }
function saveWrongBook(){ try{localStorage.setItem(wbKey(), JSON.stringify(WRONGBOOK));}catch(e){} }
function _qid(sec,q){ var t=(q.q||'').replace(/\s+/g,'').slice(0,40); return sec+'|'+t; }
function addWrong(sec,q){
  if(!q||q.ans===undefined) return;
  var id=_qid(sec,q);
  if(WRONGBOOK.some(function(w){return w.id===id;})) return;
  WRONGBOOK.push({id:id, sec:sec, q:q.q, opts:q.opts, ans:q.ans, exp:q.exp||'', type:q.type||''});
  saveWrongBook();
}
function removeWrong(id){ WRONGBOOK=WRONGBOOK.filter(function(w){return w.id!==id;}); saveWrongBook(); renderTool(); }
function clearWrongBook(){ if(WRONGBOOK.length && !confirm('確定清空整本錯題本？')) return; WRONGBOOK=[]; saveWrongBook(); renderTool(); }

/* ---- 工具視圖切換 ---- */
var TOOL=null; // {kind:'mock'|'wrong', ...}
function openTool(kind){
  TOOL = (kind==='mock') ? {kind:'mock', stage:'intro'} : {kind:'wrong'};
  if(typeof exitFocus==='function' && document.body.classList.contains('focus-mode')) {}
  document.body.classList.remove('focus-mode');
  document.body.classList.add('tool-mode');
  window.scrollTo(0,0);
  renderTool();
}
function closeTool(){
  TOOL=null;
  document.body.classList.remove('tool-mode');
  window.scrollTo(0,0);
}
function renderTool(){
  var el=document.getElementById('tool-view');
  if(!el||!TOOL) return;
  if(TOOL.kind==='mock') el.innerHTML=renderMock();
  else el.innerHTML=renderWrongBook();
}

/* ---- 綜合模擬考 ---- */
function buildMockPool(n){
  var all=[];
  ALL_SECS.forEach(function(sec){
    var qz=SECTIONS[sec]&&SECTIONS[sec].quiz;
    if(!qz) return;
    qz.forEach(function(q){ all.push({sec:sec, q:q.q, opts:q.opts, ans:q.ans, exp:q.exp||'', type:q.type||''}); });
  });
  for(var i=all.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=all[i];all[i]=all[j];all[j]=t;}
  return all.slice(0, Math.min(n, all.length));
}
function startMock(n){
  TOOL={kind:'mock', stage:'run', pool:buildMockPool(n), qi:0, score:0, answered:false, picked:undefined, n:n};
  renderTool(); window.scrollTo(0,0);
}
function mockPick(i){
  if(TOOL.answered) return;
  TOOL.picked=i; TOOL.answered=true;
  var q=TOOL.pool[TOOL.qi];
  if(i===q.ans) TOOL.score++;
  else addWrong(q.sec, q);
  renderTool();
}
function mockNext(){
  if(TOOL.qi===TOOL.pool.length-1){ TOOL.stage='done'; }
  else { TOOL.qi++; TOOL.answered=false; TOOL.picked=undefined; }
  renderTool(); window.scrollTo(0,0);
}
function secLabel(sec){ var m=SEC_META[sec]; return m?(m.icon+' '+m.title):sec; }

function renderMock(){
  var ac='#0e7490';

    var total=0; ALL_SECS.forEach(function(s){total+=(SECTIONS[s].quiz||[]).length;});
    return head+'<div class="tool-body">'
      +'<div class="mock-intro">'
      +'<div style="font-size:44px;text-align:center">📝</div>'
      +'<h3 style="text-align:center;margin:6px 0">混合全章節隨機出題</h3>'
      +'<p style="text-align:center;color:#666;font-size:13px;margin-bottom:18px">模擬真實國考混合題型，答錯自動收進錯題本。題庫共 '+total+' 題。</p>'
      +'<div style="display:flex;flex-direction:column;gap:10px">'
      +'<button class="mock-start" onclick="startMock(10)">快速 10 題</button>'
      +'<button class="mock-start" onclick="startMock(20)">標準 20 題</button>'
      +'<button class="mock-start" onclick="startMock(40)">完整 40 題</button>'
      +'</div></div></div>';
  }
  if(TOOL.stage==='done'){
    var pct=Math.round(TOOL.score/TOOL.pool.length*100);
    var msg=pct>=60?'🎉 達及格水準！':pct>=45?'💪 接近了，加強錯題':'📖 多練習，先攻高頻章節';
    return head+'<div class="tool-body"><div class="score-card" style="margin-top:20px">'
      +'<div class="score-big" style="color:'+ac+'">'+TOOL.score+'/'+TOOL.pool.length+'</div>'
      +'<div class="score-label">'+msg+'</div>'
      +'<div style="font-size:13px;color:#888;margin-bottom:18px">正確率 '+pct+'%　·　答錯的已收進錯題本</div>'
      +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      +'<button class="restart-btn" onclick="startMock('+TOOL.n+')">🔀 再來一次</button>'
      +'<button class="restart-btn" style="background:#fff;color:'+ac+';border:1.5px solid '+ac+'" onclick="openTool(\'wrong\')">📕 看錯題本</button>'
      +'</div></div></div>';
  }
  // run
  var q=TOOL.pool[TOOL.qi];
  var html=head+'<div class="tool-body">';
  html+='<div class="quiz-meta"><span class="quiz-prog">'+(TOOL.qi+1)+' / '+TOOL.pool.length+'</span>'
    +'<span class="quiz-prog" style="color:'+ac+'">✓ '+TOOL.score+'</span></div>'
    +'<div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:'+Math.round(TOOL.qi/TOOL.pool.length*100)+'%;background:'+ac+'"></div></div>';
  html+='<div class="quiz-card">';
  html+='<div style="margin-bottom:10px"><span style="background:#ecfeff;color:'+ac+';font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px">'+secLabel(q.sec)+'</span></div>';
  html+='<div class="quiz-q">'+q.q+'</div>';
  q.opts.forEach(function(o,i){
    var cls='quiz-opt';
    if(TOOL.answered){
      if(i===q.ans) cls+=' correct';
      else if(i===TOOL.picked) cls+=' wrong';
    }
    html+='<button class="'+cls+'" onclick="mockPick('+i+')"'+(TOOL.answered?' disabled':'')+'>'+String.fromCharCode(65+i)+'. '+o+'</button>';
  });
  if(TOOL.answered){
    html+='<div class="quiz-exp"><strong>'+(TOOL.picked===q.ans?'✓ 答對':'✗ 答錯（已收進錯題本）')+'</strong><br>'+q.exp+'</div>';
    var isLast=TOOL.qi===TOOL.pool.length-1;
    html+='<button class="next-btn" onclick="mockNext()">'+(isLast?'查看結果':'下一題 →')+'</button>';
  }
  html+='</div></div>';
  return html;
}

      +'<button class="mock-start" style="max-width:220px;margin:16px auto 0" onclick="openTool(\'mock\')">去做綜合模擬考</button>'

    +'<span style="font-size:13px;color:#666">共 '+WRONGBOOK.length+' 題　·　點題目看解析</span>'
    +'<button onclick="clearWrongBook()" style="font-size:12px;color:#b91c1c;background:none;border:none;cursor:pointer;font-weight:700">清空</button></div>';
  WRONGBOOK.forEach(function(w,idx){
    var open=TOOL._open===w.id;
    html+='<div class="wb-card">';
    html+='<div class="wb-head" onclick="TOOL._open=(TOOL._open===\''+w.id+'\'?null:\''+w.id+'\');renderTool()">'
      +'<span class="wb-sec">'+secLabel(w.sec)+'</span>'
      +'<span class="wb-q">'+w.q.split('\n')[0]+'</span>'
      +'<span class="wb-chev">'+(open?'▾':'▸')+'</span></div>';
    if(open){
      html+='<div class="wb-body">';
      w.opts.forEach(function(o,i){
        var mark=i===w.ans?'<span style="color:#16a34a;font-weight:800"> ✓ 正解</span>':'';
        html+='<div style="padding:5px 0;font-size:13px'+(i===w.ans?';color:#166534;font-weight:700':'')+'">'+String.fromCharCode(65+i)+'. '+o+mark+'</div>';
      });
      html+='<div class="quiz-exp" style="margin-top:8px">'+w.exp+'</div>';
      html+='<button class="wb-master" onclick="removeWrong(\''+w.id+'\')">✓ 已學會，移出錯題本</button>';
      html+='</div>';
    }
    html+='</div>';
  });
  html+='</div>';
  return html;
}

window.addEventListener('scroll',function(){
  var blocks=['lipid','cancer','dm','abx','diur','ans','epi'];
  var best=null, bestDist=Infinity;
  blocks.forEach(function(id){
    var el=document.getElementById('block-'+id);
    if(!el) return;
    var rect=el.getBoundingClientRect();
    var dist=Math.abs(rect.top-80);
    if(dist<bestDist){bestDist=dist;best=id;}
  });
  if(best){
    document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
    var nb=document.getElementById('bnav-'+best);
    if(nb) nb.classList.add('on');
  }
},{passive:true});

function enterSection(id){
  // open the cat-block
  var body=document.getElementById('body-'+id);
  var block=document.getElementById('block-'+id);
  if(!body||!block) return;
  // close any other open
  closeAll(id);
  body.classList.add('open');
  block.classList.add('open');
  renderSection(id);
  enterFocus(id);
}

/* Track which section is currently focused */
var _focusSec=null;

/* Override enterFocus to set _focusSec */
var _origEnterFocus=enterFocus;
enterFocus=function(id){
  _focusSec=id;
  _origEnterFocus(id);
  syncBottomNav(id);
};

/* switchSection: jump to another section while in focus mode */
function switchSection(id){
  // highlight the right bnav button
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('bnav-'+id);
  if(nb) nb.classList.add('on');
  // if already open, just update focus header
  if(_focusSec===id){ enterFocus(id); return; }
  // open the new section
  closeAll(id);
  var body=document.getElementById('body-'+id);
  var block=document.getElementById('block-'+id);
  if(!body||!block) return;
  body.classList.add('open');
  block.classList.add('open');
  renderSection(id);
  enterFocus(id);
  window.scrollTo(0,0);
}

/* goHome: exit focus mode back to home grid */
function goHome(){
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('bnav-home');
  if(nb) nb.classList.add('on');
  exitFocus();
}

function syncBottomNav(id){
  // just highlight the section button
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('bnav-'+id);
  if(nb) nb.classList.add('on');
  // update collapsed-handle label to current section
  var meta=SEC_META[id];
  var cur=document.getElementById('bnav-current');
  if(cur&&meta) cur.textContent=(meta.icon||'')+' '+meta.title;
}
function toggleNav(){
  var n=document.getElementById('bottom-nav');
  if(!n) return;
  n.classList.toggle('collapsed');
  document.body.classList.toggle('nav-open', !n.classList.contains('collapsed'));
  try{ localStorage.setItem('pharma_nav_collapsed', n.classList.contains('collapsed')?'1':'0'); }catch(e){}
}
// restore collapse preference (default: collapsed)
(function(){
  try{
    var v=localStorage.getItem('pharma_nav_collapsed');
    var n=document.getElementById('bottom-nav');
    if(n && v==='0'){ n.classList.remove('collapsed'); document.body.classList.add('nav-open'); }
  }catch(e){}
})();

/* Override exitFocus to go back to home */
var _origExitFocus=exitFocus;
exitFocus=function(){
  _focusSec=null;
  _origExitFocus();
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('bnav-home');
  if(nb) nb.classList.add('on');
  renderHome();
};
